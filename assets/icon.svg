<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f29"/>
    </linearGradient>
    <linearGradient id="jade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#67ffbc"/>
      <stop offset="55%" stop-color="#31f59c"/>
      <stop offset="100%" stop-color="#0dcf79"/>
    </linearGradient>
    <linearGradient id="sockShade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <!-- rounded dark tile -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- ambient jade glow behind sock -->
  <ellipse cx="256" cy="276" rx="170" ry="160" fill="#31f59c" opacity="0.22" filter="url(#glow)"/>

  <!-- single sock — Dobby's free sock, off-center & playful -->
  <!-- shape: vertical cuff at top, ankle bend, foot pointing right; rendered with a single rounded path -->
  <g transform="translate(0 12)">
    <!-- sock body -->
    <path d="
        M 188 110
        L 188 280
        Q 188 308 208 326
        L 326 410
        Q 348 428 372 414
        Q 396 398 388 372
        L 354 280
        L 354 110
        Q 354 88 332 88
        L 210 88
        Q 188 88 188 110
        Z"
      fill="url(#jade)"/>

    <!-- top cuff stripe (lighter) -->
    <rect x="188" y="100" width="166" height="38" rx="0" fill="#ffffff" opacity="0.22"/>
    <!-- two ribbed lines on the cuff -->
    <line x1="200" y1="114" x2="342" y2="114" stroke="#0a1a14" stroke-width="3" opacity="0.4"/>
    <line x1="200" y1="128" x2="342" y2="128" stroke="#0a1a14" stroke-width="3" opacity="0.4"/>

    <!-- toe accent — slightly darker oval at the foot tip -->
    <ellipse cx="370" cy="395" rx="22" ry="14" fill="#0a1a14" opacity="0.22" transform="rotate(35 370 395)"/>

    <!-- highlight layer for depth -->
    <path d="
        M 188 110
        L 188 280
        Q 188 308 208 326
        L 326 410
        Q 348 428 372 414
        Q 396 398 388 372
        L 354 280
        L 354 110
        Q 354 88 332 88
        L 210 88
        Q 188 88 188 110
        Z"
      fill="url(#sockShade)"/>
  </g>
</svg>
