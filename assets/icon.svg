<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a0c"/>
      <stop offset="100%" stop-color="#1a1a22"/>
    </linearGradient>
    <linearGradient id="jade" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#31f59c"/>
      <stop offset="60%" stop-color="#67ffbc"/>
      <stop offset="100%" stop-color="#0dcf79"/>
    </linearGradient>
    <linearGradient id="champagne" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#31f59c"/>
      <stop offset="100%" stop-color="#f2dfb8"/>
    </linearGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="12"/></filter>
  </defs>
  <rect width="512" height="512" rx="120" fill="url(#bg)"/>
  <!-- ambient glow blob -->
  <circle cx="180" cy="180" r="140" fill="#31f59c" opacity="0.18" filter="url(#glow)"/>
  <circle cx="380" cy="380" r="120" fill="#f2dfb8" opacity="0.1" filter="url(#glow)"/>
  <!-- toolbox shape -->
  <g transform="translate(106 130)">
    <!-- handle -->
    <rect x="100" y="0" width="100" height="50" rx="14" fill="none" stroke="url(#jade)" stroke-width="14"/>
    <!-- body -->
    <rect x="20" y="44" width="260" height="180" rx="28" fill="url(#jade)" opacity="0.95"/>
    <!-- inner highlight -->
    <rect x="36" y="58" width="228" height="80" rx="20" fill="#0a1a14" opacity="0.25"/>
    <!-- tools row 1 -->
    <circle cx="80"  cy="98" r="12" fill="#0a1a14"/>
    <circle cx="120" cy="98" r="12" fill="#0a1a14"/>
    <circle cx="160" cy="98" r="12" fill="#0a1a14"/>
    <circle cx="200" cy="98" r="12" fill="#0a1a14"/>
    <!-- tools row 2 -->
    <rect x="55" y="155" width="190" height="14" rx="7" fill="#0a1a14"/>
    <rect x="55" y="180" width="130" height="14" rx="7" fill="#0a1a14"/>
  </g>
  <!-- TK letters -->
  <text x="256" y="430" font-family="Space Grotesk, Inter, sans-serif" font-weight="700" font-size="56" fill="url(#champagne)" text-anchor="middle" letter-spacing="6">TOOLKIT</text>
</svg>
