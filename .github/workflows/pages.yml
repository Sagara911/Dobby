name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Static site — no build step. Upload the repo as-is (the .git, the
      # workflow file, and node_modules-like noise are excluded by default
      # by upload-pages-artifact, but we additionally drop the .github dir
      # and start.sh below to keep the published artifact lean.)
      - name: Stage publishable files
        run: |
          mkdir -p _site
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' \
                --exclude='start.sh' --exclude='启动工具站.bat' \
                --exclude='README.md' \
                ./ _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
