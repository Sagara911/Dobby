<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>GIF Maker · Playable Toolkit</title>
<link rel="stylesheet" href="../assets/shared.css" />
<style>
  .preview-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    flex: 1;
    min-height: 240px;
  }
  .preview-col {
    display: flex; flex-direction: column; gap: 6px;
  }
  .preview-col .label {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .preview-box {
    flex: 1;
    background: var(--checker), #1a1a1a;
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
    padding: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .preview-box canvas, .preview-box img {
    image-rendering: pixelated;
    max-width: 100%;
  }
</style>
</head>
<body>

<div class="tool-layout">
  <div class="sidebar">
    <h1>🎞️ GIF Maker</h1>

    <div class="drop-zone" id="dropZone">
      <p>📂 拖入序列帧</p>
      <p class="hint">
        多选 PNG / JPG<br/>
        按文件名自然排序
      </p>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none" />
    </div>

    <div class="progress" id="progress"><div class="progress-bar"></div></div>

    <h2>动画</h2>
    <div class="field">
      <label>FPS</label>
      <input type="number" id="fps" value="12" min="1" max="60" />
    </div>
    <div class="field">
      <label>循环次数 (0 = 无限)</label>
      <input type="number" id="loop" value="0" min="0" />
    </div>

    <h2>输出</h2>
    <div class="field">
      <label>格式</label>
      <select id="format">
        <option value="gif">GIF (兼容性最好)</option>
        <option value="apng">APNG (画质好, 支持 8-bit alpha)</option>
      </select>
    </div>
    <div class="field" id="paletteField">
      <label>调色板算法 (仅 GIF)</label>
      <select id="palette">
        <option value="median">中位切分 256 色 (慢, 质量好)</option>
        <option value="uniform">均匀 6×6×6 (快, 质量一般)</option>
      </select>
    </div>
    <div class="field">
      <label>文件名</label>
      <input type="text" id="filename" value="animation" />
    </div>

    <button id="buildBtn" disabled>生成</button>
    <button id="downloadBtn" class="secondary" disabled>下载</button>
    <button id="clearBtn" class="secondary">清空</button>

    <div class="log" id="log"></div>
  </div>

  <div class="main">
    <div class="stats" id="stats">未加载</div>
    <div class="preview-row">
      <div class="preview-col">
        <div class="label">序列帧 (第一帧)</div>
        <div class="preview-box" id="firstFrameBox">
          <div class="preview-empty">拖入序列帧后这里显示首帧</div>
        </div>
      </div>
      <div class="preview-col">
        <div class="label">生成的动画</div>
        <div class="preview-box" id="resultBox">
          <div class="preview-empty">生成后这里显示动画预览</div>
        </div>
      </div>
    </div>
    <div>
      <h2 style="margin-top:0">所有帧</h2>
      <div class="frame-grid" id="frameGrid"></div>
    </div>
  </div>
</div>

<script src="../assets/shared.js"></script>
<script src="../assets/anim-encoders.js"></script>
<script>
Toolkit.injectTopbar('gif-maker');

(() => {
  const { $, makeLogger, makeProgress, attachDropZone, naturalSort, download, newCanvas, canvasToBlob, fmtBytes } = Toolkit;
  const log = makeLogger($('log'));
  const progress = makeProgress($('progress'));

  let frames = [];   // [{name, bitmap, w, h}]
  let lastBlob = null;
  let lastExt = 'gif';

  attachDropZone($('dropZone'), $('fileInput'), handleFiles);
  const handoff = Toolkit.setupHandoff('gif-maker', { outputType: 'image/gif' });

  $('format').addEventListener('change', e => {
    $('paletteField').style.display = e.target.value === 'gif' ? '' : 'none';
  });

  async function handleFiles(files) {
    if (!files.length) return;
    log.clear();
    files = naturalSort(files.filter(f => f.type.startsWith('image/') && !/\.gif$/i.test(f.name)));
    log.dim(`加载 ${files.length} 张图片...`);
    frames = [];
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      try {
        const bitmap = await createImageBitmap(f);
        frames.push({ name: f.name.replace(/\.[^.]+$/, ''), bitmap, w: bitmap.width, h: bitmap.height });
      } catch (e) {
        log.err(`${f.name}: ${e.message}`);
      }
      progress.set((i + 1) / files.length);
    }
    progress.hide();
    log.ok(`加载完成 ${frames.length} 帧`);
    renderFrameGrid();
    if (frames.length) {
      const first = frames[0];
      const cv = newCanvas(first.w, first.h);
      cv.getContext('2d').drawImage(first.bitmap, 0, 0);
      $('firstFrameBox').innerHTML = '';
      $('firstFrameBox').appendChild(cv);
      $('stats').innerHTML = `<strong>${frames.length}</strong> 帧 · 单帧 <strong>${first.w}×${first.h}</strong>`;
      $('buildBtn').disabled = false;
    }
  }

  function renderFrameGrid() {
    const grid = $('frameGrid');
    grid.innerHTML = '';
    frames.forEach((f, i) => {
      const tile = document.createElement('div');
      tile.className = 'frame-tile';
      const cv = newCanvas(f.w, f.h);
      cv.getContext('2d').drawImage(f.bitmap, 0, 0);
      tile.appendChild(cv);
      const idx = document.createElement('div');
      idx.className = 'idx';
      idx.textContent = i;
      tile.appendChild(idx);
      grid.appendChild(tile);
    });
  }

  $('buildBtn').addEventListener('click', async () => {
    if (!frames.length) return;
    const fmt = $('format').value;
    const fps = parseInt($('fps').value, 10) || 12;
    const loop = parseInt($('loop').value, 10) || 0;
    const palette = $('palette').value;

    $('buildBtn').disabled = true;
    $('downloadBtn').disabled = true;
    log.dim(`生成 ${fmt.toUpperCase()}...`);

    try {
      const t0 = performance.now();
      const encoderOpts = {
        fps, loop,
        onProgress: pct => progress.set(pct),
        onStatus: msg => log.dim('  ' + msg)
      };
      let blob;
      if (fmt === 'gif') {
        blob = await AnimEncoders.buildGif(frames, { ...encoderOpts, paletteMode: palette });
        lastExt = 'gif';
      } else {
        blob = await AnimEncoders.buildApng(frames, encoderOpts);
        lastExt = 'png';
      }
      lastBlob = blob;
      const t1 = performance.now();
      log.ok(`生成完成 ${fmtBytes(blob.size)} · 用时 ${((t1 - t0) / 1000).toFixed(2)}s`);

      const url = URL.createObjectURL(blob);
      $('resultBox').innerHTML = '';
      const img = document.createElement('img');
      img.src = url;
      img.style.maxWidth = '100%';
      $('resultBox').appendChild(img);
      $('downloadBtn').disabled = false;
      const fname = ($('filename').value || 'animation') + '.' + lastExt;
      handoff?.setBlob(blob, fname, lastExt === 'gif' ? 'image/gif' : 'image/png');
    } catch (e) {
      log.err(e.message);
      console.error(e);
    } finally {
      $('buildBtn').disabled = false;
      progress.hide();
    }
  });

  $('downloadBtn').addEventListener('click', () => {
    if (!lastBlob) return;
    const name = ($('filename').value || 'animation').replace(/[^\w-]/g, '_');
    download(lastBlob, `${name}.${lastExt}`);
  });

  $('clearBtn').addEventListener('click', () => {
    frames = []; lastBlob = null;
    $('frameGrid').innerHTML = '';
    $('firstFrameBox').innerHTML = '<div class="preview-empty">拖入序列帧后这里显示首帧</div>';
    $('resultBox').innerHTML = '<div class="preview-empty">生成后这里显示动画预览</div>';
    $('stats').textContent = '未加载';
    $('buildBtn').disabled = true;
    $('downloadBtn').disabled = true;
    log.clear();
    $('fileInput').value = '';
  });


})();
</script>
</body>
</html>
