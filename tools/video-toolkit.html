<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<!-- KILLSWITCH v1 -->
<script>
/* one-shot legacy cleanup — drops old SW, caches, and localStorage left behind
   by removed settings UI; reloads once so the fresh code takes over. */
(function () {
  var KEY = 'toolkit-cleaned-v1';
  if (sessionStorage.getItem(KEY)) return;
  sessionStorage.setItem(KEY, '1');
  (async function () {
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) { try { await r.unregister(); } catch (_) {} }
      }
      if ('caches' in window) {
        var ks = await caches.keys();
        for (var k of ks) { try { await caches.delete(k); } catch (_) {} }
      }
      try { localStorage.removeItem('toolkit-cursor'); } catch (_) {}
      try { localStorage.removeItem('toolkit-theme'); } catch (_) {}
      var stale = document.getElementById('__toolkit_cursor_style__');
      if (stale) stale.remove();
      document.documentElement.removeAttribute('data-theme');
      location.reload();
    } catch (e) { console.warn('[cleanup]', e); }
  })();
})();
</script>
<title>Video Toolkit · Dobby</title>
<link rel="stylesheet" href="../assets/shared.css" />
<style>
  .cfps-mb {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid transparent;
    box-shadow: none;
    border-radius: calc(var(--radius-sm) - 2px);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .cfps-mb:hover { background: rgba(255, 255, 255, 0.05); transform: none; }
  .cfps-mb.active {
    background: var(--jade);
    color: #0a1a14;
    font-weight: 600;
    border-color: var(--jade);
  }
  .cfps-mb.active:hover { background: var(--jade); transform: none; }
  .preview-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-height: 280px; }
  .preview-col { display: flex; flex-direction: column; gap: 6px; }
  .preview-col .label {
    color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .preview-box {
    flex: 1;
    background: var(--checker), #1a1a1a;
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto; padding: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-box video, .preview-box canvas, .preview-box img { max-width: 100%; max-height: 100%; }
  .timeline-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
  }
  .timeline-row input[type=range] { flex: 1; }
  .timeline-row .mono { font-family: ui-monospace, Consolas, monospace; min-width: 80px; text-align: right; }
  .action-controls {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
  }
  .row-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .compat-note {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--warning);
    padding: 10px 12px;
    font-size: 11px;
    color: var(--muted-2);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
  }
  .compat-note strong { color: var(--warning); }
</style>
</head>
<body>

<div class="tool-layout">
  <div class="sidebar">
    <h1>🎬 Video Toolkit</h1>

    <div class="compat-note">
      <strong>MP4 输出</strong>用 WebCodecs + mp4-muxer (Chrome / Edge 113+),首次联网加载 ~30KB。<br/>
      <strong>WebM 输出</strong>用浏览器原生 MediaRecorder,所有 Chromium 都支持。
    </div>

    <div class="drop-zone" id="dropZone">
      <p id="dzTitle">📂 拖入视频</p>
      <p class="hint" id="dzHint">MP4 / WebM / MOV<br/>所有处理在浏览器本地完成</p>
      <input type="file" id="fileInput" accept="video/*" style="display:none" />
    </div>

    <div class="progress" id="progress"><div class="progress-bar"></div></div>

    <h2>操作</h2>
    <div class="field">
      <select id="action">
        <option value="compress">🗜️ 一键压缩 (变小)</option>
        <option value="trim">✂️ 时间裁剪 (Trim)</option>
        <option value="crop">🔲 画面裁剪 (Crop)</option>
        <option value="resize">📐 缩放</option>
        <option value="speed">⏩ 调速</option>
        <option value="changeFps">🎞️ 改 FPS (抽帧 / 补帧)</option>
        <option value="reverse">⏪ 反向播放</option>
        <option value="frames">🖼️ 抽帧 (PNG ZIP)</option>
        <option value="fromFrames">🎬 帧合成视频 (Frames → MP4)</option>
        <option value="toGif">🎞️ 转 GIF</option>
        <option value="chromaKey">🌿 色键抠像 (绿幕去背景)</option>
        <option value="filter">🎚️ 滤镜 / 色相 / 调色</option>
      </select>
    </div>

    <div class="action-controls" id="actionControls"></div>

    <h2>输出</h2>
    <div class="field">
      <label>输出格式 (除抽帧 / 转 GIF / 色键外)</label>
      <select id="outFormat">
        <option value="mp4">MP4 (H.264) — Chrome / Edge 113+ 推荐</option>
        <option value="webm-vp9">WebM (VP9) — 全平台</option>
        <option value="webm-vp8">WebM (VP8) — 兼容性最好</option>
      </select>
    </div>
    <div class="field">
      <label>H.264 profile (仅 MP4 输出)</label>
      <select id="h264Profile">
        <option value="baseline" selected>Baseline (兼容老设备, 体积稍大)</option>
        <option value="main">Main (主流, 体积 -5%~-10%)</option>
        <option value="high">High (推荐现代设备, 体积 -10%~-20%)</option>
      </select>
      <div class="info" style="margin-top:4px">所有主流浏览器和 ≥2014 年的设备都支持 High profile;选 High 比特率不变但视觉质量更好</div>
    </div>
    <div class="field">
      <label>比特率 (Kbps)</label>
      <input type="number" id="bitrate" value="3000" min="200" max="20000" />
    </div>
    <div class="field">
      <label>抽帧 / GIF FPS</label>
      <input type="number" id="fps" value="12" min="1" max="60" />
    </div>
    <div class="field">
      <label>文件名</label>
      <input type="text" id="filename" value="output" />
    </div>
    <button id="applyBtn" disabled>应用</button>
    <button id="downloadBtn" class="secondary" disabled>下载</button>
    <button id="clearBtn" class="secondary">清空</button>

    <div class="log" id="log"></div>
  </div>

  <div class="main">
    <div class="stats" id="stats">Dobby 待命</div>
    <div class="preview-pair">
      <div class="preview-col">
        <div class="label">原视频</div>
        <div class="preview-box" id="srcBox">
          <div class="preview-empty">拖入视频</div>
        </div>
      </div>
      <div class="preview-col">
        <div class="label">输出预览</div>
        <div class="preview-box" id="outBox">
          <div class="preview-empty">Dobby 干完显示在这里</div>
        </div>
      </div>
    </div>
    <div class="timeline-row" id="timelineRow" style="display:none">
      <button id="playBtn" class="secondary" style="padding:4px 10px; font-size:11px">▶</button>
      <input type="range" id="seekBar" min="0" max="1000" value="0" />
      <span class="mono" id="timeLabel">0.0 / 0.0 s</span>
    </div>
  </div>
</div>

<script src="../assets/shared.js"></script>
<script src="../assets/anim-encoders.js"></script>
<script src="../assets/rife.js"></script>
<script src="../assets/farneback.js"></script>
<script>
Toolkit.injectTopbar('video-toolkit');

(() => {
  const { $, makeLogger, makeProgress, attachDropZone, download, newCanvas, canvasToBlob, fmtBytes, makeZip, naturalSort } = Toolkit;
  const log = makeLogger($('log'));
  const progress = makeProgress($('progress'));

  let srcVideo = null;
  let srcUrl = null;
  let srcMeta = null;  // {w, h, duration}
  let srcFrames = [];  // for fromFrames action: [{bitmap, w, h, name}]
  let outBlob = null;
  let outExt = 'webm';

  attachDropZone($('dropZone'), $('fileInput'), handleFiles);
  const handoff = Toolkit.setupHandoff('video-toolkit', { outputType: 'video/mp4' });
  $('action').addEventListener('change', () => { updateDropZoneForAction(); renderActionControls(); });
  // initial sync in case action default changes
  updateDropZoneForAction();

  // The drop zone hint + the file input's accept attribute switch depending on
  // whether the action wants a single video (default) or a folder of images
  // (fromFrames). Without this the user gets the wrong file picker on click.
  function updateDropZoneForAction() {
    const isFrames = $('action').value === 'fromFrames';
    $('dzTitle').textContent = isFrames ? '📂 拖入序列帧 (可多选 / 文件夹)' : '📂 拖入视频';
    $('dzHint').innerHTML = isFrames
      ? 'PNG / JPG / WebP — 按文件名自然排序<br/>所有处理在浏览器本地完成'
      : 'MP4 / WebM / MOV<br/>所有处理在浏览器本地完成';
    const fi = $('fileInput');
    if (isFrames) { fi.accept = 'image/*'; fi.multiple = true; }
    else { fi.accept = 'video/*'; fi.multiple = false; }
  }

  async function handleFiles(files) {
    if (!files.length) return;
    const f0 = files[0];
    // Auto-route: a bunch of images → switch to fromFrames; a single video →
    // current path. This lets the user just drop whatever and the tool figures
    // out the intent, instead of forcing them to set the action dropdown first.
    const looksLikeImage = (f) =>
      (f.type && f.type.startsWith('image/')) ||
      /\.(png|jpe?g|webp|bmp|avif)$/i.test(f.name);
    if (looksLikeImage(f0)) {
      if ($('action').value !== 'fromFrames') {
        $('action').value = 'fromFrames';
        updateDropZoneForAction();
      }
      await handleFramesInput(files.filter(looksLikeImage));
      renderActionControls();
      return;
    }
    if (!f0.type.startsWith('video/')) {
      log.err('Bad Dobby! 没看到视频,主人再丢一次?(或者扔一组图片,Dobby 自动切到「帧合成视频」)');
      return;
    }
    const f = f0;
    log.clear();
    log.dim(`加载 ${f.name} (${fmtBytes(f.size)})...`);
    if (srcUrl) URL.revokeObjectURL(srcUrl);
    srcUrl = URL.createObjectURL(f);
    srcVideo = document.createElement('video');
    srcVideo.src = srcUrl;
    srcVideo.muted = true; srcVideo.playsInline = true; srcVideo.preload = 'auto';

    await new Promise((resolve, reject) => {
      srcVideo.onloadedmetadata = resolve;
      srcVideo.onerror = () => reject(new Error('视频加载失败'));
    });

    srcMeta = { w: srcVideo.videoWidth, h: srcVideo.videoHeight, duration: srcVideo.duration };
    $('srcBox').innerHTML = '';
    srcVideo.controls = true;
    srcVideo.style.maxWidth = '100%';
    srcVideo.style.maxHeight = '100%';
    $('srcBox').appendChild(srcVideo);
    $('stats').innerHTML = `<strong>${srcMeta.w}×${srcMeta.h}</strong> · <strong>${srcMeta.duration.toFixed(2)}s</strong> · 原文件 <strong>${fmtBytes(f.size)}</strong>`;
    $('applyBtn').disabled = false;
    log.ok('加载完成');
    renderActionControls();
  }

  // Load a sequence of image files as frames for the fromFrames action.
  // Files are sorted by natural name (so walk_001.png comes before walk_010.png).
  // Bitmaps are kept in memory — for 100+ frames this can use a lot of RAM, but
  // that's the cost of being a no-server browser tool.
  async function handleFramesInput(files) {
    if (!files.length) { log.err('没有图片文件'); return; }
    const sorted = naturalSort(files);
    log.clear();
    log.dim(`加载 ${sorted.length} 张图片...`);
    // clear video state so the apply path doesn't get confused
    if (srcUrl) { URL.revokeObjectURL(srcUrl); srcUrl = null; }
    srcVideo = null; srcMeta = null;
    // dispose any old bitmaps
    for (const f of srcFrames) f.bitmap?.close?.();
    srcFrames = [];
    for (let i = 0; i < sorted.length; i++) {
      try {
        const bm = await createImageBitmap(sorted[i]);
        srcFrames.push({ bitmap: bm, w: bm.width, h: bm.height, name: sorted[i].name });
      } catch (e) {
        log.warn(`跳过 ${sorted[i].name}: ${e.message}`);
      }
      if (i % 10 === 0) progress.set(i / sorted.length);
    }
    progress.hide();
    if (!srcFrames.length) { log.err('全部图片加载失败'); $('applyBtn').disabled = true; return; }
    const f0 = srcFrames[0];
    // preview first frame in the source box
    $('srcBox').innerHTML = '';
    const preview = newCanvas(f0.w, f0.h);
    preview.getContext('2d').drawImage(f0.bitmap, 0, 0);
    preview.style.maxWidth = '100%'; preview.style.maxHeight = '100%';
    $('srcBox').appendChild(preview);
    $('stats').innerHTML = `<strong>${srcFrames.length}</strong> 帧 · <strong>${f0.w}×${f0.h}</strong> · 首帧 <strong>${f0.name}</strong>`;
    $('applyBtn').disabled = false;
    log.ok(`加载完成 ${srcFrames.length} 帧`);
  }

  // remember the original bitrate so leaving "一键压缩" can restore it
  const DEFAULT_BITRATE = $('bitrate').value;
  let lastAction = null;

  function renderActionControls() {
    const action = $('action').value;
    const c = $('actionControls');
    // fromFrames has its own input flow (image sequence, no srcMeta) — render
    // even when no video is loaded, since the controls are useful before drop.
    if (action === 'fromFrames') {
      const f0 = srcFrames[0] || null;
      const dW = f0 ? f0.w : 1280;
      const dH = f0 ? f0.h : 720;
      c.innerHTML = `
        <div class="field">
          <label>输出 FPS</label>
          <input type="number" id="ffFps" value="30" min="1" max="60" />
        </div>
        <div class="row-fields">
          <div class="field">
            <label>输出宽 (px, 偶数)</label>
            <input type="number" id="ffOutW" value="${dW}" min="2" step="2" />
          </div>
          <div class="field">
            <label>输出高 (px, 偶数)</label>
            <input type="number" id="ffOutH" value="${dH}" min="2" step="2" />
          </div>
        </div>
        <div class="info">默认沿用首帧尺寸 · 所有帧会被等比缩放到这个尺寸 · 强烈建议偶数(H.264 要求)</div>
        <div class="info" id="ffEstimate" style="color: var(--jade); margin-top:4px"></div>
      `;
      const updateEst = () => {
        const fps = parseInt($('ffFps').value, 10) || 30;
        const n = srcFrames.length;
        const dur = n / fps;
        $('ffEstimate').textContent = n
          ? `${n} 帧 @ ${fps} FPS = ${dur.toFixed(2)} 秒`
          : `先拖入序列帧再来,这里会显示预估时长`;
      };
      updateEst();
      $('ffFps').addEventListener('input', updateEst);
      lastAction = action;
      return;
    }
    if (!srcMeta) return;
    const { w, h, duration } = srcMeta;

    // if user is leaving the compress action, restore bitrate / format to defaults
    if (lastAction === 'compress' && action !== 'compress') {
      $('bitrate').value = DEFAULT_BITRATE;
    }
    lastAction = action;

    if (action === 'compress') {
      const targetMb = Math.max(0.3, (srcMeta.w * srcMeta.h * srcMeta.duration / 5e6)).toFixed(1);
      c.innerHTML = `
        <div class="field">
          <label>质量预设</label>
          <select id="cmpPreset">
            <option value="tiny">📉 极致小 (480p · 400 kbps)</option>
            <option value="small" selected>📦 小 (720p · 1200 kbps)</option>
            <option value="medium">⚖️ 中等 (原尺寸 · 2500 kbps)</option>
            <option value="custom">⚙️ 自定义目标体积</option>
          </select>
        </div>
        <div class="field" id="cmpTargetField" style="display:none">
          <label>目标体积 (MB)</label>
          <input type="number" id="cmpTargetMb" value="${targetMb}" min="0.1" step="0.1" />
          <div class="info" style="margin-top:4px">按时长反推比特率,实际输出可能 ±20% 浮动</div>
        </div>
        <label class="checkbox" style="margin-top:8px"><input type="checkbox" id="cmpStripAudio" /><span>去掉音轨 (再节省 ~10%)</span></label>
        <div class="info" style="margin-top:8px">输出锁定 <strong>MP4 (H.264)</strong> 以获得最佳压缩率。预设会自动改下方"输出"区的比特率/格式 — 切走再切回会重置。</div>
        <div class="info" id="cmpEstimate" style="margin-top:4px; color: var(--jade)"></div>
      `;
      const applyPreset = () => {
        const v = $('cmpPreset').value;
        $('cmpTargetField').style.display = v === 'custom' ? '' : 'none';
        $('outFormat').value = 'mp4';
        const { w, h, duration } = srcMeta;
        const safeDur = duration > 0.1 ? duration : 1;  // guard against missing/0 duration
        let kbps;
        if (v === 'tiny') kbps = 400;
        else if (v === 'small') kbps = 1200;
        else if (v === 'medium') kbps = 2500;
        else {
          const target = parseFloat($('cmpTargetMb').value) || 2;
          kbps = Math.max(80, Math.min(20000, Math.round(target * 8192 / safeDur)));
        }
        $('bitrate').value = kbps;
        const estMb = (kbps * safeDur / 8192).toFixed(2);
        $('cmpEstimate').textContent = duration > 0.1
          ? `预计输出 ≈ ${estMb} MB · ${kbps} kbps`
          : `${kbps} kbps · 视频时长缺失,无法估算体积`;
      };
      $('cmpPreset').addEventListener('change', applyPreset);
      $('cmpTargetMb')?.addEventListener('input', applyPreset);
      applyPreset();
    } else if (action === 'trim') {
      c.innerHTML = `
        <div class="field">
          <label>起始时间 (秒) <span id="trimStartVal" class="mono">0</span></label>
          <input type="range" id="trimStart" min="0" max="${duration.toFixed(2)}" step="0.05" value="0" />
        </div>
        <div class="field">
          <label>结束时间 (秒) <span id="trimEndVal" class="mono">${duration.toFixed(2)}</span></label>
          <input type="range" id="trimEnd" min="0" max="${duration.toFixed(2)}" step="0.05" value="${duration.toFixed(2)}" />
        </div>
        <div class="info">保留 [起始, 结束] 之间的片段</div>
      `;
      $('trimStart').addEventListener('input', e => { $('trimStartVal').textContent = (+e.target.value).toFixed(2); srcVideo.currentTime = +e.target.value; });
      $('trimEnd').addEventListener('input', e => $('trimEndVal').textContent = (+e.target.value).toFixed(2));
    } else if (action === 'crop') {
      c.innerHTML = `
        <div class="row-fields">
          <div class="field"><label>X</label><input type="number" id="cropX" value="0" min="0" max="${w}" /></div>
          <div class="field"><label>Y</label><input type="number" id="cropY" value="0" min="0" max="${h}" /></div>
        </div>
        <div class="row-fields">
          <div class="field"><label>宽</label><input type="number" id="cropW" value="${w}" min="1" max="${w}" /></div>
          <div class="field"><label>高</label><input type="number" id="cropH" value="${h}" min="1" max="${h}" /></div>
        </div>
      `;
    } else if (action === 'resize') {
      c.innerHTML = `
        <div class="row-fields">
          <div class="field"><label>宽</label><input type="number" id="newW" value="${w}" min="1" /></div>
          <div class="field"><label>高</label><input type="number" id="newH" value="${h}" min="1" /></div>
        </div>
        <label class="checkbox"><input type="checkbox" id="lockRatio" checked /><span>锁定宽高比</span></label>
      `;
      const ratio = w / h;
      $('newW').addEventListener('input', () => { if ($('lockRatio').checked) $('newH').value = Math.round(parseInt($('newW').value, 10) / ratio); });
      $('newH').addEventListener('input', () => { if ($('lockRatio').checked) $('newW').value = Math.round(parseInt($('newH').value, 10) * ratio); });
    } else if (action === 'speed') {
      c.innerHTML = `
        <div class="field">
          <label>速度倍率 <span id="speedVal" class="mono">1.0×</span></label>
          <input type="range" id="speedMul" min="10" max="400" value="100" />
        </div>
      `;
      $('speedMul').addEventListener('input', e => $('speedVal').textContent = (e.target.value / 100).toFixed(2) + '×');
    } else if (action === 'changeFps') {
      c.innerHTML = `
        <div class="field">
          <label>操作类型</label>
          <div class="cfps-toggle" style="display:flex; gap:4px; padding:3px; background:rgba(0,0,0,0.3); border:1px solid var(--border); border-radius:var(--radius-sm)">
            <button type="button" id="cfpsModeDec" class="cfps-mb secondary" style="flex:1; font-size:12px; padding:7px 0">⊘ 抽帧 (帧数变少)</button>
            <button type="button" id="cfpsModeInt" class="cfps-mb secondary" style="flex:1; font-size:12px; padding:7px 0">✨ 补帧 (帧数变多)</button>
          </div>
        </div>

        <div id="cfpsDecPane" style="display:none">
          <div class="field">
            <label>保留每 N 帧中的 1 帧 <span id="cfpsDecNVal" class="mono">2</span></label>
            <input type="range" id="cfpsDecN" min="2" max="6" value="2" />
          </div>
          <div style="display:flex; gap:4px; margin-bottom:8px">
            <button type="button" id="cfpsDecQ2" class="secondary" style="flex:1; font-size:11px; padding:5px 0">N=2 (½)</button>
            <button type="button" id="cfpsDecQ3" class="secondary" style="flex:1; font-size:11px; padding:5px 0">N=3 (⅓)</button>
            <button type="button" id="cfpsDecQ4" class="secondary" style="flex:1; font-size:11px; padding:5px 0">N=4 (¼)</button>
          </div>
        </div>

        <div id="cfpsIntPane" style="display:none">
          <div class="field">
            <label>补帧倍率 <span id="cfpsIntMulVal" class="mono">2.0×</span></label>
            <input type="range" id="cfpsIntMul" min="15" max="30" value="20" step="1" />

      else if (action === 'chromaKey') await doChromaKey();
      else if (action === 'changeFps' && /^optical/.test($('cfpsMode')?.value || '')) await doChangeFpsOptical();
      else await doReencodeWebm(action);  // trim/crop/resize/speed/reverse/filter all share this path

  async function doReencodeWebm(action) {
    const { w: sw, h: sh, duration } = srcMeta;
    // determine output params
    let outW = sw, outH = sh, srcX = 0, srcY = 0, srcW = sw, srcH = sh;
    let startT = 0, endT = duration;
    let speed = 1;
    let reverse = false;
    // canvas filter chain (built once for 'filter' action, applied to every frame draw)
    let canvasFilter = 'none';
    if (action === 'filter') {
      const parts = [];
      if ($('vfGray')?.checked) parts.push('grayscale(100%)');
      if ($('vfSepia')?.checked) parts.push('sepia(100%)');
      if ($('vfInvert')?.checked) parts.push('invert(100%)');
      const bri = $('vfBri')?.value; if (bri && bri !== '100') parts.push(`brightness(${bri}%)`);
      const con = $('vfCon')?.value; if (con && con !== '100') parts.push(`contrast(${con}%)`);
      const sat = $('vfSat')?.value; if (sat && sat !== '100') parts.push(`saturate(${sat}%)`);
      const hue = $('vfHue')?.value; if (hue && hue !== '0') parts.push(`hue-rotate(${hue}deg)`);
      canvasFilter = parts.length ? parts.join(' ') : 'none';
    }
    if (action === 'compress') {
      const preset = $('cmpPreset')?.value || 'small';
      const maxDim = preset === 'tiny' ? 480 : preset === 'small' ? 720 : Math.max(sw, sh);
      const scale = Math.min(1, maxDim / Math.max(sw, sh));
      // H.264 needs even dimensions
      outW = Math.max(2, Math.round(sw * scale / 2) * 2);
      outH = Math.max(2, Math.round(sh * scale / 2) * 2);
    } else if (action === 'trim') {
      startT = parseFloat($('trimStart').value);
      endT = parseFloat($('trimEnd').value);
      if (endT <= startT) throw new Error('结束时间必须大于起始时间');
    } else if (action === 'crop') {
      srcX = parseInt($('cropX').value, 10);
      srcY = parseInt($('cropY').value, 10);
      srcW = parseInt($('cropW').value, 10);
      srcH = parseInt($('cropH').value, 10);
      outW = srcW; outH = srcH;
    } else if (action === 'resize') {
      outW = parseInt($('newW').value, 10);
      outH = parseInt($('newH').value, 10);
    } else if (action === 'speed') {
      speed = parseInt($('speedMul').value, 10) / 100;
    } else if (action === 'reverse') {
      reverse = true;
    }

    const cv = newCanvas(outW, outH);
    const ctx = cv.getContext('2d');
    const fmt = $('outFormat').value;
    const bitrate = (parseInt($('bitrate').value, 10) || 3000) * 1000;
    // Output FPS: 30 by default, user-overridable via the changeFps action.
    // For changeFps blend mode, pushFrame stashes the previous source sample
    // in prevSampleCanvas and composites it under each new frame at 50% alpha,
    // producing a motion-blur-like smoothing between adjacent samples.
    const fpsNum = action === 'changeFps' ? (parseInt($('cfpsTarget')?.value, 10) || 30) : 30;
    const cfpsMode = action === 'changeFps' ? ($('cfpsMode')?.value || 'blend') : 'dup';
    const interval = 1 / fpsNum;

    if (fmt === 'mp4') {
      // === WebCodecs + mp4-muxer path (Chrome/Edge 113+) ===
      if (!('VideoEncoder' in window)) {
        log.warn('当前浏览器不支持 WebCodecs,回退到 WebM');
        return doReencodeAsWebM(action, cv, ctx, srcX, srcY, srcW, srcH, outW, outH, startT, endT, speed, reverse, fpsNum, interval, 'webm-vp9', bitrate, canvasFilter);
      }
      log.dim('加载 mp4-muxer (首次联网)...');
      const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/mp4-muxer@5.1.5');
      const muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video: { codec: 'avc', width: outW, height: outH },
        fastStart: 'in-memory'
      });
      let encoderError = null;
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => { encoderError = e; log.err('encoder: ' + e.message); }
      });
      encoder.configure({
        codec: h264Codec(outW, outH, fpsNum),
        width: outW, height: outH,
        bitrate,
        framerate: fpsNum
      });
      log.dim(`MP4 编码 ${outW}×${outH} @ ${fpsNum}fps, ${(bitrate/1000)|0}kbps...`);

      let frameIdx = 0;
      ctx.filter = canvasFilter;
      // For changeFps blend mode: remember the previously sampled canvas so we
      // can composite the *next* sample over it at 50% alpha, producing a
      // half-step motion-blur between adjacent output frames.
      const prevSample = (action === 'changeFps' && cfpsMode === 'blend') ? newCanvas(outW, outH) : null;
      const prevCtx = prevSample ? prevSample.getContext('2d') : null;
      let havePrev = false;
      async function pushFrame(t, ts) {
        await seekVideo(srcVideo, t);
        ctx.clearRect(0, 0, outW, outH);
        ctx.drawImage(srcVideo, srcX, srcY, srcW, srcH, 0, 0, outW, outH);
        if (prevSample && havePrev) {
          ctx.globalAlpha = 0.5;
          ctx.drawImage(prevSample, 0, 0);
          ctx.globalAlpha = 1;
        }
        const vf = new VideoFrame(cv, { timestamp: ts });
        // keyframe every 30 frames
        encoder.encode(vf, { keyFrame: frameIdx % 30 === 0 });
        vf.close();
        frameIdx++;
        if (prevSample) {
          prevCtx.clearRect(0, 0, outW, outH);
          prevCtx.drawImage(srcVideo, srcX, srcY, srcW, srcH, 0, 0, outW, outH);
          havePrev = true;
        }
      }

      if (!reverse) {
        const playSpan = endT - startT;
        let t = startT;
        while (t < endT) {
          await pushFrame(t, Math.round((frameIdx / fpsNum) * 1e6));
          progress.set((t - startT) / playSpan);
          t += interval * speed;
        }
      } else {
        let t = endT;
        const playSpan = endT - startT;
        while (t > startT) {
          await pushFrame(t, Math.round((frameIdx / fpsNum) * 1e6));
          progress.set(1 - (t - startT) / playSpan);
          t -= interval;
        }
      }
      await encoder.flush();
      encoder.close();
      muxer.finalize();
      if (encoderError) throw new Error('视频编码失败: ' + encoderError.message);
      if (!validateMp4Buffer(muxer.target.buffer)) throw new Error('输出 MP4 校验失败 — 编码可能未完成或损坏');
      outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
      outExt = 'mp4';
      showOutput();
      log.ok(`生成 MP4 ${fmtBytes(outBlob.size)}`);
      return;
    }

    // === MediaRecorder path (WebM) ===
    return doReencodeAsWebM(action, cv, ctx, srcX, srcY, srcW, srcH, outW, outH, startT, endT, speed, reverse, fpsNum, interval, fmt, bitrate, canvasFilter);
  }

  async function doReencodeAsWebM(action, cv, ctx, srcX, srcY, srcW, srcH, outW, outH, startT, endT, speed, reverse, fpsNum, interval, fmt, bitrate, canvasFilter) {
    if (canvasFilter && canvasFilter !== 'none') ctx.filter = canvasFilter;
    const stream = cv.captureStream(0);
    const track = stream.getVideoTracks()[0];
    const mimeType = fmt === 'webm-vp9' ? 'video/webm;codecs=vp9' : 'video/webm;codecs=vp8';
    if (!MediaRecorder.isTypeSupported(mimeType)) throw new Error('当前浏览器不支持 ' + mimeType);
    const chunks = [];
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: bitrate });
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    const done = new Promise(resolve => { recorder.onstop = resolve; });
    recorder.start();
    // Same blend setup as the MP4 path — for changeFps blend mode, overlay
    // the previous sample at 50% alpha to fake a half-step in-between frame.
    const cfpsMode = action === 'changeFps' ? ($('cfpsMode')?.value || 'blend') : 'dup';
    const prevSample = (action === 'changeFps' && cfpsMode === 'blend') ? newCanvas(outW, outH) : null;
    const prevCtx = prevSample ? prevSample.getContext('2d') : null;
    let havePrev = false;
    const drawSample = (t) => {
      ctx.clearRect(0, 0, outW, outH);
      ctx.drawImage(srcVideo, srcX, srcY, srcW, srcH, 0, 0, outW, outH);
      if (prevSample && havePrev) {
        ctx.globalAlpha = 0.5;
        ctx.drawImage(prevSample, 0, 0);
        ctx.globalAlpha = 1;
      }
      if (prevSample) {
        prevCtx.clearRect(0, 0, outW, outH);
        prevCtx.drawImage(srcVideo, srcX, srcY, srcW, srcH, 0, 0, outW, outH);
        havePrev = true;
      }
    };

    if (!reverse) {
      const playSpan = endT - startT;
      let t = startT;
      while (t < endT) {
        await seekVideo(srcVideo, t);
        drawSample(t);
        if (track.requestFrame) track.requestFrame();
        progress.set((t - startT) / playSpan);
        t += interval * speed;
      }
    } else {
      let t = endT;
      const playSpan = endT - startT;
      while (t > startT) {
        await seekVideo(srcVideo, t);
        drawSample(t);
        if (track.requestFrame) track.requestFrame();
        progress.set(1 - (t - startT) / playSpan);
        t -= interval;
      }
    }
    await new Promise(r => setTimeout(r, 200));
    recorder.stop();
    await done;
    outBlob = new Blob(chunks, { type: 'video/webm' });
    outExt = 'webm';
    showOutput();
    log.ok(`生成 WebM ${fmtBytes(outBlob.size)}`);
  }

  // ChangeFps with optical-flow interpolation (RIFE on WebGPU, or Farnebäck
  // on CPU as fallback). Assumes a source reference FPS of 30 (matches the
  // rest of the pipeline's seek sampling). For each output frame at time t,
  // we compute the bracketing source-frame indices and either reuse a source
  // sample directly (alpha ≈ 0 or 1) or call the active backend to synthesize
  // the in-between. Source samples are cached so we never seek the same time
  // twice in a row.
  async function doChangeFpsOptical() {
    const mode = $('cfpsMode')?.value || 'optical';
    const { w: sw, h: sh, duration } = srcMeta;
    const target = parseInt($('cfpsTarget').value, 10) || 30;
    const statusEl = $('cfpsRifeStatus');
    if (statusEl) statusEl.style.display = '';

    // Pick backend per user choice, with auto-fallback.
    //   optical       → RIFE if WebGPU, else Farnebäck, else throw
    //   optical-rife  → RIFE only (throws if no WebGPU)
    //   optical-fb    → Farnebäck only
    let backend = null;  // { name, prepare(), interpolate(A, B, α, out) }
    const tryRife = async () => {
      if (!window.RIFE) throw new Error('RIFE 模块Dobby 待命');
      await window.RIFE.prepare({
        onStatus: msg => { log.dim(msg); if (statusEl) statusEl.textContent = msg; },
        onProgress: p => {
          if (statusEl) statusEl.textContent = `下载 RIFE 模型 ${(p*100)|0}%...`;
          progress.set(p * 0.2);
        }
      });
      return { name: 'RIFE (WebGPU)', interpolate: window.RIFE.interpolate };
    };
    const tryFarneback = async () => {
      if (!window.Farneback) throw new Error('Farnebäck 模块Dobby 待命');
      await window.Farneback.prepare({
        onStatus: msg => { log.dim(msg); if (statusEl) statusEl.textContent = msg; }
      });
      return { name: 'Farnebäck (CPU)', interpolate: window.Farneback.interpolate };
    };
    if (mode === 'optical-rife') {
      backend = await tryRife();
    } else if (mode === 'optical-fb') {
      backend = await tryFarneback();
    } else {
      // auto: try RIFE first, fall back on any failure
      try { backend = await tryRife(); }
      catch (e) {
        log.warn(`RIFE 不可用 (${e.message}), 降级到 Farnebäck CPU`);
        if (statusEl) statusEl.textContent = `RIFE 不可用,改用 Farnebäck CPU...`;
        backend = await tryFarneback();
      }
    }
    log.ok(`光流后端: ${backend.name}`);
    if (statusEl) statusEl.textContent = `✓ ${backend.name} 就绪, 开始推理`;

    const fmt = $('outFormat').value;
    const bitrate = (parseInt($('bitrate').value, 10) || 3000) * 1000;
    const SRC_FPS = 30;  // reference; matches doReencodeWebm's sampling cadence
    const srcInterval = 1 / SRC_FPS;
    const outInterval = 1 / target;

    // H.264 only supports even dims
    const outW = Math.max(2, Math.round(sw / 2) * 2);
    const outH = Math.max(2, Math.round(sh / 2) * 2);

    // src sample cache (last 2 we visited)
    const cache = new Map();
    async function getSrcAt(idx) {
      if (cache.has(idx)) return cache.get(idx);
      const t = Math.min(duration - 0.001, idx / SRC_FPS);
      await seekVideo(srcVideo, t);
      const cv = newCanvas(outW, outH);
      cv.getContext('2d').drawImage(srcVideo, 0, 0, sw, sh, 0, 0, outW, outH);
      cache.set(idx, cv);
      // keep only the 3 most recent
      if (cache.size > 3) cache.delete(cache.keys().next().value);
      return cv;
    }

    const outCv = newCanvas(outW, outH);
    const ctx = outCv.getContext('2d');
    const tmpInterp = newCanvas(outW, outH);

    if (fmt !== 'mp4') {
      log.warn('光流补帧目前只走 MP4 (WebCodecs) 输出路径');
      return;
    }
    if (!('VideoEncoder' in window)) {
      throw new Error('当前浏览器不支持 WebCodecs, 光流补帧需要 WebCodecs + WebGPU');
    }

    log.dim('加载 mp4-muxer (首次联网)...');
    const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/mp4-muxer@5.1.5');
    const muxer = new Muxer({
      target: new ArrayBufferTarget(),
      video: { codec: 'avc', width: outW, height: outH },
      fastStart: 'in-memory'
    });
    let encoderError = null;
    const encoder = new VideoEncoder({
      output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
      error: e => { encoderError = e; log.err('encoder: ' + e.message); }
    });
    encoder.configure({
      codec: h264Codec(outW, outH, target),
      width: outW, height: outH,
      bitrate,
      framerate: target,
    });

    const totalOut = Math.max(1, Math.floor(duration * target));
    log.dim(`输出 ${totalOut} 帧 @ ${target}fps (源参考 ${SRC_FPS}fps), RIFE 推理...`);
    const t0 = performance.now();

    let frameIdx = 0;
    for (let i = 0; i < totalOut; i++) {
      const outTime = i / target;
      if (outTime >= duration) break;
      const srcIdxFloat = outTime * SRC_FPS;
      const srcLo = Math.floor(srcIdxFloat);
      const srcHi = srcLo + 1;
      const alpha = srcIdxFloat - srcLo;

      let frame;
      if (alpha < 0.005) {
        frame = await getSrcAt(srcLo);
      } else if (alpha > 0.995) {
        frame = await getSrcAt(srcHi);
      } else {
        const A = await getSrcAt(srcLo);
        const B = await getSrcAt(Math.min(Math.floor(duration * SRC_FPS), srcHi));
        await backend.interpolate(A, B, alpha, tmpInterp);
        frame = tmpInterp;
      }

      ctx.clearRect(0, 0, outW, outH);
      ctx.drawImage(frame, 0, 0);
      const vf = new VideoFrame(outCv, { timestamp: Math.round((frameIdx / target) * 1e6) });
      encoder.encode(vf, { keyFrame: frameIdx % 30 === 0 });
      vf.close();
      frameIdx++;

      progress.set(0.2 + 0.78 * (i / totalOut));
      if (i % 4 === 0) await new Promise(r => setTimeout(r, 0));  // yield to UI
    }
    await encoder.flush();
    encoder.close();
    muxer.finalize();
    if (encoderError) throw new Error('视频编码失败: ' + encoderError.message);
    if (!validateMp4Buffer(muxer.target.buffer)) throw new Error('输出 MP4 校验失败 — 编码可能未完成或损坏');
    outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
    outExt = 'mp4';
    progress.set(1);
    showOutput();
    const dt = ((performance.now() - t0) / 1000).toFixed(1);
    log.ok(`光流补帧完成 (${backend.name}) · ${fmtBytes(outBlob.size)} · ${frameIdx} 帧 · ${dt}s`);
  }

  // ──────────────────────────────────────────────────────────────────
  //   Frames → Video (the reverse of doExtractFrames)
  //   Mirror of the MP4 / WebM encoder paths in doReencodeWebm, but the
  //   per-frame source is srcFrames[i].bitmap rather than seeking srcVideo.
  // ──────────────────────────────────────────────────────────────────
  async function doFramesToVideo() {
    const fps = parseInt($('ffFps').value, 10) || 30;
    let outW = parseInt($('ffOutW').value, 10) || srcFrames[0].w;
    let outH = parseInt($('ffOutH').value, 10) || srcFrames[0].h;
    // H.264 requires even dimensions — silently round down rather than error
    outW = outW & ~1;
    outH = outH & ~1;
    const fmt = $('outFormat').value;
    const bitrate = (parseInt($('bitrate').value, 10) || 3000) * 1000;
    const cv = newCanvas(outW, outH);
    const ctx = cv.getContext('2d');
    ctx.imageSmoothingQuality = 'high';

    if (fmt === 'mp4') {
      if (!('VideoEncoder' in window)) {
        log.warn('当前浏览器不支持 WebCodecs MP4, 回退到 WebM (VP9)');
        return doFramesToVideoWebm(cv, ctx, outW, outH, fps, bitrate, 'webm-vp9');
      }
      log.dim('加载 mp4-muxer (首次联网)...');
      const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/mp4-muxer@5.1.5');
      const muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video: { codec: 'avc', width: outW, height: outH },
        fastStart: 'in-memory'
      });
      let encErr = null;
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => { encErr = e; log.err('encoder: ' + e.message); }
      });
      encoder.configure({
        codec: h264Codec(outW, outH, fps),
        width: outW, height: outH,
        bitrate, framerate: fps
      });
      log.dim(`MP4 编码 ${outW}×${outH} @ ${fps}fps · ${srcFrames.length} 帧...`);
      const t0 = performance.now();
      for (let i = 0; i < srcFrames.length; i++) {
        const f = srcFrames[i];
        ctx.clearRect(0, 0, outW, outH);
        ctx.drawImage(f.bitmap, 0, 0, outW, outH);
        const vf = new VideoFrame(cv, { timestamp: Math.round(i / fps * 1e6) });
        encoder.encode(vf, { keyFrame: i % 30 === 0 });
        vf.close();
        progress.set((i + 1) / srcFrames.length);
      }
      await encoder.flush();
      encoder.close();
      muxer.finalize();
      if (encErr) throw new Error('视频编码失败: ' + encErr.message);
      if (!validateMp4Buffer(muxer.target.buffer)) throw new Error('输出 MP4 校验失败 — 编码可能未完成或损坏');
      outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
      outExt = 'mp4';
      const dt = ((performance.now() - t0) / 1000).toFixed(1);
      showOutput();
      log.ok(`生成 MP4 ${fmtBytes(outBlob.size)} · ${dt}s`);
      return;
    }
    return doFramesToVideoWebm(cv, ctx, outW, outH, fps, bitrate, fmt);
  }

  async function doFramesToVideoWebm(cv, ctx, outW, outH, fps, bitrate, fmt) {
    const stream = cv.captureStream(0);
    const track = stream.getVideoTracks()[0];
    const mimeType = fmt === 'webm-vp8' ? 'video/webm;codecs=vp8' : 'video/webm;codecs=vp9';
    if (!MediaRecorder.isTypeSupported(mimeType)) throw new Error('当前浏览器不支持 ' + mimeType);
    const chunks = [];
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: bitrate });
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    const done = new Promise(res => { recorder.onstop = res; });
    recorder.start();
    log.dim(`WebM 编码 ${outW}×${outH} @ ${fps}fps · ${srcFrames.length} 帧...`);
    const t0 = performance.now();
    const frameMs = 1000 / fps;
    for (let i = 0; i < srcFrames.length; i++) {
      const f = srcFrames[i];
      ctx.clearRect(0, 0, outW, outH);
      ctx.drawImage(f.bitmap, 0, 0, outW, outH);
      // MediaRecorder samples at real-time pacing, so pace the canvas writes
      // to land each frame at its intended FPS.
      track.requestFrame?.();
      await new Promise(r => setTimeout(r, frameMs));
      progress.set((i + 1) / srcFrames.length);
    }
    recorder.stop();
    await done;
    outBlob = new Blob(chunks, { type: 'video/webm' });
    outExt = 'webm';
    const dt = ((performance.now() - t0) / 1000).toFixed(1);
    showOutput();
    log.ok(`生成 WebM ${fmtBytes(outBlob.size)} · ${dt}s`);
  }

  async function doExtractFrames() {
    const fps = parseInt($('framesFps').value, 10) || parseInt($('fps').value, 10) || 12;
    const { w, h, duration } = srcMeta;
    const total = Math.max(1, Math.floor(duration * fps));
    log.dim(`抽 ${total} 帧 @ ${fps} FPS...`);
    const cv = newCanvas(w, h);
    const ctx = cv.getContext('2d');
    const files = [];
    for (let i = 0; i < total; i++) {
      const t = Math.min(duration - 0.001, i / fps);
      await seekVideo(srcVideo, t);
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(srcVideo, 0, 0);
      const blob = await canvasToBlob(cv, 'image/png');
      const buf = new Uint8Array(await blob.arrayBuffer());
      files.push({ name: `frame_${String(i).padStart(4, '0')}.png`, data: buf });
      progress.set((i + 1) / total);
    }
    const zip = makeZip(files);
    outBlob = zip;
    outExt = 'zip';
    showOutputAsZipInfo(total);
    log.ok(`抽帧完成,共 ${total} 帧 · ZIP ${fmtBytes(zip.size)}`);
  }

  async function doToGif() {
    const fps = parseInt($('gifFps').value, 10) || 12;
    const maxDim = parseInt($('gifMaxDim').value, 10) || 0;
    const palette = $('gifPalette').value;
    const { w, h, duration } = srcMeta;
    const ratio = maxDim > 0 ? Math.min(1, maxDim / Math.max(w, h)) : 1;
    const ow = Math.max(1, Math.round(w * ratio)), oh = Math.max(1, Math.round(h * ratio));
    const total = Math.max(1, Math.floor(duration * fps));
    log.dim(`抽 ${total} 帧 → 编码 GIF (${ow}×${oh})...`);
    const cv = newCanvas(ow, oh);
    const ctx = cv.getContext('2d');
    const frames = [];
    for (let i = 0; i < total; i++) {
      const t = Math.min(duration - 0.001, i / fps);
      await seekVideo(srcVideo, t);
      ctx.clearRect(0, 0, ow, oh);
      ctx.drawImage(srcVideo, 0, 0, ow, oh);
      const bm = await createImageBitmap(cv);
      frames.push({ bitmap: bm, w: ow, h: oh });
      progress.set((i + 1) / total * 0.5);
    }
    const gif = await AnimEncoders.buildGif(frames, {
      fps, loop: 0, paletteMode: palette,
      onProgress: pct => progress.set(0.5 + pct * 0.5),
      onStatus: msg => log.dim('  ' + msg)
    });
    outBlob = gif;
    outExt = 'gif';
    showOutput();
    log.ok(`生成 GIF ${fmtBytes(gif.size)}`);
  }

  // ===== Chroma Key (背景去除) =====
  async function doChromaKey() {
    const { w, h, duration } = srcMeta;
    const autoCorner = $('keyAuto').checked;
    const keyHex = $('keyColor').value;
    const tol = parseInt($('keyTol').value, 10);
    const feather = parseInt($('keyFeather').value, 10);
    const choke = parseInt($('keyChoke').value, 10) || 0;
    const spill = parseInt($('keySpill').value, 10);
    const fps = parseInt($('keyFps').value, 10) || 24;
    const outputFmt = $('keyOutput').value;

    let keyRGB = hexToRgb(keyHex);
    if (!keyRGB) { log.err('无效 hex'); return; }

    const total = Math.max(1, Math.floor(duration * fps));
    log.dim(`抽 ${total} 帧 @ ${fps} FPS, 色键 ${keyHex}, tol=${tol}, feather=${feather}...`);

    // process each frame
    const srcCv = newCanvas(w, h);
    const sctx = srcCv.getContext('2d');
    const frameBitmaps = [];      // for apng / gif (needs ImageBitmap)
    const framePngBlobs = [];     // for PNG ZIP

    for (let i = 0; i < total; i++) {
      const t = Math.min(duration - 0.001, i / fps);
      await seekVideo(srcVideo, t);
      sctx.clearRect(0, 0, w, h);
      sctx.drawImage(srcVideo, 0, 0);
      // auto pick key color from top-left of first frame
      if (autoCorner && i === 0) {
        const d = sctx.getImageData(0, 0, 1, 1).data;
        keyRGB = { r: d[0], g: d[1], b: d[2] };
        log.dim(`  自动取色: rgb(${d[0]}, ${d[1]}, ${d[2]})`);
      }
      applyChromaKeyToCanvas(srcCv, keyRGB, tol, feather, spill, choke);
      if (outputFmt === 'png-zip') {
        const blob = await canvasToBlob(srcCv, 'image/png');
        framePngBlobs.push(blob);
      } else {
        const bm = await createImageBitmap(srcCv);
        frameBitmaps.push({ bitmap: bm, w, h });
      }
      progress.set((i + 1) / total * 0.6);
    }

    // encode
    if (outputFmt === 'png-zip') {
      log.dim('打包 PNG 帧 ZIP...');
      const files = [];
      for (let i = 0; i < framePngBlobs.length; i++) {
        const data = new Uint8Array(await framePngBlobs[i].arrayBuffer());
        files.push({ name: `frame_${String(i).padStart(4,'0')}.png`, data });
      }
      const zip = Toolkit.makeZip(files);
      outBlob = zip;
      outExt = 'zip';
      showOutputAsZipInfo(framePngBlobs.length);
      log.ok(`完成 ${framePngBlobs.length} 帧 PNG ZIP (${fmtBytes(zip.size)})`);
    } else if (outputFmt === 'apng') {
      log.dim('编码 APNG...');
      const apng = await AnimEncoders.buildApng(frameBitmaps, {
        fps, loop: 0,
        onProgress: p => progress.set(0.6 + p * 0.4)
      });
      outBlob = apng;
      outExt = 'png';
      showOutput();
      log.ok(`完成 APNG (${fmtBytes(apng.size)})`);
    } else if (outputFmt === 'gif') {
      log.dim('编码 GIF (透明色 = 抠掉的背景)...');
      // For GIF transparency we need to map alpha<128 → transparent palette index.
      // Our AnimEncoders.buildGif currently does palette quantization, transparency in GIF
      // is handled by setting one palette index as transparent.
      // Simplification: replace alpha<128 pixels with a unique magenta marker, post-process.
      // But buildGif doesn't take alpha into account. For now, just render with hard-edged
      // alpha replaced by a chroma color and use buildGif (GIF will treat those pixels as
      // background color rather than transparent). To get real transparency, we'd need
      // to extend buildGif. Document this limitation.
      log.warn('注意: 当前实现的 GIF 不支持透明,抠掉区域会变成纯色。建议用 APNG 或 PNG ZIP。');
      const gif = await AnimEncoders.buildGif(frameBitmaps, {
        fps, loop: 0, paletteMode: 'median',
        onProgress: p => progress.set(0.6 + p * 0.4)
      });
      outBlob = gif;
      outExt = 'gif';
      showOutput();
      log.ok(`完成 GIF (${fmtBytes(gif.size)})`);
    } else if (outputFmt === 'mp4') {
      log.dim('编码 MP4 (H.264, 透明区填充指定色)...');
      if (!('VideoEncoder' in window)) throw new Error('当前浏览器不支持 WebCodecs, 改用 PNG ZIP / APNG');
      const bg = hexToRgb($('keyBgColor').value) || { r: 0, g: 0, b: 0 };
      const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/mp4-muxer@5.1.5');
      const muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video: { codec: 'avc', width: w, height: h },
        fastStart: 'in-memory'
      });
      let encoderError = null;
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => { encoderError = e; log.err('encoder: ' + e.message); }
      });
      encoder.configure({
        codec: h264Codec(w, h, fps),
        width: w, height: h,
        bitrate: 3_000_000,
        framerate: fps
      });
      const cv = newCanvas(w, h);
      const ctx = cv.getContext('2d');
      for (let i = 0; i < frameBitmaps.length; i++) {
        if (encoderError) break;
        // fill background color first
        ctx.fillStyle = `rgb(${bg.r}, ${bg.g}, ${bg.b})`;
        ctx.fillRect(0, 0, w, h);
        // composite the alpha-keyed frame on top — transparent pixels show bg color
        ctx.drawImage(frameBitmaps[i].bitmap, 0, 0);
        const vf = new VideoFrame(cv, { timestamp: Math.round(i * 1e6 / fps) });
        encoder.encode(vf, { keyFrame: i % 30 === 0 });
        vf.close();
        progress.set(0.6 + (i + 1) / frameBitmaps.length * 0.4);
      }
      await encoder.flush();
      encoder.close();
      muxer.finalize();
      if (encoderError) throw new Error('视频编码失败: ' + encoderError.message);
      if (!validateMp4Buffer(muxer.target.buffer)) throw new Error('输出 MP4 校验失败 — 编码可能未完成或损坏');
      outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
      outExt = 'mp4';
      showOutput();
      log.ok(`完成 MP4 (${fmtBytes(outBlob.size)})`);
    } else if (outputFmt === 'webm-alpha') {
      log.dim('编码 WebM VP9 + alpha (真透明)...');
      if (!('VideoEncoder' in window)) throw new Error('当前浏览器不支持 WebCodecs');
      const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/webm-muxer@5.0.3');
      const muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video: { codec: 'V_VP9', width: w, height: h, alpha: true },
      });
      let encoderError = null;
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => { encoderError = e; log.err('encoder: ' + e.message); }
      });
      try {
        encoder.configure({
          codec: 'vp09.00.10.08',
          width: w, height: h,
          bitrate: 3_000_000,
          framerate: fps,
          alpha: 'keep'  // KEY: keep alpha channel
        });
      } catch (e) {
        throw new Error('VP9 alpha 编码不支持 (Chrome 113+): ' + e.message);
      }
      for (let i = 0; i < frameBitmaps.length; i++) {
        if (encoderError) break;
        const vf = new VideoFrame(frameBitmaps[i].bitmap, { timestamp: Math.round(i * 1e6 / fps), alpha: 'keep' });
        encoder.encode(vf, { keyFrame: i % 30 === 0 });
        vf.close();
        progress.set(0.6 + (i + 1) / frameBitmaps.length * 0.4);
      }
      await encoder.flush();
      encoder.close();
      muxer.finalize();
      if (encoderError) throw new Error('视频编码失败: ' + encoderError.message);
      if (!validateWebmBuffer(muxer.target.buffer)) throw new Error('输出 WebM 校验失败 — 编码可能未完成或损坏');
      outBlob = new Blob([muxer.target.buffer], { type: 'video/webm' });
      outExt = 'webm';
      showOutput();
      log.ok(`完成 WebM (VP9 + alpha) ${fmtBytes(outBlob.size)}`);
    } else if (outputFmt === 'webm') {
      log.dim('编码 WebM (MediaRecorder, alpha 区域变黑)...');
      const cv = newCanvas(w, h);
      const ctx = cv.getContext('2d');
      const stream = cv.captureStream(0);
      const track = stream.getVideoTracks()[0];
      const mimeType = 'video/webm;codecs=vp9';
      if (!MediaRecorder.isTypeSupported(mimeType)) throw new Error('当前浏览器不支持 ' + mimeType);
      const chunks = [];
      const recorder = new MediaRecorder(stream, { mimeType });
      recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
      const done = new Promise(resolve => { recorder.onstop = resolve; });
      recorder.start();
      const interval = 1 / fps;
      for (let i = 0; i < frameBitmaps.length; i++) {
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(frameBitmaps[i].bitmap, 0, 0);
        if (track.requestFrame) track.requestFrame();
        await new Promise(r => setTimeout(r, interval * 1000));
      }
      await new Promise(r => setTimeout(r, 200));
      recorder.stop();
      await done;
      outBlob = new Blob(chunks, { type: 'video/webm' });
      outExt = 'webm';
      showOutput();
      log.ok(`完成 WebM (${fmtBytes(outBlob.size)})`);
    }
    progress.hide();
  }

  function hexToRgb(hex) {
    const m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex.trim());
    if (!m) return null;
    return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
  }

  // chroma key 算法:距离用 BT.601 YCbCr 的 Cb-Cr 平面 (丢掉 luma Y),
  // 跟 Premiere 等专业软件的色键一致 — 同一种颜色不同亮度都能干净抠掉,
  // 主体上的阴影也不会被误判。
  // spill 抑制:对所有保留像素压制残留的 key 通道,修复完全不透明的特效
  // (剑光/烟雾/运动模糊) 带绿调的常见问题。
  // choke:对 alpha 通道做 px 次 4 邻域最小值卷积,蒙版往内收,
  // 干掉 anti-aliased 边缘那 1-2 个泛绿的边毛刺 (PR Ultra Key 同款)。
  function applyChromaKeyToCanvas(canvas, key, tol, feather, spill, choke) {
    const w = canvas.width, h = canvas.height;
    const ctx = canvas.getContext('2d');
    const img = ctx.getImageData(0, 0, w, h);
    const d = img.data;
    // BT.601 Cb / Cr of the key color. Y is intentionally omitted.
    const keyCb = -0.168736 * key.r - 0.331264 * key.g + 0.5 * key.b + 128;
    const keyCr =  0.5 * key.r - 0.418688 * key.g - 0.081312 * key.b + 128;
    // Legacy slider is 0..200 in RGB-distance units. Cb-Cr distance is a
    // tighter scale (max ~127), so map proportionally — tol 60 ≈ chroma 30
    // (clean key), tol 120 ≈ chroma 60 (looser).
    const tolChroma = tol * 0.5;
    const softLoChroma = tolChroma * 0.6;
    const isGreenKey = key.g > key.r && key.g > key.b;
    const isBlueKey  = key.b > key.r && key.b > key.g;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const cb = -0.168736 * r - 0.331264 * g + 0.5 * b + 128;
      const cr =  0.5 * r - 0.418688 * g - 0.081312 * b + 128;
      const dCb = cb - keyCb, dCr = cr - keyCr;
      const dist = Math.sqrt(dCb * dCb + dCr * dCr);
      let alpha;
      if (dist <= softLoChroma) alpha = 0;
      else if (dist >= tolChroma) alpha = 255;
      else alpha = Math.round((dist - softLoChroma) / (tolChroma - softLoChroma) * 255);
      d[i + 3] = alpha;
      // despill: applies to ALL kept pixels (including alpha=255)
      if (spill > 0 && alpha > 0) {
        if (isGreenKey) {
          const cap = Math.max(r, b);
          if (g > cap) d[i+1] = spill === 2 ? cap : ((g + cap) >> 1);
        } else if (isBlueKey) {
          const cap = Math.max(r, g);
          if (b > cap) d[i+2] = spill === 2 ? cap : ((b + cap) >> 1);
        }
      }
    }
    ctx.putImageData(img, 0, 0);

    // matte choke: erode the alpha channel by `choke` pixels via repeated
    // 4-neighborhood min filter. Done BEFORE feather so the blur softens
    // the already-tightened edge rather than the original noisy one.
    if (choke > 0) chokeAlpha(canvas, choke);

    if (feather > 0) {
      const tmp = newCanvas(w, h);
      const tctx = tmp.getContext('2d');
      tctx.filter = `blur(${feather}px)`;
      tctx.drawImage(canvas, 0, 0);
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(tmp, 0, 0);
    }
  }

  function chokeAlpha(canvas, px) {
    const w = canvas.width, h = canvas.height;
    const ctx = canvas.getContext('2d');
    const img = ctx.getImageData(0, 0, w, h);
    let a = new Uint8Array(w * h);
    for (let i = 0, j = 3; i < a.length; i++, j += 4) a[i] = img.data[j];
    for (let pass = 0; pass < px; pass++) {
      const next = new Uint8Array(a);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = y * w + x;
          let m = a[idx];
          if (x > 0)     m = Math.min(m, a[idx - 1]);
          if (x < w - 1) m = Math.min(m, a[idx + 1]);
          if (y > 0)     m = Math.min(m, a[idx - w]);
          if (y < h - 1) m = Math.min(m, a[idx + w]);
          next[idx] = m;
        }
      }
      a = next;
    }
    for (let i = 0, j = 3; i < a.length; i++, j += 4) img.data[j] = a[i];
    ctx.putImageData(img, 0, 0);
  }

  function showOutput() {
    $('outBox').innerHTML = '';
    const url = URL.createObjectURL(outBlob);
    if (outExt === 'gif') {
      const img = document.createElement('img');
      img.src = url;
      $('outBox').appendChild(img);
    } else {
      const v = document.createElement('video');
      v.src = url; v.controls = true; v.autoplay = true; v.loop = true; v.muted = true;
      v.style.maxWidth = '100%'; v.style.maxHeight = '100%';
      $('outBox').appendChild(v);
    }
    $('downloadBtn').disabled = false;
    updateHandoff();
  }

  function showOutputAsZipInfo(frameCount) {
    $('outBox').innerHTML = `
      <div style="text-align:center; color: var(--muted-2)">
        <div style="font-size:48px">📦</div>
        <div><strong>${frameCount}</strong> 帧已打包为 ZIP</div>
        <div class="small muted">${fmtBytes(outBlob.size)}</div>
      </div>
    `;
    $('downloadBtn').disabled = false;
    updateHandoff();
  }

  // Update the handoff button's payload based on current outBlob / outExt.
  // Maps the output extension to the correct MIME so the dropdown targets the right tools.
  function updateHandoff() {
    if (!handoff || !outBlob) return;
    const mimeMap = {
      'mp4':  'video/mp4',
      'webm': 'video/webm',
      'gif':  'image/gif',
      'png':  'image/png',     // APNG → image/png (image editors accept)
      'zip':  'application/zip'
    };
    const mime = mimeMap[outExt] || 'application/octet-stream';
    const name = ($('filename').value || 'output').replace(/[^\w-]/g, '_');
    const ext = outExt === 'zip' ? '_frames.zip' : '.' + outExt;
    handoff.setBlob(outBlob, name + ext, mime);
  }

  function seekVideo(video, t) {
    return new Promise((resolve) => {
      // Skip the round-trip when we're already at the target time, otherwise
      // `seeked` won't fire and the promise hangs — that hang silently
      // truncates encoded output (same class as the playable-slim bug).
      if (Math.abs(video.currentTime - t) < 1e-4) { resolve(); return; }
      const onSeek = () => { video.removeEventListener('seeked', onSeek); resolve(); };
      video.addEventListener('seeked', onSeek);
      video.currentTime = t;
    });
  }

  // H.264 codec string from the profile selector. Baseline is the default
  // for older-device compatibility; Main and High give 5-20% better
  // compression at the same bitrate but every modern browser and ≥2014-ish
  // hardware decoder supports both. Affects all three MP4 encoder paths.
  // Build the WebCodecs codec string `avc1.PPCCLL` for the selected H.264
  // profile, picking the AVC level dynamically from the (width, height, fps)
  // requested so the encoder doesn't reject content larger than the level's
  // ceiling. (Old code hardcoded Baseline @ Level 3.1 — max 1280×720 @ 30 —
  // so any 1080p+ video at Baseline blew up at encoder.configure() with
  // "AVC level (0x1F) indicated by the codec string. You must either specify
  // a lower resolution or higher AVC level." then every subsequent encode()
  // hit "Cannot call 'encode' on a closed codec.")
  function h264Codec(w, h, fps) {
    const p = document.getElementById('h264Profile')?.value || 'baseline';
    const pp = p === 'high' ? '64' : p === 'main' ? '4D' : '42';
    // Constraint flag byte preserves the previous behavior per profile
    // (CC=40 for Main; CC=00 for Baseline / High).
    const cc = p === 'main' ? '40' : '00';
    const ll = pickAvcLevelHex(w, h, fps);
    return `avc1.${pp}${cc}${ll}`;
  }

  // Map (frame size, framerate) → the lowest AVC level that can encode it.
  // Reference: ITU-T H.264 Annex A.3.1 Table A-1 (MaxFrameSize / MaxMBPS).
  // 1 macroblock = 16×16 pixels. Returns level_idc as a 2-char uppercase
  // hex string for splicing into the avc1.PPCCLL codec string.
  function pickAvcLevelHex(w, h, fps) {
    const mbs = Math.ceil((w || 1) / 16) * Math.ceil((h || 1) / 16);
    const mbPerSec = mbs * (fps || 30);
    const levels = [
      [0x1F,   3600,   108000],  // 3.1: 1280×720 @ 30
      [0x20,   5120,   216000],  // 3.2: 1280×720 @ 60
      [0x28,   8192,   245760],  // 4.0: 1920×1080 @ 30
      [0x29,   8192,   245760],  // 4.1: 1920×1080 @ 30 (higher bitrate cap)
      [0x2A,   8704,   522240],  // 4.2: 1920×1080 @ 60
      [0x32,  22080,   589824],  // 5.0: 2560×1440 @ 30
      [0x33,  36864,   983040],  // 5.1: 4096×2160 @ 30
      [0x34,  36864,  2073600],  // 5.2: 4096×2160 @ 60
      [0x3C, 139264,  4177920],  // 6.0: 8192×4320 @ 30
      [0x3D, 139264,  8355840],  // 6.1: 8192×4320 @ 60
      [0x3E, 139264, 16711680]   // 6.2: 8192×4320 @ 120
    ];
    for (const [lv, maxMbs, maxMbPerSec] of levels) {
      if (mbs <= maxMbs && mbPerSec <= maxMbPerSec) {
        return lv.toString(16).toUpperCase().padStart(2, '0');
      }
    }
    return '3E';  // saturate at 6.2
  }

  // Quick MP4 sanity check — must be at least 1KB AND have the "ftyp" box
  // signature at offset 4 (bytes 0x66 0x74 0x79 0x70). Used right after
  // muxer.finalize() to refuse to hand back a corrupt buffer.
  function validateMp4Buffer(buf) {
    if (!buf || buf.byteLength < 1024) return false;
    const u = new Uint8Array(buf, 0, 12);
    return u[4] === 0x66 && u[5] === 0x74 && u[6] === 0x79 && u[7] === 0x70;
  }
  // Same idea for WebM — first 4 bytes must be the EBML header (0x1A 0x45
  // 0xDF 0xA3) and the file must be plausibly long.
  function validateWebmBuffer(buf) {
    if (!buf || buf.byteLength < 1024) return false;
    const u = new Uint8Array(buf, 0, 4);
    return u[0] === 0x1A && u[1] === 0x45 && u[2] === 0xDF && u[3] === 0xA3;
  }

  $('downloadBtn').addEventListener('click', () => {
    if (!outBlob) return;
    const name = ($('filename').value || 'output').replace(/[^\w-]/g, '_');
    const ext = outExt === 'zip' ? '_frames.zip' : '.' + outExt;
    download(outBlob, name + ext);
  });

  $('clearBtn').addEventListener('click', () => {
    if (srcUrl) URL.revokeObjectURL(srcUrl);
    srcVideo = null; srcUrl = null; srcMeta = null; outBlob = null;
    $('srcBox').innerHTML = '<div class="preview-empty">拖入视频</div>';
    $('outBox').innerHTML = '<div class="preview-empty">Dobby 干完显示在这里</div>';
    $('stats').textContent = 'Dobby 待命';
    $('actionControls').innerHTML = '';
    $('applyBtn').disabled = true;
    $('downloadBtn').disabled = true;
    log.clear();
    $('fileInput').value = '';
  });
})();
</script>
</body>
</html>
