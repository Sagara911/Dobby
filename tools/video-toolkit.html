  $('applyBtn').addEventListener('click', async () => {
    const action = $('action').value;
    // Source-presence gate differs per action: fromFrames needs srcFrames,
    // everything else needs srcVideo. Reject early with a helpful message.
    if (action === 'fromFrames') {
      if (!srcFrames.length) { log.err(Toolkit.T('vt.err.noFrames', null, 'Dobby 手里还没序列帧,你先丢一组?')); return; }
    } else {
      if (!srcVideo) { log.err(Toolkit.T('vt.err.noVideo', null, 'Dobby 手里还没视频,你先丢一个?')); return; }
    }
    $('applyBtn').disabled = true;
    $('downloadBtn').disabled = true;
    log.dim(Toolkit.T('vt.log.apply', { action }, `应用 ${action}...`));
    try {
      if (action === 'fromFrames') await doFramesToVideo();
      else if (action === 'frames') await doExtractFrames();
      else if (action === 'toGif') await doToGif();
      else if (action === 'chromaKey') await doChromaKey();
      else if (action === 'changeFps' && /^optical/.test($('cfpsMode')?.value || '')) await doChangeFpsOptical();
      else await doReencodeWebm(action);  // trim/crop/resize/speed/reverse/filter all share this path
    } catch (e) {
      log.err(e.message);
      console.error(e);
    } finally {
      $('applyBtn').disabled = false;
      progress.hide();
    }
  });

  async function doReencodeWebm(action) {
    const { w: sw, h: sh, duration } = srcMeta;
    // determine output params
    let outW = sw, outH = sh, srcX = 0, srcY = 0, srcW = sw, srcH = sh;
    let startT = 0, endT = duration;
    let speed = 1;
    let reverse = false;
    // ── Hide srcVideo preview during encode ─────────────────────────
    // The encode pipeline seeks srcVideo to every frame in sequence and
    // draws it to the offscreen canvas. Since srcVideo is the VISIBLE
    // element in the .srcBox preview pane, every seek triggers a full
    // repaint of the preview area — for a 1-min video at 30fps that's
    // 1800 visible repaints in sequence, which looks like the whole page
    // is "flashing/strobing" while the encode runs. Hiding it during the
    // loop lets users see a stable progress bar instead of a strobe.
    // visibility (not display:none) preserves layout so the page doesn't
    // jump when we restore it after the encode finishes.
    const _preserveVis = srcVideo.style.visibility;
    srcVideo.style.visibility = 'hidden';
    // canvas filter chain (built once for 'filter' action, applied to every frame draw)
    let canvasFilter = 'none';
    if (action === 'filter') {
      const parts = [];
      if ($('vfGray')?.checked) parts.push('grayscale(100%)');
      if ($('vfSepia')?.checked) parts.push('sepia(100%)');
      if ($('vfInvert')?.checked) parts.push('invert(100%)');
      const bri = $('vfBri')?.value; if (bri && bri !== '100') parts.push(`brightness(${bri}%)`);
      const con = $('vfCon')?.value; if (con && con !== '100') parts.push(`contrast(${con}%)`);
      const sat = $('vfSat')?.value; if (sat && sat !== '100') parts.push(`saturate(${sat}%)`);
      const hue = $('vfHue')?.value; if (hue && hue !== '0') parts.push(`hue-rotate(${hue}deg)`);
      canvasFilter = parts.length ? parts.join(' ') : 'none';
    }
    if (action === 'compress') {
      const preset = $('cmpPreset')?.value || 'small';
      const maxDim = preset === 'tiny' ? 480 : preset === 'small' ? 720 : Math.max(sw, sh);
      const scale = Math.min(1, maxDim / Math.max(sw, sh));
      // H.264 needs even dimensions
      outW = Math.max(2, Math.round(sw * scale / 2) * 2);
      outH = Math.max(2, Math.round(sh * scale / 2) * 2);
    } else if (action === 'trim') {
      startT = parseFloat($('trimStart').value);
      endT = parseFloat($('trimEnd').value);
      if (endT <= startT) throw new Error(Toolkit.T('vt.err.trimRange', null, '结束时间必须大于起始时间'));
    } else if (action === 'crop') {
      srcX = parseInt($('cropX').value, 10);
      srcY = parseInt($('cropY').value, 10);
      srcW = parseInt($('cropW').value, 10);
      srcH = parseInt($('cropH').value, 10);
      outW = srcW; outH = srcH;
    } else if (action === 'resize') {
      outW = parseInt($('newW').value, 10);
      outH = parseInt($('newH').value, 10);
    } else if (action === 'speed') {
      speed = parseInt($('speedMul').value, 10) / 100;
    } else if (action === 'reverse') {
      reverse = true;
    }

    // H.264 / VP9 (4:2:0 chroma) require EVEN frame dimensions. An odd-sized
    // source (e.g. 519×932) reaching trim/crop/resize/speed/reverse would feed
    // the encoder an odd frame → it errors ("only supports even sized frames")
    // and then closes the codec, so every later encode() throws on a closed
    // codec. Clamp down to even here so every path is safe.
    outW = Math.max(2, outW - (outW % 2));
    outH = Math.max(2, outH - (outH % 2));

    const cv = newCanvas(outW, outH);
    const ctx = cv.getContext('2d');
    const fmt = $('outFormat').value;
    const bitrate = (parseInt($('bitrate').value, 10) || 3000) * 1000;
    // Output FPS: 30 by default, user-overridable via the changeFps action.
    // For changeFps blend mode, pushFrame stashes the previous source sample
    // in prevSampleCanvas and composites it under each new frame at 50% alpha,
    // producing a motion-blur-like smoothing between adjacent samples.
    const fpsNum = action === 'changeFps' ? (parseInt($('cfpsTarget')?.value, 10) || 30) : 30;
    const cfpsMode = action === 'changeFps' ? ($('cfpsMode')?.value || 'blend') : 'dup';
    const interval = 1 / fpsNum;

    if (fmt === 'mp4') {
      // === WebCodecs + mp4-muxer path (Chrome/Edge 113+) ===
      if (!('VideoEncoder' in window)) {
        log.warn(Toolkit.T('vt.warn.noWebCodecs', null, '当前浏览器不支持 WebCodecs,回退到 WebM'));
        return doReencodeAsWebM(action, cv, ctx, srcX, srcY, srcW, srcH, outW, outH, startT, endT, speed, reverse, fpsNum, interval, 'webm-vp9', bitrate, canvasFilter);
      }
      log.dim(Toolkit.T('vt.log.loadMuxer', null, '加载 mp4-muxer (首次联网)...'));
      const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/mp4-muxer@5.1.5');
      const muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video: { codec: 'avc', width: outW, height: outH },
        fastStart: 'in-memory'
      });
      let encoderError = null;
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => { encoderError = e; log.err('encoder: ' + e.message); }
      });
      encoder.configure({
        codec: h264Codec(outW, outH, fpsNum),
        width: outW, height: outH,
        bitrate,
        framerate: fpsNum
      });
      log.dim(Toolkit.T('vt.log.mp4Encode', { w: outW, h: outH, fps: fpsNum, kbps: (bitrate/1000)|0 }, `MP4 编码 ${outW}×${outH} @ ${fpsNum}fps, ${(bitrate/1000)|0}kbps...`));

      let frameIdx = 0;
      ctx.filter = canvasFilter;
      // ── Encoder backpressure ─────────────────────────────────────
      // Without this, encoder.encode() calls can stack into encoder's
      // internal queue faster than the encoder can drain them. For long
      // (5min+) videos the queue grows unbounded — Chrome silently drops
      // frames once a memory threshold is hit, and the encoded MP4 ends
      // up truncated or never finalizes. Wait when queue > 30.
      async function backpressureWait() {
        // 30 frames ≈ 1 second of footage at 30fps; safe in-flight count.
        while (encoder.encodeQueueSize > 30) {
          await new Promise(r => setTimeout(r, 30));
        }
      }
      // For changeFps blend mode: remember the previously sampled canvas so we
      // can composite the *next* sample over it at 50% alpha, producing a
      // half-step motion-blur between adjacent output frames.
      const prevSample = (action === 'changeFps' && cfpsMode === 'blend') ? newCanvas(outW, outH) : null;
      const prevCtx = prevSample ? prevSample.getContext('2d') : null;
      let havePrev = false;
      async function pushFrame(t, ts) {
        await seekVideo(srcVideo, t);
        ctx.clearRect(0, 0, outW, outH);
        ctx.drawImage(srcVideo, srcX, srcY, srcW, srcH, 0, 0, outW, outH);
        if (prevSample && havePrev) {
          ctx.globalAlpha = 0.5;
          ctx.drawImage(prevSample, 0, 0);
          ctx.globalAlpha = 1;
        }
        const vf = new VideoFrame(cv, { timestamp: ts });
        // keyframe every 30 frames
        encoder.encode(vf, { keyFrame: frameIdx % 30 === 0 });
        vf.close();
        frameIdx++;
        if (prevSample) {
          prevCtx.clearRect(0, 0, outW, outH);
          prevCtx.drawImage(srcVideo, srcX, srcY, srcW, srcH, 0, 0, outW, outH);
          havePrev = true;
        }
      }

      try {
        if (!reverse) {
          const playSpan = endT - startT;
          let t = startT;
          while (t < endT) {
            await backpressureWait();
            await pushFrame(t, Math.round((frameIdx / fpsNum) * 1e6));
            progress.set((t - startT) / playSpan);
            t += interval * speed;
          }
        } else {
          let t = endT;
          const playSpan = endT - startT;
          while (t > startT) {
            await backpressureWait();
            await pushFrame(t, Math.round((frameIdx / fpsNum) * 1e6));
            progress.set(1 - (t - startT) / playSpan);
            t -= interval;
          }
        }
        await encoder.flush();
        encoder.close();
        muxer.finalize();
        if (encoderError) throw new Error(Toolkit.T('vt.err.encode', { msg: encoderError.message }, `视频编码失败: ${encoderError.message}`));
        if (!validateMp4Buffer(muxer.target.buffer)) throw new Error(Toolkit.T('vt.err.mp4Validate', null, '输出 MP4 校验失败 — 编码可能未完成或损坏'));
        outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
        outExt = 'mp4';
        showOutput();
        log.ok(Toolkit.T('vt.log.mp4Done', { size: fmtBytes(outBlob.size) }, `生成 MP4 ${fmtBytes(outBlob.size)}`));
      } finally {
        // Always restore preview visibility — even on error / cancel
        srcVideo.style.visibility = _preserveVis;
      }
      return;
    }

    // === MediaRecorder path (WebM) ===
    try {
      return await doReencodeAsWebM(action, cv, ctx, srcX, srcY, srcW, srcH, outW, outH, startT, endT, speed, reverse, fpsNum, interval, fmt, bitrate, canvasFilter);
    } finally {
      srcVideo.style.visibility = _preserveVis;
    }
  }

  async function doReencodeAsWebM(action, cv, ctx, srcX, srcY, srcW, srcH, outW, outH, startT, endT, speed, reverse, fpsNum, interval, fmt, bitrate, canvasFilter) {
    if (canvasFilter && canvasFilter !== 'none') ctx.filter = canvasFilter;
    const stream = cv.captureStream(0);
    const track = stream.getVideoTracks()[0];
    const mimeType = fmt === 'webm-vp9' ? 'video/webm;codecs=vp9' : 'video/webm;codecs=vp8';
    if (!MediaRecorder.isTypeSupported(mimeType)) throw new Error(Toolkit.T('vt.err.noMime', { mime: mimeType }, `当前浏览器不支持 ${mimeType}`));
    const chunks = [];
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: bitrate });
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    const done = new Promise(resolve => { recorder.onstop = resolve; });
    recorder.start();
    // Same blend setup as the MP4 path — for changeFps blend mode, overlay
    // the previous sample at 50% alpha to fake a half-step in-between frame.
    const cfpsMode = action === 'changeFps' ? ($('cfpsMode')?.value || 'blend') : 'dup';
    const prevSample = (action === 'changeFps' && cfpsMode === 'blend') ? newCanvas(outW, outH) : null;
    const prevCtx = prevSample ? prevSample.getContext('2d') : null;
    let havePrev = false;
    const drawSample = (t) => {
      ctx.clearRect(0, 0, outW, outH);
      ctx.drawImage(srcVideo, srcX, srcY, srcW, srcH, 0, 0, outW, outH);
      if (prevSample && havePrev) {
        ctx.globalAlpha = 0.5;
        ctx.drawImage(prevSample, 0, 0);
        ctx.globalAlpha = 1;
      }
      if (prevSample) {
        prevCtx.clearRect(0, 0, outW, outH);
        prevCtx.drawImage(srcVideo, srcX, srcY, srcW, srcH, 0, 0, outW, outH);
        havePrev = true;
      }
    };

    if (!reverse) {
      const playSpan = endT - startT;
      let t = startT;
      while (t < endT) {
        await seekVideo(srcVideo, t);
        drawSample(t);
        if (track.requestFrame) track.requestFrame();
        progress.set((t - startT) / playSpan);
        t += interval * speed;
      }
    } else {
      let t = endT;
      const playSpan = endT - startT;
      while (t > startT) {
        await seekVideo(srcVideo, t);
        drawSample(t);
        if (track.requestFrame) track.requestFrame();
        progress.set(1 - (t - startT) / playSpan);
        t -= interval;
      }
    }
    await new Promise(r => setTimeout(r, 200));
    recorder.stop();
    await done;
    outBlob = new Blob(chunks, { type: 'video/webm' });
    outExt = 'webm';
    showOutput();
    log.ok(Toolkit.T('vt.log.webmDone', { size: fmtBytes(outBlob.size) }, `生成 WebM ${fmtBytes(outBlob.size)}`));
  }

  // ChangeFps with optical-flow interpolation (RIFE on WebGPU, or Farnebäck
  // on CPU as fallback). Assumes a source reference FPS of 30 (matches the
  // rest of the pipeline's seek sampling). For each output frame at time t,
  // we compute the bracketing source-frame indices and either reuse a source
  // sample directly (alpha ≈ 0 or 1) or call the active backend to synthesize
  // the in-between. Source samples are cached so we never seek the same time
  // twice in a row.
  async function doChangeFpsOptical() {
    const mode = $('cfpsMode')?.value || 'optical';
    const { w: sw, h: sh, duration } = srcMeta;
    const target = parseInt($('cfpsTarget').value, 10) || 30;
    const statusEl = $('cfpsRifeStatus');
    if (statusEl) statusEl.style.display = '';

    // Pick backend per user choice, with auto-fallback.
    //   optical       → RIFE if WebGPU, else Farnebäck, else throw
    //   optical-rife  → RIFE only (throws if no WebGPU)
    //   optical-fb    → Farnebäck only
    let backend = null;  // { name, prepare(), interpolate(A, B, α, out) }
    const tryRife = async () => {
      if (!window.RIFE) throw new Error(Toolkit.T('vt.err.rifeMissing', null, 'RIFE 模块Dobby 待命'));
      await window.RIFE.prepare({
        onStatus: msg => { log.dim(msg); if (statusEl) statusEl.textContent = msg; },
        onProgress: p => {
          if (statusEl) statusEl.textContent = Toolkit.T('vt.rife.downloading', { pct: (p*100)|0 }, `下载 RIFE 模型 ${(p*100)|0}%...`);
          progress.set(p * 0.2);
        }
      });
      return { name: 'RIFE (WebGPU)', interpolate: window.RIFE.interpolate };
    };
    const tryFarneback = async () => {
      if (!window.Farneback) throw new Error(Toolkit.T('vt.err.fbMissing', null, 'Farnebäck 模块Dobby 待命'));
      await window.Farneback.prepare({
        onStatus: msg => { log.dim(msg); if (statusEl) statusEl.textContent = msg; }
      });
      return { name: 'Farnebäck (CPU)', interpolate: window.Farneback.interpolate };
    };
    if (mode === 'optical-rife') {
      backend = await tryRife();
    } else if (mode === 'optical-fb') {
      backend = await tryFarneback();
    } else {
      // auto: try RIFE first, fall back on any failure
      try { backend = await tryRife(); }
      catch (e) {
        log.warn(Toolkit.T('vt.warn.rifeUnavail', { msg: e.message }, `RIFE 不可用 (${e.message}), 降级到 Farnebäck CPU`));
        if (statusEl) statusEl.textContent = Toolkit.T('vt.status.rifeFallback', null, 'RIFE 不可用,改用 Farnebäck CPU...');
        backend = await tryFarneback();
      }
    }
    log.ok(Toolkit.T('vt.log.opticalBackend', { name: backend.name }, `光流后端: ${backend.name}`));
    if (statusEl) statusEl.textContent = Toolkit.T('vt.status.backendReady', { name: backend.name }, `✓ ${backend.name} 就绪, 开始推理`);

    const fmt = $('outFormat').value;
    const bitrate = (parseInt($('bitrate').value, 10) || 3000) * 1000;
    const SRC_FPS = 30;  // reference; matches doReencodeWebm's sampling cadence
    const srcInterval = 1 / SRC_FPS;
    const outInterval = 1 / target;

    // H.264 only supports even dims
    const outW = Math.max(2, Math.round(sw / 2) * 2);
    const outH = Math.max(2, Math.round(sh / 2) * 2);

    // src sample cache (last 2 we visited)
    const cache = new Map();
    async function getSrcAt(idx) {
      if (cache.has(idx)) return cache.get(idx);
      const t = Math.min(duration - 0.001, idx / SRC_FPS);
      await seekVideo(srcVideo, t);
      const cv = newCanvas(outW, outH);
      cv.getContext('2d').drawImage(srcVideo, 0, 0, sw, sh, 0, 0, outW, outH);
      cache.set(idx, cv);
      // keep only the 3 most recent
      if (cache.size > 3) cache.delete(cache.keys().next().value);
      return cv;
    }

    const outCv = newCanvas(outW, outH);
    const ctx = outCv.getContext('2d');
    const tmpInterp = newCanvas(outW, outH);

    if (fmt !== 'mp4') {
      log.warn(Toolkit.T('vt.warn.opticalMp4Only', null, '光流补帧目前只走 MP4 (WebCodecs) 输出路径'));
      return;
    }
    if (!('VideoEncoder' in window)) {
      throw new Error(Toolkit.T('vt.err.noWebCodecsOpt', null, '当前浏览器不支持 WebCodecs, 光流补帧需要 WebCodecs + WebGPU'));
    }

    log.dim(Toolkit.T('vt.log.loadMuxer', null, '加载 mp4-muxer (首次联网)...'));
    const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/mp4-muxer@5.1.5');
    const muxer = new Muxer({
      target: new ArrayBufferTarget(),
      video: { codec: 'avc', width: outW, height: outH },
      fastStart: 'in-memory'
    });
    let encoderError = null;
    const encoder = new VideoEncoder({
      output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
      error: e => { encoderError = e; log.err('encoder: ' + e.message); }
    });
    encoder.configure({
      codec: h264Codec(outW, outH, target),
      width: outW, height: outH,
      bitrate,
      framerate: target,
    });

    const totalOut = Math.max(1, Math.floor(duration * target));
    log.dim(Toolkit.T('vt.log.opticalEncode', { n: totalOut, target, src: SRC_FPS }, `输出 ${totalOut} 帧 @ ${target}fps (源参考 ${SRC_FPS}fps), RIFE 推理...`));
    const t0 = performance.now();

    let frameIdx = 0;
    for (let i = 0; i < totalOut; i++) {
      const outTime = i / target;
      if (outTime >= duration) break;
      const srcIdxFloat = outTime * SRC_FPS;
      const srcLo = Math.floor(srcIdxFloat);
      const srcHi = srcLo + 1;
      const alpha = srcIdxFloat - srcLo;

      let frame;
      if (alpha < 0.005) {
        frame = await getSrcAt(srcLo);
      } else if (alpha > 0.995) {
        frame = await getSrcAt(srcHi);
      } else {
        const A = await getSrcAt(srcLo);
        const B = await getSrcAt(Math.min(Math.floor(duration * SRC_FPS), srcHi));
        await backend.interpolate(A, B, alpha, tmpInterp);
        frame = tmpInterp;
      }

      ctx.clearRect(0, 0, outW, outH);
      ctx.drawImage(frame, 0, 0);
      const vf = new VideoFrame(outCv, { timestamp: Math.round((frameIdx / target) * 1e6) });
      encoder.encode(vf, { keyFrame: frameIdx % 30 === 0 });
      vf.close();
      frameIdx++;

      progress.set(0.2 + 0.78 * (i / totalOut));
      if (i % 4 === 0) await new Promise(r => setTimeout(r, 0));  // yield to UI
    }
    await encoder.flush();
    encoder.close();
    muxer.finalize();
    if (encoderError) throw new Error(Toolkit.T('vt.err.encode', { msg: encoderError.message }, `视频编码失败: ${encoderError.message}`));
    if (!validateMp4Buffer(muxer.target.buffer)) throw new Error(Toolkit.T('vt.err.mp4Validate', null, '输出 MP4 校验失败 — 编码可能未完成或损坏'));
    outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
    outExt = 'mp4';
    progress.set(1);
    showOutput();
    const dt = ((performance.now() - t0) / 1000).toFixed(1);
    log.ok(Toolkit.T('vt.log.opticalDone', { name: backend.name, size: fmtBytes(outBlob.size), n: frameIdx, dt }, `光流补帧完成 (${backend.name}) · ${fmtBytes(outBlob.size)} · ${frameIdx} 帧 · ${dt}s`));
  }

  // ──────────────────────────────────────────────────────────────────
  //   Frames → Video (the reverse of doExtractFrames)
  //   Mirror of the MP4 / WebM encoder paths in doReencodeWebm, but the
  //   per-frame source is srcFrames[i].bitmap rather than seeking srcVideo.
  // ──────────────────────────────────────────────────────────────────
  async function doFramesToVideo() {
    const fps = parseInt($('ffFps').value, 10) || 30;
    let outW = parseInt($('ffOutW').value, 10) || srcFrames[0].w;
    let outH = parseInt($('ffOutH').value, 10) || srcFrames[0].h;
    // H.264 requires even dimensions — silently round down rather than error
    outW = outW & ~1;
    outH = outH & ~1;
    const fmt = $('outFormat').value;
    const bitrate = (parseInt($('bitrate').value, 10) || 3000) * 1000;
    const cv = newCanvas(outW, outH);
    const ctx = cv.getContext('2d');
    ctx.imageSmoothingQuality = 'high';

    if (fmt === 'mp4') {
      if (!('VideoEncoder' in window)) {
        log.warn(Toolkit.T('vt.warn.noWebCodecsMp4', null, '当前浏览器不支持 WebCodecs MP4, 回退到 WebM (VP9)'));
        return doFramesToVideoWebm(cv, ctx, outW, outH, fps, bitrate, 'webm-vp9');
      }
      log.dim(Toolkit.T('vt.log.loadMuxer', null, '加载 mp4-muxer (首次联网)...'));
      const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/mp4-muxer@5.1.5');
      const muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video: { codec: 'avc', width: outW, height: outH },
        fastStart: 'in-memory'
      });
      let encErr = null;
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => { encErr = e; log.err('encoder: ' + e.message); }
      });
      encoder.configure({
        codec: h264Codec(outW, outH, fps),
        width: outW, height: outH,
        bitrate, framerate: fps
      });
      log.dim(Toolkit.T('vt.log.mp4FramesEncode', { w: outW, h: outH, fps, n: srcFrames.length }, `MP4 编码 ${outW}×${outH} @ ${fps}fps · ${srcFrames.length} 帧...`));
      const t0 = performance.now();
      for (let i = 0; i < srcFrames.length; i++) {
        const f = srcFrames[i];
        ctx.clearRect(0, 0, outW, outH);
        ctx.drawImage(f.bitmap, 0, 0, outW, outH);
        const vf = new VideoFrame(cv, { timestamp: Math.round(i / fps * 1e6) });
        encoder.encode(vf, { keyFrame: i % 30 === 0 });
        vf.close();
        progress.set((i + 1) / srcFrames.length);
      }
      await encoder.flush();
      encoder.close();
      muxer.finalize();
      if (encErr) throw new Error(Toolkit.T('vt.err.encode', { msg: encErr.message }, `视频编码失败: ${encErr.message}`));
      if (!validateMp4Buffer(muxer.target.buffer)) throw new Error(Toolkit.T('vt.err.mp4Validate', null, '输出 MP4 校验失败 — 编码可能未完成或损坏'));
      outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
      outExt = 'mp4';
      const dt = ((performance.now() - t0) / 1000).toFixed(1);
      showOutput();
      log.ok(Toolkit.T('vt.log.mp4DoneT', { size: fmtBytes(outBlob.size), dt }, `生成 MP4 ${fmtBytes(outBlob.size)} · ${dt}s`));
      return;
    }
    return doFramesToVideoWebm(cv, ctx, outW, outH, fps, bitrate, fmt);
  }

  async function doFramesToVideoWebm(cv, ctx, outW, outH, fps, bitrate, fmt) {
    const stream = cv.captureStream(0);
    const track = stream.getVideoTracks()[0];
    const mimeType = fmt === 'webm-vp8' ? 'video/webm;codecs=vp8' : 'video/webm;codecs=vp9';
    if (!MediaRecorder.isTypeSupported(mimeType)) throw new Error(Toolkit.T('vt.err.noMime', { mime: mimeType }, `当前浏览器不支持 ${mimeType}`));
    const chunks = [];
    const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: bitrate });
    recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
    const done = new Promise(res => { recorder.onstop = res; });
    recorder.start();
    log.dim(Toolkit.T('vt.log.webmFramesEncode', { w: outW, h: outH, fps, n: srcFrames.length }, `WebM 编码 ${outW}×${outH} @ ${fps}fps · ${srcFrames.length} 帧...`));
    const t0 = performance.now();
    const frameMs = 1000 / fps;
    for (let i = 0; i < srcFrames.length; i++) {
      const f = srcFrames[i];
      ctx.clearRect(0, 0, outW, outH);
      ctx.drawImage(f.bitmap, 0, 0, outW, outH);
      // MediaRecorder samples at real-time pacing, so pace the canvas writes
      // to land each frame at its intended FPS.
      track.requestFrame?.();
      await new Promise(r => setTimeout(r, frameMs));
      progress.set((i + 1) / srcFrames.length);
    }
    recorder.stop();
    await done;
    outBlob = new Blob(chunks, { type: 'video/webm' });
    outExt = 'webm';
    const dt = ((performance.now() - t0) / 1000).toFixed(1);
    showOutput();
    log.ok(Toolkit.T('vt.log.webmDoneT', { size: fmtBytes(outBlob.size), dt }, `生成 WebM ${fmtBytes(outBlob.size)} · ${dt}s`));
  }

  async function doExtractFrames() {
    const fps = parseInt($('framesFps').value, 10) || parseInt($('fps').value, 10) || 12;
    const { w, h, duration } = srcMeta;
    const total = Math.max(1, Math.floor(duration * fps));
    log.dim(Toolkit.T('vt.log.extractFrames', { n: total, fps }, `抽 ${total} 帧 @ ${fps} FPS...`));
    const cv = newCanvas(w, h);
    const ctx = cv.getContext('2d');
    const files = [];
    for (let i = 0; i < total; i++) {
      const t = Math.min(duration - 0.001, i / fps);
      await seekVideo(srcVideo, t);
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(srcVideo, 0, 0);
      const blob = await canvasToBlob(cv, 'image/png');
      const buf = new Uint8Array(await blob.arrayBuffer());
      files.push({ name: `frame_${String(i).padStart(4, '0')}.png`, data: buf });
      progress.set((i + 1) / total);
    }
    const zip = makeZip(files);
    outBlob = zip;
    outExt = 'zip';
    showOutputAsZipInfo(total);
    log.ok(Toolkit.T('vt.log.framesDone', { n: total, size: fmtBytes(zip.size) }, `抽帧完成,共 ${total} 帧 · ZIP ${fmtBytes(zip.size)}`));
  }

  async function doToGif() {
    const fps = parseInt($('gifFps').value, 10) || 12;
    const maxDim = parseInt($('gifMaxDim').value, 10) || 0;
    const palette = $('gifPalette').value;
    const { w, h, duration } = srcMeta;
    const ratio = maxDim > 0 ? Math.min(1, maxDim / Math.max(w, h)) : 1;
    const ow = Math.max(1, Math.round(w * ratio)), oh = Math.max(1, Math.round(h * ratio));
    const total = Math.max(1, Math.floor(duration * fps));
    log.dim(Toolkit.T('vt.log.gifEncode', { n: total, w: ow, h: oh }, `抽 ${total} 帧 → 编码 GIF (${ow}×${oh})...`));
    const cv = newCanvas(ow, oh);
    const ctx = cv.getContext('2d');
    const frames = [];
    for (let i = 0; i < total; i++) {
      const t = Math.min(duration - 0.001, i / fps);
      await seekVideo(srcVideo, t);
      ctx.clearRect(0, 0, ow, oh);
      ctx.drawImage(srcVideo, 0, 0, ow, oh);
      const bm = await createImageBitmap(cv);
      frames.push({ bitmap: bm, w: ow, h: oh });
      progress.set((i + 1) / total * 0.5);
    }
    const gif = await AnimEncoders.buildGif(frames, {
      fps, loop: 0, paletteMode: palette,
      onProgress: pct => progress.set(0.5 + pct * 0.5),
      onStatus: msg => log.dim('  ' + msg)
    });
    outBlob = gif;
    outExt = 'gif';
    showOutput();
    log.ok(Toolkit.T('vt.log.gifDone', { size: fmtBytes(gif.size) }, `生成 GIF ${fmtBytes(gif.size)}`));
  }

  // ===== Chroma Key (背景去除) =====
  async function doChromaKey() {
    const { w: srcW0, h: srcH0, duration } = srcMeta;
    // Even dims for codec safety (H.264 / VP9 4:2:0 reject odd sizes). The
    // whole pipeline (incl. MP4 / WebM-alpha export) runs on these; the source
    // frame is scaled into the even canvas below (≤1px squish, imperceptible).
    const w = Math.max(2, srcW0 - (srcW0 % 2));
    const h = Math.max(2, srcH0 - (srcH0 % 2));
    const autoCorner = $('keyAuto').checked;
    const keyHex = $('keyColor').value;
    const tol = parseInt($('keyTol').value, 10);
    const feather = parseInt($('keyFeather').value, 10);
    const choke = parseInt($('keyChoke').value, 10) || 0;
    const spill = parseInt($('keySpill').value, 10);
    const fps = parseInt($('keyFps').value, 10) || 24;
    const outputFmt = $('keyOutput').value;

    let keyRGB = hexToRgb(keyHex);
    if (!keyRGB) { log.err(Toolkit.T('vt.err.badHex', null, '无效 hex')); return; }

    const total = Math.max(1, Math.floor(duration * fps));
    log.dim(Toolkit.T('vt.log.ckExtract', { n: total, fps, hex: keyHex, tol, feather }, `抽 ${total} 帧 @ ${fps} FPS, 色键 ${keyHex}, tol=${tol}, feather=${feather}...`));

    // process each frame
    const srcCv = newCanvas(w, h);
    const sctx = srcCv.getContext('2d');
    const frameBitmaps = [];      // for apng / gif (needs ImageBitmap)
    const framePngBlobs = [];     // for PNG ZIP

    for (let i = 0; i < total; i++) {
      const t = Math.min(duration - 0.001, i / fps);
      await seekVideo(srcVideo, t);
      sctx.clearRect(0, 0, w, h);
      sctx.drawImage(srcVideo, 0, 0, w, h);
      // auto pick key color from top-left of first frame
      if (autoCorner && i === 0) {
        const d = sctx.getImageData(0, 0, 1, 1).data;
        keyRGB = { r: d[0], g: d[1], b: d[2] };
        log.dim(Toolkit.T('vt.log.ckAuto', { r: d[0], g: d[1], b: d[2] }, `  自动取色: rgb(${d[0]}, ${d[1]}, ${d[2]})`));
      }
      applyChromaKeyToCanvas(srcCv, keyRGB, tol, feather, spill, choke);
      if (outputFmt === 'png-zip') {
        const blob = await canvasToBlob(srcCv, 'image/png');
        framePngBlobs.push(blob);
      } else {
        const bm = await createImageBitmap(srcCv);
        frameBitmaps.push({ bitmap: bm, w, h });
      }
      progress.set((i + 1) / total * 0.6);
    }

    // encode
    if (outputFmt === 'png-zip') {
      log.dim(Toolkit.T('vt.log.ckPngZip', null, '打包 PNG 帧 ZIP...'));
      const files = [];
      for (let i = 0; i < framePngBlobs.length; i++) {
        const data = new Uint8Array(await framePngBlobs[i].arrayBuffer());
        files.push({ name: `frame_${String(i).padStart(4,'0')}.png`, data });
      }
      const zip = Toolkit.makeZip(files);
      outBlob = zip;
      outExt = 'zip';
      showOutputAsZipInfo(framePngBlobs.length);
      log.ok(Toolkit.T('vt.log.ckPngZipDone', { n: framePngBlobs.length, size: fmtBytes(zip.size) }, `完成 ${framePngBlobs.length} 帧 PNG ZIP (${fmtBytes(zip.size)})`));
    } else if (outputFmt === 'apng') {
      log.dim(Toolkit.T('vt.log.apngEncode', null, '编码 APNG...'));
      const apng = await AnimEncoders.buildApng(frameBitmaps, {
        fps, loop: 0,
        onProgress: p => progress.set(0.6 + p * 0.4)
      });
      outBlob = apng;
      outExt = 'png';
      showOutput();
      log.ok(Toolkit.T('vt.log.apngDone', { size: fmtBytes(apng.size) }, `完成 APNG (${fmtBytes(apng.size)})`));
    } else if (outputFmt === 'gif') {
      log.dim(Toolkit.T('vt.log.gifEncodeCk', null, '编码 GIF (透明色 = 抠掉的背景)...'));
      // For GIF transparency we need to map alpha<128 → transparent palette index.
      // Our AnimEncoders.buildGif currently does palette quantization, transparency in GIF
      // is handled by setting one palette index as transparent.
      // Simplification: replace alpha<128 pixels with a unique magenta marker, post-process.
      // But buildGif doesn't take alpha into account. For now, just render with hard-edged
      // alpha replaced by a chroma color and use buildGif (GIF will treat those pixels as
      // background color rather than transparent). To get real transparency, we'd need
      // to extend buildGif. Document this limitation.
      log.warn(Toolkit.T('vt.warn.gifNoTransparency', null, '注意: 当前实现的 GIF 不支持透明,抠掉区域会变成纯色。建议用 APNG 或 PNG ZIP。'));
      const gif = await AnimEncoders.buildGif(frameBitmaps, {
        fps, loop: 0, paletteMode: 'median',
        onProgress: p => progress.set(0.6 + p * 0.4)
      });
      outBlob = gif;
      outExt = 'gif';
      showOutput();
      log.ok(Toolkit.T('vt.log.gifDoneCk', { size: fmtBytes(gif.size) }, `完成 GIF (${fmtBytes(gif.size)})`));
    } else if (outputFmt === 'mp4') {
      log.dim(Toolkit.T('vt.log.mp4EncodeCk', null, '编码 MP4 (H.264, 透明区填充指定色)...'));
      if (!('VideoEncoder' in window)) throw new Error(Toolkit.T('vt.err.noWebCodecsCk', null, '当前浏览器不支持 WebCodecs, 改用 PNG ZIP / APNG'));
      const bg = hexToRgb($('keyBgColor').value) || { r: 0, g: 0, b: 0 };
      const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/mp4-muxer@5.1.5');
      const muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video: { codec: 'avc', width: w, height: h },
        fastStart: 'in-memory'
      });
      let encoderError = null;
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => { encoderError = e; log.err('encoder: ' + e.message); }
      });
      encoder.configure({
        codec: h264Codec(w, h, fps),
        width: w, height: h,
        bitrate: 3_000_000,
        framerate: fps
      });
      const cv = newCanvas(w, h);
      const ctx = cv.getContext('2d');
      for (let i = 0; i < frameBitmaps.length; i++) {
        if (encoderError) break;
        // fill background color first
        ctx.fillStyle = `rgb(${bg.r}, ${bg.g}, ${bg.b})`;
        ctx.fillRect(0, 0, w, h);
        // composite the alpha-keyed frame on top — transparent pixels show bg color
        ctx.drawImage(frameBitmaps[i].bitmap, 0, 0);
        const vf = new VideoFrame(cv, { timestamp: Math.round(i * 1e6 / fps) });
        encoder.encode(vf, { keyFrame: i % 30 === 0 });
        vf.close();
        progress.set(0.6 + (i + 1) / frameBitmaps.length * 0.4);
      }
      await encoder.flush();
      encoder.close();
      muxer.finalize();
      if (encoderError) throw new Error(Toolkit.T('vt.err.encode', { msg: encoderError.message }, `视频编码失败: ${encoderError.message}`));
      if (!validateMp4Buffer(muxer.target.buffer)) throw new Error(Toolkit.T('vt.err.mp4Validate', null, '输出 MP4 校验失败 — 编码可能未完成或损坏'));
      outBlob = new Blob([muxer.target.buffer], { type: 'video/mp4' });
      outExt = 'mp4';
      showOutput();
      log.ok(Toolkit.T('vt.log.mp4DoneCk', { size: fmtBytes(outBlob.size) }, `完成 MP4 (${fmtBytes(outBlob.size)})`));
    } else if (outputFmt === 'webm-alpha') {
      log.dim(Toolkit.T('vt.log.webmAlphaEncode', null, '编码 WebM VP9 + alpha (真透明)...'));
      if (!('VideoEncoder' in window)) throw new Error(Toolkit.T('vt.err.noWebCodecsAlpha', null, '当前浏览器不支持 WebCodecs'));
      const { Muxer, ArrayBufferTarget } = await import('https://esm.sh/webm-muxer@5.0.3');
      const muxer = new Muxer({
        target: new ArrayBufferTarget(),
        video: { codec: 'V_VP9', width: w, height: h, alpha: true },
      });
      let encoderError = null;
      const encoder = new VideoEncoder({
        output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
        error: e => { encoderError = e; log.err('encoder: ' + e.message); }
      });
      try {
        encoder.configure({
          codec: 'vp09.00.10.08',
          width: w, height: h,
          bitrate: 3_000_000,
          framerate: fps,
          alpha: 'keep'  // KEY: keep alpha channel
        });
      } catch (e) {
        throw new Error(Toolkit.T('vt.err.vp9Alpha', { msg: e.message }, `VP9 alpha 编码不支持 (Chrome 113+): ${e.message}`));
      }
      for (let i = 0; i < frameBitmaps.length; i++) {
        if (encoderError) break;
        const vf = new VideoFrame(frameBitmaps[i].bitmap, { timestamp: Math.round(i * 1e6 / fps), alpha: 'keep' });
        encoder.encode(vf, { keyFrame: i % 30 === 0 });
        vf.close();
        progress.set(0.6 + (i + 1) / frameBitmaps.length * 0.4);
      }
      await encoder.flush();
      encoder.close();
      muxer.finalize();
      if (encoderError) throw new Error(Toolkit.T('vt.err.encode', { msg: encoderError.message }, `视频编码失败: ${encoderError.message}`));
      if (!validateWebmBuffer(muxer.target.buffer)) throw new Error(Toolkit.T('vt.err.webmValidate', null, '输出 WebM 校验失败 — 编码可能未完成或损坏'));
      outBlob = new Blob([muxer.target.buffer], { type: 'video/webm' });
      outExt = 'webm';
      showOutput();
      log.ok(Toolkit.T('vt.log.webmAlphaDone', { size: fmtBytes(outBlob.size) }, `完成 WebM (VP9 + alpha) ${fmtBytes(outBlob.size)}`));
    } else if (outputFmt === 'webm') {
      log.dim(Toolkit.T('vt.log.webmMrEncode', null, '编码 WebM (MediaRecorder, alpha 区域变黑)...'));
      const cv = newCanvas(w, h);
      const ctx = cv.getContext('2d');
      const stream = cv.captureStream(0);
      const track = stream.getVideoTracks()[0];
      const mimeType = 'video/webm;codecs=vp9';
      if (!MediaRecorder.isTypeSupported(mimeType)) throw new Error(Toolkit.T('vt.err.noMime', { mime: mimeType }, `当前浏览器不支持 ${mimeType}`));
      const chunks = [];
      const recorder = new MediaRecorder(stream, { mimeType });
      recorder.ondataavailable = e => { if (e.data.size) chunks.push(e.data); };
      const done = new Promise(resolve => { recorder.onstop = resolve; });
      recorder.start();
      const interval = 1 / fps;
      for (let i = 0; i < frameBitmaps.length; i++) {
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(frameBitmaps[i].bitmap, 0, 0);
        if (track.requestFrame) track.requestFrame();
        await new Promise(r => setTimeout(r, interval * 1000));
      }
      await new Promise(r => setTimeout(r, 200));
      recorder.stop();
      await done;
      outBlob = new Blob(chunks, { type: 'video/webm' });
      outExt = 'webm';
      showOutput();
      log.ok(Toolkit.T('vt.log.webmMrDone', { size: fmtBytes(outBlob.size) }, `完成 WebM (${fmtBytes(outBlob.size)})`));
    }
    progress.hide();
  }

  function hexToRgb(hex) {
    const m = /^#?([0-9a-f]{2})([0-9a-f]{2})([0-9a-f]{2})$/i.exec(hex.trim());
    if (!m) return null;
    return { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) };
  }

  // chroma key 算法:距离用 BT.601 YCbCr 的 Cb-Cr 平面 (丢掉 luma Y),
  // 跟 Premiere 等专业软件的色键一致 — 同一种颜色不同亮度都能干净抠掉,
  // 主体上的阴影也不会被误判。
  // spill 抑制:对所有保留像素压制残留的 key 通道,修复完全不透明的特效
  // (剑光/烟雾/运动模糊) 带绿调的常见问题。
  // choke:对 alpha 通道做 px 次 4 邻域最小值卷积,蒙版往内收,
  // 干掉 anti-aliased 边缘那 1-2 个泛绿的边毛刺 (PR Ultra Key 同款)。
  function applyChromaKeyToCanvas(canvas, key, tol, feather, spill, choke) {
    const w = canvas.width, h = canvas.height;
    const ctx = canvas.getContext('2d');
    const img = ctx.getImageData(0, 0, w, h);
    const d = img.data;
    // BT.601 Cb / Cr of the key color. Y is intentionally omitted.
    const keyCb = -0.168736 * key.r - 0.331264 * key.g + 0.5 * key.b + 128;
    const keyCr =  0.5 * key.r - 0.418688 * key.g - 0.081312 * key.b + 128;
    // Legacy slider is 0..200 in RGB-distance units. Cb-Cr distance is a
    // tighter scale (max ~127), so map proportionally — tol 60 ≈ chroma 30
    // (clean key), tol 120 ≈ chroma 60 (looser).
    const tolChroma = tol * 0.5;
    const softLoChroma = tolChroma * 0.6;
    const isGreenKey = key.g > key.r && key.g > key.b;
    const isBlueKey  = key.b > key.r && key.b > key.g;
    for (let i = 0; i < d.length; i += 4) {
      const r = d[i], g = d[i+1], b = d[i+2];
      const cb = -0.168736 * r - 0.331264 * g + 0.5 * b + 128;
      const cr =  0.5 * r - 0.418688 * g - 0.081312 * b + 128;
      const dCb = cb - keyCb, dCr = cr - keyCr;
      const dist = Math.sqrt(dCb * dCb + dCr * dCr);
      let alpha;
      if (dist <= softLoChroma) alpha = 0;
      else if (dist >= tolChroma) alpha = 255;
      else alpha = Math.round((dist - softLoChroma) / (tolChroma - softLoChroma) * 255);
      d[i + 3] = alpha;
      // despill: applies to ALL kept pixels (including alpha=255)
      if (spill > 0 && alpha > 0) {
        if (isGreenKey) {
          const cap = Math.max(r, b);
          if (g > cap) d[i+1] = spill === 2 ? cap : ((g + cap) >> 1);
        } else if (isBlueKey) {
          const cap = Math.max(r, g);
          if (b > cap) d[i+2] = spill === 2 ? cap : ((b + cap) >> 1);
        }
      }
    }
    ctx.putImageData(img, 0, 0);

    // matte choke: erode the alpha channel by `choke` pixels via repeated
    // 4-neighborhood min filter. Done BEFORE feather so the blur softens
    // the already-tightened edge rather than the original noisy one.
    if (choke > 0) chokeAlpha(canvas, choke);

    if (feather > 0) {
      const tmp = newCanvas(w, h);
      const tctx = tmp.getContext('2d');
      tctx.filter = `blur(${feather}px)`;
      tctx.drawImage(canvas, 0, 0);
      ctx.clearRect(0, 0, w, h);
      ctx.drawImage(tmp, 0, 0);
    }
  }

  function chokeAlpha(canvas, px) {
    const w = canvas.width, h = canvas.height;
    const ctx = canvas.getContext('2d');
    const img = ctx.getImageData(0, 0, w, h);
    let a = new Uint8Array(w * h);
    for (let i = 0, j = 3; i < a.length; i++, j += 4) a[i] = img.data[j];
    for (let pass = 0; pass < px; pass++) {
      const next = new Uint8Array(a);
      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const idx = y * w + x;
          let m = a[idx];
          if (x > 0)     m = Math.min(m, a[idx - 1]);
          if (x < w - 1) m = Math.min(m, a[idx + 1]);
          if (y > 0)     m = Math.min(m, a[idx - w]);
          if (y < h - 1) m = Math.min(m, a[idx + w]);
          next[idx] = m;
        }
      }
      a = next;
    }
    for (let i = 0, j = 3; i < a.length; i++, j += 4) img.data[j] = a[i];
    ctx.putImageData(img, 0, 0);
  }

  function showOutput() {
    $('outBox').innerHTML = '';
    const url = URL.createObjectURL(outBlob);
    if (outExt === 'gif') {
      const img = document.createElement('img');
      img.src = url;
      $('outBox').appendChild(img);
    } else {
      const v = document.createElement('video');
      v.src = url; v.controls = true; v.autoplay = true; v.loop = true; v.muted = true;
      v.style.maxWidth = '100%'; v.style.maxHeight = '100%';
      $('outBox').appendChild(v);
    }
    $('downloadBtn').disabled = false;
    updateHandoff();  // handoff menu now offers "继续处理" (reuse) + send-to targets
  }

  function showOutputAsZipInfo(frameCount) {
    const zipMsg = Toolkit.T('vt.outBox.zip', { n: frameCount }, `<strong>${frameCount}</strong> 帧已打包为 ZIP`);
    $('outBox').innerHTML = `
      <div style="text-align:center; color: var(--muted-2)">
        <div style="font-size:48px">📦</div>
        <div>${zipMsg}</div>
        <div class="small muted">${fmtBytes(outBlob.size)}</div>
      </div>
    `;
    $('downloadBtn').disabled = false;
    updateHandoff();
  }

  // Update the handoff button's payload based on current outBlob / outExt.
  // Maps the output extension to the correct MIME so the dropdown targets the right tools.
  function updateHandoff() {
    if (!handoff || !outBlob) return;
    const mimeMap = {
      'mp4':  'video/mp4',
      'webm': 'video/webm',
      'gif':  'image/gif',
      'png':  'image/png',     // APNG → image/png (image editors accept)
      'zip':  'application/zip'
    };
    const mime = mimeMap[outExt] || 'application/octet-stream';
    const name = ($('filename').value || 'output').replace(/[^\w-]/g, '_');
    const ext = outExt === 'zip' ? '_frames.zip' : '.' + outExt;
    handoff.setBlob(outBlob, name + ext, mime);
  }

  function seekVideo(video, t) {
    return new Promise((resolve) => {
      // Skip the round-trip when we're already at the target time, otherwise
      // `seeked` won't fire and the promise hangs — that hang silently
      // truncates encoded output (same class as the playable-slim bug).
      if (Math.abs(video.currentTime - t) < 1e-4) { resolve(); return; }
      const onSeek = () => { video.removeEventListener('seeked', onSeek); resolve(); };
      video.addEventListener('seeked', onSeek);
      video.currentTime = t;
    });
  }

  // H.264 codec string from the profile selector. Baseline is the default
  // for older-device compatibility; Main and High give 5-20% better
  // compression at the same bitrate but every modern browser and ≥2014-ish
  // hardware decoder supports both. Affects all three MP4 encoder paths.
  // Build the WebCodecs codec string `avc1.PPCCLL` for the selected H.264
  // profile, picking the AVC level dynamically from the (width, height, fps)
  // requested so the encoder doesn't reject content larger than the level's
  // ceiling. (Old code hardcoded Baseline @ Level 3.1 — max 1280×720 @ 30 —
  // so any 1080p+ video at Baseline blew up at encoder.configure() with
  // "AVC level (0x1F) indicated by the codec string. You must either specify
  // a lower resolution or higher AVC level." then every subsequent encode()
  // hit "Cannot call 'encode' on a closed codec.")
  function h264Codec(w, h, fps) {
    const p = document.getElementById('h264Profile')?.value || 'baseline';
    const pp = p === 'high' ? '64' : p === 'main' ? '4D' : '42';
    // Constraint flag byte preserves the previous behavior per profile
    // (CC=40 for Main; CC=00 for Baseline / High).
    const cc = p === 'main' ? '40' : '00';
    const ll = pickAvcLevelHex(w, h, fps);
    return `avc1.${pp}${cc}${ll}`;
  }

  // Map (frame size, framerate) → the lowest AVC level that can encode it.
  // Reference: ITU-T H.264 Annex A.3.1 Table A-1 (MaxFrameSize / MaxMBPS).
  // 1 macroblock = 16×16 pixels. Returns level_idc as a 2-char uppercase
  // hex string for splicing into the avc1.PPCCLL codec string.
  function pickAvcLevelHex(w, h, fps) {
    const mbs = Math.ceil((w || 1) / 16) * Math.ceil((h || 1) / 16);
    const mbPerSec = mbs * (fps || 30);
    const levels = [
      [0x1F,   3600,   108000],  // 3.1: 1280×720 @ 30
      [0x20,   5120,   216000],  // 3.2: 1280×720 @ 60
      [0x28,   8192,   245760],  // 4.0: 1920×1080 @ 30
      [0x29,   8192,   245760],  // 4.1: 1920×1080 @ 30 (higher bitrate cap)
      [0x2A,   8704,   522240],  // 4.2: 1920×1080 @ 60
      [0x32,  22080,   589824],  // 5.0: 2560×1440 @ 30
      [0x33,  36864,   983040],  // 5.1: 4096×2160 @ 30
      [0x34,  36864,  2073600],  // 5.2: 4096×2160 @ 60
      [0x3C, 139264,  4177920],  // 6.0: 8192×4320 @ 30
      [0x3D, 139264,  8355840],  // 6.1: 8192×4320 @ 60
      [0x3E, 139264, 16711680]   // 6.2: 8192×4320 @ 120
    ];
    for (const [lv, maxMbs, maxMbPerSec] of levels) {
      if (mbs <= maxMbs && mbPerSec <= maxMbPerSec) {
        return lv.toString(16).toUpperCase().padStart(2, '0');
      }
    }
    return '3E';  // saturate at 6.2
  }

  // Quick MP4 sanity check — must be at least 1KB AND have the "ftyp" box
  // signature at offset 4 (bytes 0x66 0x74 0x79 0x70). Used right after
  // muxer.finalize() to refuse to hand back a corrupt buffer.
  function validateMp4Buffer(buf) {
    if (!buf || buf.byteLength < 1024) return false;
    const u = new Uint8Array(buf, 0, 12);
    return u[4] === 0x66 && u[5] === 0x74 && u[6] === 0x79 && u[7] === 0x70;
  }
  // Same idea for WebM — first 4 bytes must be the EBML header (0x1A 0x45
  // 0xDF 0xA3) and the file must be plausibly long.
  function validateWebmBuffer(buf) {
    if (!buf || buf.byteLength < 1024) return false;
    const u = new Uint8Array(buf, 0, 4);
    return u[0] === 0x1A && u[1] === 0x45 && u[2] === 0xDF && u[3] === 0xA3;
  }

  $('downloadBtn').addEventListener('click', () => {
    if (!outBlob) return;
    const name = ($('filename').value || 'output').replace(/[^\w-]/g, '_');
    const ext = outExt === 'zip' ? '_frames.zip' : '.' + outExt;
    download(outBlob, name + ext);
  });

  $('clearBtn').addEventListener('click', () => {
    if (srcUrl) URL.revokeObjectURL(srcUrl);
    srcVideo = null; srcUrl = null; srcMeta = null; outBlob = null;
    $('srcBox').innerHTML = `<div class="preview-empty">${Toolkit.T('vt.empty.drop', null, '拖入视频')}</div>`;
    $('outBox').innerHTML = `<div class="preview-empty">${Toolkit.T('vt.empty.out', null, 'Dobby 干完显示在这里')}</div>`;
    $('stats').textContent = Toolkit.T('common.idle', null, 'Dobby 待命');
    $('actionControls').innerHTML = '';
    $('applyBtn').disabled = true;
    $('downloadBtn').disabled = true;
    log.clear();
    $('fileInput').value = '';
  });
})();
</script>
</body>
</html>
