<!-- KILLSWITCH v2 -->
<script>
/* one-shot legacy cleanup — drops old SW, caches, and localStorage left behind
   by removed settings UI; reloads once so the fresh code takes over. */
(function () {
  var KEY = 'toolkit-cleaned-v2';
  if (localStorage.getItem(KEY)) return;
  localStorage.setItem(KEY, '1');
  (async function () {
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) { try { await r.unregister(); } catch (_) {} }
      }
      if ('caches' in window) {
        var ks = await caches.keys();
        for (var k of ks) { try { await caches.delete(k); } catch (_) {} }
      }
      try { localStorage.removeItem('toolkit-cursor'); } catch (_) {}
      try { localStorage.removeItem('toolkit-theme'); } catch (_) {}
      var stale = document.getElementById('__toolkit_cursor_style__');
      if (stale) stale.remove();
      document.documentElement.removeAttribute('data-theme');
      location.reload();
    } catch (e) { console.warn('[cleanup]', e); }
  })();
})();
</script>
<title>Video Toolkit · Dobby</title>
<link rel="stylesheet" href="../assets/shared.css" />
<style>
  .cfps-mb {
    background: transparent;
    color: var(--text-soft);
    border: 1px solid transparent;
    box-shadow: none;
    border-radius: calc(var(--radius-sm) - 2px);
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .cfps-mb:hover { background: rgba(255, 255, 255, 0.05); transform: none; }
  .cfps-mb.active {
    background: var(--jade);
    color: #0a1a14;
    font-weight: 600;
    border-color: var(--jade);
  }
  .cfps-mb.active:hover { background: var(--jade); transform: none; }
  .preview-pair { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; min-height: 280px; }
  .preview-col { display: flex; flex-direction: column; gap: 6px; }
  .preview-col .label {
    color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .preview-box {
    flex: 1;
    background: var(--checker), #1a1a1a;
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto; padding: 12px;
    display: flex; align-items: center; justify-content: center;
  }
  .preview-box video, .preview-box canvas, .preview-box img { max-width: 100%; max-height: 100%; }

  /* ===== Crop selector overlay (sits on top of #srcBox's video) =====
     The .crop-overlay is sized to the video's DISPLAY rect (which may
     differ from native pixels due to max-width:100%). .crop-rect is a
     draggable / resizable box; we mirror its position to the cropX /
     cropY / cropW / cropH inputs (in native pixels) on every change. */
  .crop-overlay {
    position: absolute;
    user-select: none;
    -webkit-user-select: none;
    cursor: crosshair;
    z-index: 5;
  }
  .crop-rect {
    position: absolute;
    /* Dim everything outside the rect via a single huge box-shadow ring */
    box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.55);
    border: 1px dashed rgba(var(--jade-rgb), 0.95);
    background: transparent;
    cursor: move;
    box-sizing: border-box;
  }
  .crop-handle {
    position: absolute;
    width: 12px; height: 12px;
    background: var(--jade);
    border: 1px solid #0f1216;
    border-radius: 2px;
  }
  .crop-handle.tl { top: -6px;    left: -6px;     cursor: nwse-resize; }
  .crop-handle.tr { top: -6px;    right: -6px;    cursor: nesw-resize; }
  .crop-handle.bl { bottom: -6px; left: -6px;     cursor: nesw-resize; }
  .crop-handle.br { bottom: -6px; right: -6px;    cursor: nwse-resize; }
  .crop-handle.t  { top: -6px;    left: 50%; transform: translateX(-50%); cursor: ns-resize; }
  .crop-handle.b  { bottom: -6px; left: 50%; transform: translateX(-50%); cursor: ns-resize; }
  .crop-handle.l  { left: -6px;   top: 50%; transform: translateY(-50%);  cursor: ew-resize; }
  .crop-handle.r  { right: -6px;  top: 50%; transform: translateY(-50%);  cursor: ew-resize; }
  /* Aspect-ratio readout pinned to the top edge of the rect */
  .crop-rect .crop-label {
    position: absolute;
    top: -22px; left: 0;
    background: rgba(0, 0, 0, 0.75);
    color: var(--jade);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 11px;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    pointer-events: none;
  }
  .timeline-row {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 12px;
  }
  .timeline-row input[type=range] { flex: 1; }
  .timeline-row .mono { font-family: ui-monospace, Consolas, monospace; min-width: 80px; text-align: right; }
  .action-controls {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px;
  }
  .row-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .info { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
  .compat-note {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--warning);
    padding: 10px 12px;
    font-size: 11px;
    color: var(--muted-2);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
  }
  .compat-note strong { color: var(--warning); }

  /* ===== Frame-precise trim editor ===== */
  .frame-edit {
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .frame-edit-readout {
    display: flex;
    align-items: baseline;
    gap: 10px;
    font-family: ui-monospace, Consolas, monospace;
    flex-wrap: wrap;
  }
  .frame-edit-readout .tc-big {
    font-size: 17px;
    color: var(--text);
    font-weight: 600;
    letter-spacing: 0.04em;
  }
  .frame-edit-readout .frame-num {
    font-size: 11px;
    color: var(--accent);
    background: rgba(var(--jade-rgb), 0.12);
    border: 1px solid rgba(var(--jade-rgb), 0.4);
    padding: 2px 7px;
    border-radius: var(--radius-sm);
  }
  .frame-edit-readout .fps-tag { font-size: 11px; color: var(--muted); }
  .frame-edit-readout .fps-tag input {
    width: 50px;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 2px 5px;
    font-family: inherit;
    font-size: 11px;
    border-radius: 3px;
    text-align: right;
  }
  .frame-step-row {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 4px;
  }
  .frame-step-row button {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 7px 4px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    box-shadow: none;
    transition: background 0.12s, border-color 0.12s;
  }
  .frame-step-row button:hover {
    background: rgba(var(--jade-rgb), 0.12);
    border-color: rgba(var(--jade-rgb), 0.4);
  }
  .frame-step-row button[data-step="-1"],
  .frame-step-row button[data-step="1"] {
    background: rgba(var(--jade-rgb), 0.08);
    border-color: rgba(var(--jade-rgb), 0.3);
    color: var(--accent);
    font-weight: 600;
  }
  .frame-scrub {
    width: 100%;
    margin: 0;
  }
  /* IN/OUT controls: each button paired with its timecode on the same
     row (vertical stack), then a separate range-summary line at bottom.
     This survives narrow viewports — the old 3-column grid was overflowing
     on widths under ~700px because the middle "range-info" couldn't shrink. */
  .frame-marks {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .frame-mark-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .frame-marks button.mark {
    background: rgba(245, 200, 80, 0.12);
    border: 1px solid rgba(245, 200, 80, 0.4);
    color: #ffd07a;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    font-weight: 600;
    box-shadow: none;
    white-space: nowrap;
    flex-shrink: 0;
    min-width: 160px;
  }
  .frame-marks button.mark:hover {
    background: rgba(245, 200, 80, 0.22);
    border-color: rgba(245, 200, 80, 0.7);
  }
  .frame-mark-row .tc {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    color: #ffd07a;
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .frame-mark-row .tc.empty { color: var(--muted); font-style: italic; }
  .range-dur {
    text-align: center;
    font-family: ui-monospace, Consolas, monospace;
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
    padding-top: 8px;
    border-top: 1px solid var(--border);
    margin-top: 2px;
  }
  .range-dur.empty {
    color: var(--muted);
    font-weight: 400;
    font-style: italic;
  }
  .frame-shortcut {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    margin-top: -4px;
  }
  .frame-shortcut kbd {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 10px;
    color: var(--text-soft);
  }
</style>

<div class="tool-layout">
  <div class="sidebar">

        <option value="trim" data-i18n="vt.action.trim">✂️ 时间裁剪 (Trim)</option>
        <option value="crop" data-i18n="vt.action.crop">🔲 画面裁剪 (Crop)</option>
        <option value="resize" data-i18n="vt.action.resize">📐 缩放</option>
        <option value="speed" data-i18n="vt.action.speed">⏩ 调速</option>

        <option value="webm-vp9" data-i18n="vt.outFmt.vp9">WebM (VP9) — 全平台</option>

    </div>
    <div class="field">
      <label data-i18n="vt.h264Profile">H.264 profile (仅 MP4 输出)</label>
      <select id="h264Profile">
        <option value="baseline" selected data-i18n="vt.profile.baseline">Baseline (兼容老设备, 体积稍大)</option>
        <option value="main" data-i18n="vt.profile.main">Main (主流, 体积 -5%~-10%)</option>
        <option value="high" data-i18n="vt.profile.high">High (推荐现代设备, 体积 -10%~-20%)</option>
      </select>
      <div class="info" style="margin-top:4px" data-i18n="vt.profile.help">所有主流浏览器和 ≥2014 年的设备都支持 High profile;选 High 比特率不变但视觉质量更好</div>
    </div>
    <div class="field">

    <div class="field">

    <div class="field">
      <label data-i18n="common.filename">文件名</label>

    <button id="applyBtn" disabled data-i18n="vt.apply">应用</button>

  <div class="main">

    <div class="preview-pair">
      <div class="preview-col">
        <div class="label" data-i18n="vt.srcLabel">原视频</div>
        <div class="preview-box" id="srcBox">
          <div class="preview-empty" data-i18n="vt.empty.drop">拖入视频</div>
        </div>
      </div>

    <div class="timeline-row" id="timelineRow" style="display:none">
      <button id="playBtn" class="secondary" style="padding:4px 10px; font-size:11px">▶</button>

<script>
Toolkit.injectTopbar('video-toolkit');

(() => {
  const { $, makeLogger, makeProgress, attachDropZone, download, newCanvas, canvasToBlob, fmtBytes, makeZip, naturalSort } = Toolkit;
  const log = makeLogger($('log'));
  const progress = makeProgress($('progress'));

  let srcVideo = null;
  let srcUrl = null;
  let srcMeta = null;  // {w, h, duration}
  let srcFrames = [];  // for fromFrames action: [{bitmap, w, h, name}]
  let outBlob = null;
  let outExt = 'webm';

  attachDropZone($('dropZone'), $('fileInput'), handleFiles);
  const handoff = Toolkit.setupHandoff('video-toolkit', { outputType: 'video/mp4' });
  $('action').addEventListener('change', () => { updateDropZoneForAction(); renderActionControls(); });
  // initial sync in case action default changes
  updateDropZoneForAction();

  // The drop zone hint + the file input's accept attribute switch depending on
  // whether the action wants a single video (default) or a folder of images
  // (fromFrames). Without this the user gets the wrong file picker on click.
  function updateDropZoneForAction() {
    const isFrames = $('action').value === 'fromFrames';
    $('dzTitle').textContent = isFrames
      ? Toolkit.T('vt.dz.framesTitle', null, '📂 拖入序列帧 (可多选 / 文件夹)')
      : Toolkit.T('vt.dz.videoTitle', null, '📂 拖入视频');
    $('dzHint').innerHTML = isFrames
      ? Toolkit.T('vt.dz.framesHint', null, 'PNG / JPG / WebP — 按文件名自然排序<br/>所有处理在浏览器本地完成')
      : Toolkit.T('vt.dz.videoHint', null, 'MP4 / WebM / MOV<br/>所有处理在浏览器本地完成');
    const fi = $('fileInput');
    if (isFrames) { fi.accept = 'image/*'; fi.multiple = true; }
    else { fi.accept = 'video/*'; fi.multiple = false; }
  }

  async function handleFiles(files) {
    if (!files.length) return;
    const f0 = files[0];
    // Auto-route: a bunch of images → switch to fromFrames; a single video →
    // current path. This lets the user just drop whatever and the tool figures
    // out the intent, instead of forcing them to set the action dropdown first.
    const looksLikeImage = (f) =>
      (f.type && f.type.startsWith('image/')) ||
      /\.(png|jpe?g|webp|bmp|avif)$/i.test(f.name);
    if (looksLikeImage(f0)) {
      if ($('action').value !== 'fromFrames') {
        $('action').value = 'fromFrames';
        updateDropZoneForAction();
      }
      await handleFramesInput(files.filter(looksLikeImage));
      renderActionControls();
      return;
    }
    if (!f0.type.startsWith('video/')) {
      log.err(Toolkit.T('vt.err.notVideo', null, 'Bad Dobby! 没看到视频,你再丢一次?(或者扔一组图片,Dobby 自动切到「帧合成视频」)'));
      return;
    }
    const f = f0;
    log.clear();
    log.dim(Toolkit.T('vt.log.load', { name: f.name, size: fmtBytes(f.size) }, `加载 ${f.name} (${fmtBytes(f.size)})...`));
    if (srcUrl) URL.revokeObjectURL(srcUrl);
    srcUrl = URL.createObjectURL(f);
    srcVideo = document.createElement('video');
    srcVideo.src = srcUrl;
    srcVideo.muted = true; srcVideo.playsInline = true; srcVideo.preload = 'auto';

    await new Promise((resolve, reject) => {
      srcVideo.onloadedmetadata = resolve;
      srcVideo.onerror = () => reject(new Error(Toolkit.T('vt.err.videoLoad', null, '视频加载失败')));
    });

    srcMeta = { w: srcVideo.videoWidth, h: srcVideo.videoHeight, duration: srcVideo.duration };
    $('srcBox').innerHTML = '';
    srcVideo.controls = true;
    srcVideo.style.maxWidth = '100%';
    srcVideo.style.maxHeight = '100%';
    $('srcBox').appendChild(srcVideo);
    $('stats').innerHTML = Toolkit.T('vt.stats.loaded', { w: srcMeta.w, h: srcMeta.h, dur: srcMeta.duration.toFixed(2), size: fmtBytes(f.size) }, `<strong>${srcMeta.w}×${srcMeta.h}</strong> · <strong>${srcMeta.duration.toFixed(2)}s</strong> · 原文件 <strong>${fmtBytes(f.size)}</strong>`);
    $('applyBtn').disabled = false;
    log.ok(Toolkit.T('vt.log.loadDone', null, '加载完成'));
    renderActionControls();
  }

  // Load a sequence of image files as frames for the fromFrames action.
  // Files are sorted by natural name (so walk_001.png comes before walk_010.png).
  // Bitmaps are kept in memory — for 100+ frames this can use a lot of RAM, but
  // that's the cost of being a no-server browser tool.
  async function handleFramesInput(files) {
    if (!files.length) { log.err(Toolkit.T('vt.err.noImages', null, '没有图片文件')); return; }
    const sorted = naturalSort(files);
    log.clear();
    log.dim(Toolkit.T('vt.log.loadingImgs', { n: sorted.length }, `加载 ${sorted.length} 张图片...`));
    // clear video state so the apply path doesn't get confused
    if (srcUrl) { URL.revokeObjectURL(srcUrl); srcUrl = null; }
    srcVideo = null; srcMeta = null;
    // dispose any old bitmaps
    for (const f of srcFrames) f.bitmap?.close?.();
    srcFrames = [];
    for (let i = 0; i < sorted.length; i++) {
      try {
        const bm = await createImageBitmap(sorted[i]);
        srcFrames.push({ bitmap: bm, w: bm.width, h: bm.height, name: sorted[i].name });
      } catch (e) {
        log.warn(Toolkit.T('vt.log.imgSkip', { name: sorted[i].name, msg: e.message }, `跳过 ${sorted[i].name}: ${e.message}`));
      }
      if (i % 10 === 0) progress.set(i / sorted.length);
    }
    progress.hide();
    if (!srcFrames.length) { log.err(Toolkit.T('vt.err.allImgsFailed', null, '全部图片加载失败')); $('applyBtn').disabled = true; return; }
    const f0 = srcFrames[0];
    // preview first frame in the source box
    $('srcBox').innerHTML = '';
    const preview = newCanvas(f0.w, f0.h);
    preview.getContext('2d').drawImage(f0.bitmap, 0, 0);
    preview.style.maxWidth = '100%'; preview.style.maxHeight = '100%';
    $('srcBox').appendChild(preview);
    $('stats').innerHTML = Toolkit.T('vt.stats.frames', { n: srcFrames.length, w: f0.w, h: f0.h, name: f0.name }, `<strong>${srcFrames.length}</strong> 帧 · <strong>${f0.w}×${f0.h}</strong> · 首帧 <strong>${f0.name}</strong>`);
    $('applyBtn').disabled = false;
    log.ok(Toolkit.T('vt.log.framesLoaded', { n: srcFrames.length }, `加载完成 ${srcFrames.length} 帧`));
  }

  // remember the original bitrate so leaving "一键压缩" can restore it
  const DEFAULT_BITRATE = $('bitrate').value;
  let lastAction = null;

  // ─── Frame-precise trim editor ──────────────────────────────────────
  // Wires up the UI block rendered for action === 'trim'. Pulls fps from
  // requestVideoFrameCallback metadata when supported, else asks the user
  // to set it (default 30). All seeks land on a frame boundary
  // (currentTime = frame_index / fps + half-frame offset for stability).
  let frameTrimCleanup = null;
  let cropSelectorCleanup = null;

  // Visual crop-region selector. Sits on top of #srcBox's video element
  // and draws a draggable / resizable rectangle. Two-way bound to the
  // cropX / cropY / cropW / cropH number inputs (which use NATIVE video
  // pixels). All math involves a scale factor between displayed CSS
  // pixels and native pixels — the video may be downscaled to fit
  // .preview-box on tight viewports.
  function setupCropSelector(nativeW, nativeH) {
    const srcBox = $('srcBox');
    if (!srcBox) return;
    const video = srcBox.querySelector('video');
    if (!video) return;

    // If the video hasn't laid out yet (rare — usually metadata is loaded
    // by the time we get here), wait one rAF and try again.
    if (!video.getBoundingClientRect().width) {
      requestAnimationFrame(() => setupCropSelector(nativeW, nativeH));
      return;
    }

    // srcBox needs to be a positioning context so the overlay can be
    // absolute-positioned within it.
    srcBox.style.position = 'relative';

    const overlay = document.createElement('div');
    overlay.className = 'crop-overlay';
    overlay.innerHTML = `
      <div class="crop-rect">
        <span class="crop-label"></span>
        <div class="crop-handle tl"></div>
        <div class="crop-handle tr"></div>
        <div class="crop-handle bl"></div>
        <div class="crop-handle br"></div>
        <div class="crop-handle t"></div>
        <div class="crop-handle b"></div>
        <div class="crop-handle l"></div>
        <div class="crop-handle r"></div>
      </div>
    `;
    srcBox.appendChild(overlay);
    const rect = overlay.querySelector('.crop-rect');
    const label = overlay.querySelector('.crop-label');

    // Match overlay to current video display rect within srcBox
    function syncOverlayToVideo() {
      const vRect = video.getBoundingClientRect();
      const sRect = srcBox.getBoundingClientRect();
      overlay.style.left = (vRect.left - sRect.left) + 'px';
      overlay.style.top = (vRect.top - sRect.top) + 'px';
      overlay.style.width = vRect.width + 'px';
      overlay.style.height = vRect.height + 'px';
    }
    syncOverlayToVideo();
    const ro = new ResizeObserver(() => { syncOverlayToVideo(); renderRectFromInputs(); });
    ro.observe(video);
    ro.observe(srcBox);

    function getScale() {
      const vw = video.getBoundingClientRect().width;
      return vw > 0 ? vw / nativeW : 1;
    }

    function renderRectFromInputs() {
      const scale = getScale();
      const x = Math.max(0, +$('cropX').value || 0);
      const y = Math.max(0, +$('cropY').value || 0);
      const w = Math.max(1, +$('cropW').value || nativeW);
      const h = Math.max(1, +$('cropH').value || nativeH);
      rect.style.left = (x * scale) + 'px';
      rect.style.top = (y * scale) + 'px';
      rect.style.width = (w * scale) + 'px';
      rect.style.height = (h * scale) + 'px';
      label.textContent = `${w} × ${h}`;
    }

    function commitRectToInputs() {
      const scale = getScale();
      let x = Math.round(parseFloat(rect.style.left) / scale);
      let y = Math.round(parseFloat(rect.style.top) / scale);
      let w = Math.round(parseFloat(rect.style.width) / scale);
      let h = Math.round(parseFloat(rect.style.height) / scale);
      x = Math.max(0, Math.min(nativeW - 1, x));
      y = Math.max(0, Math.min(nativeH - 1, y));
      w = Math.max(1, Math.min(nativeW - x, w));
      h = Math.max(1, Math.min(nativeH - y, h));
      $('cropX').value = x;
      $('cropY').value = y;
      $('cropW').value = w;
      $('cropH').value = h;
      label.textContent = `${w} × ${h}`;
    }

    // Two-way binding: typing in inputs redraws the rect
    const inputIds = ['cropX', 'cropY', 'cropW', 'cropH'];
    const inputListeners = inputIds.map(id => {
      const el = $(id);
      const fn = renderRectFromInputs;
      el.addEventListener('input', fn);
      return [el, fn];
    });
    renderRectFromInputs();

    // ===== Drag state machine =====
    let drag = null;

    function getMousePos(e) {
      const oRect = overlay.getBoundingClientRect();
      return { x: e.clientX - oRect.left, y: e.clientY - oRect.top };
    }
    function startDrag(e, kind) {
      e.preventDefault();
      const pos = getMousePos(e);
      drag = {
        kind,
        sx: pos.x, sy: pos.y,
        sl: parseFloat(rect.style.left) || 0,
        st: parseFloat(rect.style.top) || 0,
        sw: parseFloat(rect.style.width) || 0,
        sh: parseFloat(rect.style.height) || 0
      };
    }

    function onRectMouseDown(e) {
      if (e.target === rect) startDrag(e, 'move');
    }
    function onOverlayMouseDown(e) {
      // Click outside the rect → start a brand new selection from this point.
      if (e.target === overlay) {
        const pos = getMousePos(e);
        rect.style.left = pos.x + 'px';
        rect.style.top = pos.y + 'px';
        rect.style.width = '0px';
        rect.style.height = '0px';
        startDrag(e, 'resize-br');  // drag toward bottom-right to size it
      }
    }
    function onHandleMouseDown(e) {
      e.stopPropagation();
      const dir = [...e.currentTarget.classList].find(c => c !== 'crop-handle');
      startDrag(e, 'resize-' + dir);
    }
    function onMouseMove(e) {
      if (!drag) return;
      const pos = getMousePos(e);
      const dx = pos.x - drag.sx, dy = pos.y - drag.sy;
      const oW = overlay.getBoundingClientRect().width;
      const oH = overlay.getBoundingClientRect().height;
      let nl = drag.sl, nt = drag.st, nw = drag.sw, nh = drag.sh;

      if (drag.kind === 'move') {
        nl = Math.max(0, Math.min(oW - nw, drag.sl + dx));
        nt = Math.max(0, Math.min(oH - nh, drag.st + dy));
      } else if (drag.kind.startsWith('resize-')) {
        const dir = drag.kind.slice(7);
        if (dir.includes('l')) { nl = drag.sl + dx; nw = drag.sw - dx; }
        if (dir.includes('r')) { nw = drag.sw + dx; }
        if (dir.includes('t')) { nt = drag.st + dy; nh = drag.sh - dy; }
        if (dir.includes('b')) { nh = drag.sh + dy; }
        // Clamp shrink (don't let width/height go below 4 CSS px)
        if (nw < 4) { if (dir.includes('l')) nl = drag.sl + drag.sw - 4; nw = 4; }
        if (nh < 4) { if (dir.includes('t')) nt = drag.st + drag.sh - 4; nh = 4; }
        // Clamp to overlay bounds
        if (nl < 0) { nw += nl; nl = 0; }
        if (nt < 0) { nh += nt; nt = 0; }
        if (nl + nw > oW) nw = oW - nl;
        if (nt + nh > oH) nh = oH - nt;
      }
      rect.style.left = nl + 'px';
      rect.style.top = nt + 'px';
      rect.style.width = nw + 'px';
      rect.style.height = nh + 'px';
      commitRectToInputs();
    }
    function onMouseUp() { drag = null; }

    rect.addEventListener('mousedown', onRectMouseDown);
    overlay.addEventListener('mousedown', onOverlayMouseDown);
    overlay.querySelectorAll('.crop-handle').forEach(h => h.addEventListener('mousedown', onHandleMouseDown));
    document.addEventListener('mousemove', onMouseMove);
    document.addEventListener('mouseup', onMouseUp);

    cropSelectorCleanup = () => {
      ro.disconnect();
      document.removeEventListener('mousemove', onMouseMove);
      document.removeEventListener('mouseup', onMouseUp);
      inputListeners.forEach(([el, fn]) => el.removeEventListener('input', fn));
      overlay.remove();
    };
  }

  function setupFrameTrim(duration) {
    if (frameTrimCleanup) { frameTrimCleanup(); frameTrimCleanup = null; }
    let fps = 30;
    let totalFrames = Math.max(1, Math.round(duration * fps));
    let inFrame = null;
    let outFrame = null;

    const fpsInput = $('fpsManual');
    const fpsHint = $('fpsHint');
    const scrub = $('frameScrub');
    scrub.max = String(totalFrames);

    function fmtTC(t) {
      const ms = Math.max(0, Math.round(t * 1000));
      const h = Math.floor(ms / 3600000);
      const m = Math.floor((ms % 3600000) / 60000);
      const s = Math.floor((ms % 60000) / 1000);
      const f = ms % 1000;
      return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(f).padStart(3,'0')}`;
    }
    function currentFrame() {
      return Math.max(0, Math.min(totalFrames - 1, Math.round(srcVideo.currentTime * fps)));
    }
    function refreshReadout() {
      const t = srcVideo.currentTime;
      const f = currentFrame();
      $('tcBig').textContent = fmtTC(t);
      $('frameNum').textContent = Toolkit.T('vt.trim.frameNum', { f, max: totalFrames - 1 }, `帧 ${f} / ${totalFrames - 1}`);
      scrub.value = String(f);
    }
    function rebuildOnFpsChange(newFps) {
      fps = newFps;
      totalFrames = Math.max(1, Math.round(duration * fps));
      scrub.max = String(totalFrames);
      refreshReadout();
      refreshRange();
    }
    fpsInput.addEventListener('change', () => {
      const v = parseFloat(fpsInput.value);
      if (isFinite(v) && v >= 1 && v <= 240) {
        rebuildOnFpsChange(v);
        fpsHint.textContent = Toolkit.T('vt.trim.manual', null, '(手动)');
      }
    });

    // Auto-detect fps via requestVideoFrameCallback — most accurate path.
    // We sample (mediaTime, presentedFrames) twice during a short play burst,
    // then derive fps = Δframes / Δtime. Stops after detection or 2s.
    if ('requestVideoFrameCallback' in HTMLVideoElement.prototype) {
      let sample0 = null;
      const detect = (now, meta) => {
        if (sample0 == null) {
          sample0 = { t: meta.mediaTime, f: meta.presentedFrames };
        } else {
          const dt = meta.mediaTime - sample0.t;
          const df = meta.presentedFrames - sample0.f;
          if (df > 2 && dt > 0.05) {
            const detected = df / dt;
            // Snap to common rates (24 / 25 / 30 / 50 / 60) when close
            const snaps = [23.976, 24, 25, 29.97, 30, 50, 59.94, 60];
            const snap = snaps.find(s => Math.abs(s - detected) < 0.5);
            const final = snap || +detected.toFixed(2);
            fpsInput.value = String(final);
            fpsHint.textContent = Toolkit.T('vt.trim.auto', null, '(自动检测)');
            rebuildOnFpsChange(final);
            srcVideo.pause();
            srcVideo.currentTime = 0;
            return;
          }
        }
        srcVideo.requestVideoFrameCallback(detect);
      };
      srcVideo.requestVideoFrameCallback(detect);
      srcVideo.play().catch(() => {});
      setTimeout(() => srcVideo.pause(), 2000); // safety: stop if detection stalls
    }

    function stepFrames(delta) {
      const target = currentFrame() + delta;
      const clamped = Math.max(0, Math.min(totalFrames - 1, target));
      // Half-frame offset improves landing on the intended frame on
      // browsers that pick nearest keyframe; the readout still shows
      // the clamped frame index so the user sees a consistent number.
      srcVideo.currentTime = (clamped + 0.5) / fps;
    }

    // Frame-step buttons
    document.querySelectorAll('.frame-step-row button').forEach(b => {
      b.addEventListener('click', () => stepFrames(parseInt(b.dataset.step, 10)));
    });

    // Scrubber
    scrub.addEventListener('input', () => {
      const f = parseInt(scrub.value, 10);
      srcVideo.currentTime = (f + 0.5) / fps;
    });

    // IN / OUT marks
    function setIn() {
      inFrame = currentFrame();
      // Validate against existing OUT
      if (outFrame != null && inFrame >= outFrame) {
        outFrame = null;
      }
      refreshRange();
      log.ok(Toolkit.T('vt.log.setIn', { f: inFrame }, `📍 IN 设在帧 ${inFrame}`));
    }
    function setOut() {
      outFrame = currentFrame();
      if (inFrame != null && outFrame <= inFrame) {
        inFrame = null;
      }
      refreshRange();
      log.ok(Toolkit.T('vt.log.setOut', { f: outFrame }, `📍 OUT 设在帧 ${outFrame}`));
    }
    $('setInBtn').addEventListener('click', setIn);
    $('setOutBtn').addEventListener('click', setOut);

    function refreshRange() {
      const inT = inFrame != null ? inFrame / fps : null;
      const outT = outFrame != null ? outFrame / fps : null;
      // The button alongside already says "IN" / "OUT", so the timecode
      // span just shows the value (or "未设" in muted italic if unset).
      const inEl = $('inDisplay'), outEl = $('outDisplay'), rEl = $('rangeDuration');
      const frameLbl = Toolkit.T('vt.trim.frameWord', null, '帧');
      const unset = Toolkit.T('vt.trim.unset', null, '未设');
      if (inFrame != null) {
        inEl.textContent = `${fmtTC(inT)} · ${frameLbl} ${inFrame}`;
        inEl.classList.remove('empty');
      } else {
        inEl.textContent = unset;
        inEl.classList.add('empty');
      }
      if (outFrame != null) {
        outEl.textContent = `${fmtTC(outT)} · ${frameLbl} ${outFrame}`;
        outEl.classList.remove('empty');
      } else {
        outEl.textContent = unset;
        outEl.classList.add('empty');
      }
      if (inFrame != null && outFrame != null) {
        const dur = outT - inT;
        rEl.textContent = Toolkit.T('vt.trim.range', { dur: fmtTC(dur), n: outFrame - inFrame + 1 }, `📐 输出范围 · ${fmtTC(dur)} (${outFrame - inFrame + 1} 帧)`);
        rEl.classList.remove('empty');
      } else if (inFrame != null) {
        rEl.textContent = Toolkit.T('vt.trim.onlyIn', null, '只设了 IN — 默认导出 [IN, 末尾]');
        rEl.classList.add('empty');
      } else if (outFrame != null) {
        rEl.textContent = Toolkit.T('vt.trim.onlyOut', null, '只设了 OUT — 默认导出 [开头, OUT]');
        rEl.classList.add('empty');
      } else {
        rEl.textContent = Toolkit.T('vt.trim.noRange', null, '未设置范围 · 默认导出整段');
        rEl.classList.add('empty');
      }
      // Update the hidden inputs used by the export pipeline
      const s = inFrame != null ? inFrame / fps : 0;
      const e = outFrame != null ? (outFrame + 1) / fps : duration;
      $('trimStart').value = s.toFixed(3);
      $('trimEnd').value = e.toFixed(3);
      $('trimStartVal').textContent = s.toFixed(2);
      $('trimEndVal').textContent = e.toFixed(2);
    }
    refreshRange();

    // Live readout when the user scrubs via the video's own controls
    const onTimeUpdate = () => refreshReadout();
    srcVideo.addEventListener('timeupdate', onTimeUpdate);
    srcVideo.addEventListener('seeked', onTimeUpdate);

    // Keyboard shortcuts (active while focus is NOT in an input)
    const onKey = (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      // Only act when the trim controls are visible
      if ($('action').value !== 'trim') return;
      if (e.key === 'ArrowLeft')  { stepFrames(e.shiftKey ? -30 : -1); e.preventDefault(); }
      else if (e.key === 'ArrowRight') { stepFrames(e.shiftKey ?  30 :  1); e.preventDefault(); }
      else if (e.key === 'i' || e.key === 'I') { setIn(); e.preventDefault(); }
      else if (e.key === 'o' || e.key === 'O') { setOut(); e.preventDefault(); }
      else if (e.key === ' ') {
        if (srcVideo.paused) srcVideo.play(); else srcVideo.pause();
        e.preventDefault();
      }
    };
    document.addEventListener('keydown', onKey);

    frameTrimCleanup = () => {
      document.removeEventListener('keydown', onKey);
      srcVideo.removeEventListener('timeupdate', onTimeUpdate);
      srcVideo.removeEventListener('seeked', onTimeUpdate);
    };
    refreshReadout();
  }

  function renderActionControls() {
    const action = $('action').value;
    const c = $('actionControls');
    // If we're leaving trim mode, tear down its key listener + RAF
    if (frameTrimCleanup && action !== 'trim') {
      frameTrimCleanup();
      frameTrimCleanup = null;
    }
    // Always tear down any crop overlay from a previous render — even if
    // we're staying in crop mode, the overlay gets rebuilt fresh below so
    // input listeners / drag handlers don't double-attach.
    if (cropSelectorCleanup) {
      cropSelectorCleanup();
      cropSelectorCleanup = null;
    }
    // fromFrames has its own input flow (image sequence, no srcMeta) — render
    // even when no video is loaded, since the controls are useful before drop.
    if (action === 'fromFrames') {
      const f0 = srcFrames[0] || null;
      const dW = f0 ? f0.w : 1280;
      const dH = f0 ? f0.h : 720;
      const fpsLbl = Toolkit.T('vt.ff.fps', null, '输出 FPS');
      const wLbl = Toolkit.T('vt.ff.outW', null, '输出宽 (px, 偶数)');
      const hLbl = Toolkit.T('vt.ff.outH', null, '输出高 (px, 偶数)');
      const sizeNote = Toolkit.T('vt.ff.sizeNote', null, '默认沿用首帧尺寸 · 所有帧会被等比缩放到这个尺寸 · 强烈建议偶数(H.264 要求)');
      c.innerHTML = `
        <div class="field">
          <label>${fpsLbl}</label>
          <input type="number" id="ffFps" value="30" min="1" max="60" />
        </div>
        <div class="row-fields">
          <div class="field">
            <label>${wLbl}</label>
            <input type="number" id="ffOutW" value="${dW}" min="2" step="2" />
          </div>
          <div class="field">
            <label>${hLbl}</label>
            <input type="number" id="ffOutH" value="${dH}" min="2" step="2" />
          </div>
        </div>
        <div class="info">${sizeNote}</div>
        <div class="info" id="ffEstimate" style="color: var(--jade); margin-top:4px"></div>
      `;
      const updateEst = () => {
        const fps = parseInt($('ffFps').value, 10) || 30;
        const n = srcFrames.length;
        const dur = n / fps;
        $('ffEstimate').textContent = n
          ? Toolkit.T('vt.ff.estimate', { n, fps, dur: dur.toFixed(2) }, `${n} 帧 @ ${fps} FPS = ${dur.toFixed(2)} 秒`)
          : Toolkit.T('vt.ff.estimateEmpty', null, '先拖入序列帧再来,这里会显示预估时长');
      };
      updateEst();
      $('ffFps').addEventListener('input', updateEst);
      lastAction = action;
      return;
    }
    if (!srcMeta) return;
    const { w, h, duration } = srcMeta;

    // if user is leaving the compress action, restore bitrate / format to defaults
    if (lastAction === 'compress' && action !== 'compress') {
      $('bitrate').value = DEFAULT_BITRATE;
    }
    lastAction = action;

    if (action === 'transcode') {
      // Pure transcode — no edits, just re-encode to the chosen output format.
      // The default outW/outH = src dims so we don't touch the resolution;
      // existing encode pipeline already handles src→output with no transforms
      // when no other action flags are set.
      const tcHead = Toolkit.T('vt.tc.head', { w: srcMeta.w, h: srcMeta.h, dur: srcMeta.duration.toFixed(1) }, `<strong style="color:var(--accent)">转码模式</strong> — 不做任何画面修改,只换编码格式(MP4 ↔ WebM)和码率。<br/>原视频: <strong>${srcMeta.w}×${srcMeta.h}</strong> · ${srcMeta.duration.toFixed(1)}s`);
      const tcTip = Toolkit.T('vt.tc.tip', null, '📤 下方「输出」选 MP4 → 转 .mp4,选 WebM → 转 .webm。<br/>🎚️ 「比特率」越高质量越好但体积越大,3000-5000 kbps 适合一般录像。');
      c.innerHTML = `
        <div class="info" style="background:rgba(var(--jade-rgb),0.08); border:1px solid rgba(var(--jade-rgb),0.3); border-left:3px solid var(--accent); padding:10px 12px; border-radius:var(--radius-sm)">
          ${tcHead}
        </div>
        <div class="info" style="margin-top:8px">
          ${tcTip}
        </div>
      `;
    } else if (action === 'compress') {
      const targetMb = Math.max(0.3, (srcMeta.w * srcMeta.h * srcMeta.duration / 5e6)).toFixed(1);
      const cmpPL = Toolkit.T('vt.cmp.preset', null, '质量预设');
      const cmpTL = Toolkit.T('vt.cmp.targetLabel', null, '目标体积 (MB)');
      const cmpTH = Toolkit.T('vt.cmp.targetHelp', null, '按时长反推比特率,实际输出可能 ±20% 浮动');
      const cmpSA = Toolkit.T('vt.cmp.stripAudio', null, '去掉音轨 (再节省 ~10%)');
      const cmpNote = Toolkit.T('vt.cmp.note', null, '输出锁定 <strong>MP4 (H.264)</strong> 以获得最佳压缩率。预设会自动改下方"输出"区的比特率/格式 — 切走再切回会重置。');
      const cmpTiny = Toolkit.T('vt.cmp.tiny', null, '📉 极致小 (480p · 400 kbps)');
      const cmpSmall = Toolkit.T('vt.cmp.small', null, '📦 小 (720p · 1200 kbps)');
      const cmpMed = Toolkit.T('vt.cmp.medium', null, '⚖️ 中等 (原尺寸 · 2500 kbps)');
      const cmpCustom = Toolkit.T('vt.cmp.custom', null, '⚙️ 自定义目标体积');
      c.innerHTML = `
        <div class="field">
          <label>${cmpPL}</label>
          <select id="cmpPreset">
            <option value="tiny">${cmpTiny}</option>
            <option value="small" selected>${cmpSmall}</option>
            <option value="medium">${cmpMed}</option>
            <option value="custom">${cmpCustom}</option>
          </select>
        </div>
        <div class="field" id="cmpTargetField" style="display:none">
          <label>${cmpTL}</label>
          <input type="number" id="cmpTargetMb" value="${targetMb}" min="0.1" step="0.1" />
          <div class="info" style="margin-top:4px">${cmpTH}</div>
        </div>
        <label class="checkbox" style="margin-top:8px"><input type="checkbox" id="cmpStripAudio" /><span>${cmpSA}</span></label>
        <div class="info" style="margin-top:8px">${cmpNote}</div>
        <div class="info" id="cmpEstimate" style="margin-top:4px; color: var(--jade)"></div>
      `;
      const applyPreset = () => {
        const v = $('cmpPreset').value;
        $('cmpTargetField').style.display = v === 'custom' ? '' : 'none';
        $('outFormat').value = 'mp4';
        const { w, h, duration } = srcMeta;
        const safeDur = duration > 0.1 ? duration : 1;  // guard against missing/0 duration
        let kbps;
        if (v === 'tiny') kbps = 400;
        else if (v === 'small') kbps = 1200;
        else if (v === 'medium') kbps = 2500;

        sepia: fT('vt.filter.opt.sepia', '怀旧 Sepia'),

        <div class="field"><label>${conL} <span id="vfConVal" class="mono">100%</span></label><input type="range" id="vfCon" min="0" max="200" value="100" /></div>

        warm:     { gray:0, sepia:0, inv:0, bri:105, con:105, sat:115, hue:25 },
        vivid:    { gray:0, sepia:0, inv:0, bri:100, con:110, sat:180, hue:0 },

        $('vfGray').checked = !!p.gray; $('vfSepia').checked = !!p.sepia; $('vfInvert').checked = !!p.inv;
        $('vfBri').value = p.bri; $('vfBriVal').textContent = p.bri + '%';
        $('vfCon').value = p.con; $('vfConVal').textContent = p.con + '%';
        $('vfSat').value = p.sat; $('vfSatVal').textContent = p.sat + '%';
