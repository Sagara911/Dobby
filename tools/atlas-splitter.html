<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap">
<!-- KILLSWITCH v2 -->
<script>
/* one-shot legacy cleanup — drops old SW, caches, and localStorage left behind
   by removed settings UI; reloads once so the fresh code takes over. */
(function () {
  var KEY = 'toolkit-cleaned-v2';
  if (localStorage.getItem(KEY)) return;
  localStorage.setItem(KEY, '1');
  (async function () {
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) { try { await r.unregister(); } catch (_) {} }
      }
      if ('caches' in window) {
        var ks = await caches.keys();
        for (var k of ks) { try { await caches.delete(k); } catch (_) {} }
      }
      try { localStorage.removeItem('toolkit-cursor'); } catch (_) {}
      try { localStorage.removeItem('toolkit-theme'); } catch (_) {}
      var stale = document.getElementById('__toolkit_cursor_style__');
      if (stale) stale.remove();
      document.documentElement.removeAttribute('data-theme');
      location.reload();
    } catch (e) { console.warn('[cleanup]', e); }
  })();
})();
</script>
<title>Atlas Splitter · Dobby</title>
<link rel="stylesheet" href="../assets/shared.css" />
<style>
  .anim-preview {
    flex: 1;
    background: var(--checker), #1a1a1a;
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: auto;
    padding: 16px;
    min-height: 280px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .anim-preview canvas { image-rendering: pixelated; }
  .anim-toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 12px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
  }
  .anim-toolbar input[type=range] { flex: 1; }
  .anim-toolbar .frame-label { font-family: ui-monospace, Consolas, monospace; font-size: 12px; min-width: 80px; }
  .frame-tile.selected { outline: 2px solid var(--accent); outline-offset: -2px; }
  .frame-tile { cursor: pointer; }
</style>
</head>
<body>

<div class="tool-layout">
  <div class="sidebar">
    <h1>✂️ Atlas Splitter</h1>

    <div class="drop-zone" id="dropZone">
      <p data-i18n="as.drop.title">📂 拖入精灵图 (+ 可选 JSON)</p>
      <p class="hint" data-i18n-html="as.drop.hint">
        PNG + JSON: TexturePacker / 简洁数组<br/>
        只拖 PNG: 切换到手动网格拆分模式
      </p>
      <input type="file" id="fileInput" multiple accept=".png,.json,image/png,application/json" style="display:none" />
    </div>

    <div id="gridPanel" style="display:none; background:var(--bg); border:1px solid var(--border); border-left:3px solid var(--warning); border-radius:var(--radius-sm); padding:10px; margin-bottom:12px;">
      <div style="font-size:12px; color:var(--warning); margin-bottom:8px;" data-i18n="as.grid.noJson">⚠ 没有 JSON,需要手动指定网格</div>
      <div style="font-size:11px; color:var(--muted-2); margin-bottom:8px;" id="gridImgInfo"></div>
      <div class="field">
        <label data-i18n="as.grid.mode">拆分模式</label>
        <select id="gridMode">
          <option value="byCount" data-i18n="as.grid.byCount">按行列数 (cols × rows)</option>
          <option value="bySize" data-i18n="as.grid.bySize">按单帧尺寸 (W × H px)</option>
        </select>
      </div>
      <div class="field-row" id="gridByCount">
        <div class="field"><label data-i18n="as.grid.cols">列数</label><input type="number" id="gridCols" value="4" min="1" /></div>
        <div class="field"><label data-i18n="as.grid.rows">行数</label><input type="number" id="gridRows" value="4" min="1" /></div>
      </div>
      <div class="field-row" id="gridBySize" style="display:none">
        <div class="field"><label data-i18n="as.grid.frameW">单帧宽 (px)</label><input type="number" id="gridFrameW" value="64" min="1" /></div>
        <div class="field"><label data-i18n="as.grid.frameH">单帧高 (px)</label><input type="number" id="gridFrameH" value="64" min="1" /></div>
      </div>
      <button id="applyGridBtn" style="width:100%" data-i18n="as.grid.apply">应用网格拆分</button>
    </div>

    <h2 data-i18n="as.playback">动画播放</h2>
    <div class="field">
      <label>FPS</label>
      <input type="number" id="fps" value="12" min="1" max="60" />
    </div>
    <label class="checkbox">
      <input type="checkbox" id="loop" checked />
      <span data-i18n="as.loop">循环播放</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" id="zoom" />
      <span data-i18n="as.zoom2x">2× 放大显示</span>
    </label>

    <h2 data-i18n="common.export">导出</h2>
    <div class="field">
      <label data-i18n="as.filePrefix">文件名前缀</label>
      <input type="text" id="filePrefix" value="frame" />
    </div>
    <button id="exportZipBtn" disabled data-i18n="as.btn.zip">下载全部 (ZIP)</button>
    <button id="exportGifBtn" class="secondary" disabled data-i18n="as.btn.anim">导出动画 (GIF / APNG)</button>
    <button id="exportGodotBtn" class="secondary" disabled data-i18n="as.btn.godot">🎮 导出 Godot SpriteFrames</button>
    <button id="exportSelectedBtn" class="secondary" disabled data-i18n="as.btn.selected">下载选中帧</button>
    <button id="clearBtn" class="secondary" data-i18n="common.clearShort">清空</button>

    <div id="gifPanel" style="display:none; background:var(--bg); border:1px solid var(--border); border-radius:var(--radius-sm); padding:10px; margin-top:8px;">
      <div class="field-row">
        <div class="field"><label data-i18n="as.anim.format">格式</label>
          <select id="animFormat"><option value="gif">GIF</option><option value="apng">APNG</option></select>
        </div>
        <div class="field"><label>FPS</label>
          <input type="number" id="animFps" value="12" min="1" max="60" />
        </div>
      </div>
      <div class="field"><label data-i18n="as.anim.loop">循环次数 (0=无限)</label>
        <input type="number" id="animLoop" value="0" min="0" />
      </div>
      <button id="animBuildBtn" style="width:100%" data-i18n="as.anim.build">生成并下载</button>
    </div>

    <div class="log" id="log"></div>
  </div>

  <div class="main">
    <div class="stats" id="stats" data-i18n="common.idle">Dobby 待命</div>
    <div class="anim-preview" id="animPreview">
      <div class="preview-empty" data-i18n="as.preview.empty">拖入 PNG + JSON 后开始播放动画</div>
    </div>
    <div class="anim-toolbar" id="animToolbar" style="display:none">
      <button id="playBtn" class="secondary" data-i18n="as.btn.pause">⏸ 暂停</button>
      <input type="range" id="frameSlider" min="0" max="0" value="0" />
      <span class="frame-label" id="frameLabel">0 / 0</span>
    </div>
    <div>
      <h2 style="margin-top:0" data-i18n="as.allFrames">所有帧 (点击选中)</h2>
      <div class="frame-grid" id="frameGrid"></div>
    </div>
  </div>
</div>

<script src="../assets/shared.js"></script>
<script src="../assets/anim-encoders.js"></script>
<script>
Toolkit.injectTopbar('atlas-splitter');

(() => {
  const { $, makeLogger, attachDropZone, download, newCanvas, canvasToBlob, makeZip } = Toolkit;
  const log = makeLogger($('log'));

  let frames = [];        // [{name, canvas, sx, sy, sw, sh, offsetX, offsetY, sourceW, sourceH}]
  let selectedIdx = -1;
  let playing = true;
  let rafId = null;
  let currentFrame = 0;
  let lastTime = 0;
  let pendingBitmap = null;  // for no-JSON grid mode
  let sheetBitmap = null;    // the full source sheet (for Godot export — regions index into this)
  let frameTags = [];        // Aseprite meta.frameTags: [{name, from, to, direction}]

  attachDropZone($('dropZone'), $('fileInput'), handleFiles);
  const handoff = Toolkit.setupHandoff('atlas-splitter', { outputType: 'image/gif' });

  $('gridMode').addEventListener('change', e => {
    $('gridByCount').style.display = e.target.value === 'byCount' ? '' : 'none';
    $('gridBySize').style.display = e.target.value === 'bySize' ? '' : 'none';
  });

  $('applyGridBtn').addEventListener('click', () => {
    if (!pendingBitmap) return;
    const bm = pendingBitmap;
    sheetBitmap = bm;
    frameTags = [];   // grid mode has no animation tags → Godot export groups by filename prefix
    const mode = $('gridMode').value;
    let cols, rows, fw, fh;
    if (mode === 'byCount') {
      cols = parseInt($('gridCols').value, 10) || 1;
      rows = parseInt($('gridRows').value, 10) || 1;
      fw = Math.floor(bm.width / cols);
      fh = Math.floor(bm.height / rows);
    } else {
      fw = parseInt($('gridFrameW').value, 10) || 1;
      fh = parseInt($('gridFrameH').value, 10) || 1;
      cols = Math.floor(bm.width / fw);
      rows = Math.floor(bm.height / fh);
    }
    if (cols < 1 || rows < 1 || fw < 1 || fh < 1) {
      log.err(Toolkit.T('as.err.badGrid', null, '网格参数无效'));
      return;
    }
    const total = cols * rows;
    const frameDefs = [];
    for (let i = 0; i < total; i++) {
      const c = i % cols, r = Math.floor(i / cols);
      frameDefs.push({
        name: `frame_${String(i).padStart(4, '0')}`,
        sx: c * fw, sy: r * fh, sw: fw, sh: fh,
        offsetX: 0, offsetY: 0, sourceW: fw, sourceH: fh
      });
    }
    log.dim(Toolkit.T('as.log.gridSplit', { cols, rows, total, fw, fh }, `网格拆分: ${cols}×${rows} = ${total} 帧, 单帧 ${fw}×${fh}`));
    buildFrames(bm, frameDefs);
    log.ok(Toolkit.T('as.log.splitDone', { n: frames.length }, `拆分完成 ${frames.length} 帧`));
    renderFrameGrid();
    startPlayback();
    $('animToolbar').style.display = 'flex';
    $('exportZipBtn').disabled = false;
    $('exportGifBtn').disabled = false;
    $('exportGodotBtn').disabled = false;
    $('gridPanel').style.display = 'none';
    {
      const tFrames = Toolkit.T('as.stats.frames', null, '帧');
      const tAtlas = Toolkit.T('as.stats.atlas', null, '图集');
      const tGrid = Toolkit.T('as.stats.grid', null, '网格');
      const tCell = Toolkit.T('as.stats.cell', null, '单帧');
      $('stats').innerHTML = `<strong>${frames.length}</strong> ${tFrames} · ${tAtlas} <strong>${bm.width}×${bm.height}</strong> · ${tGrid} <strong>${cols}×${rows}</strong> · ${tCell} <strong>${fw}×${fh}</strong>`;
    }
    pendingBitmap = null;
  });

  async function handleFiles(files) {
    if (!files.length) return;
    log.clear();
    let pngFile = null, jsonFile = null;
    for (const f of files) {
      if (/\.png$/i.test(f.name) || f.type === 'image/png' || f.type.startsWith('image/')) pngFile = f;
      else if (/\.json$/i.test(f.name) || f.type === 'application/json') jsonFile = f;
    }
    if (!pngFile) {
      log.err(Toolkit.T('as.err.needPng', null, '需要至少一张图片'));
      return;
    }
    if (!jsonFile) {
      // No JSON: enter grid mode
      log.dim(Toolkit.T('as.log.pngNoJson', { name: pngFile.name }, `PNG: ${pngFile.name} (无 JSON,等待手动指定网格)`));
      try {
        pendingBitmap = await createImageBitmap(pngFile);
        $('gridImgInfo').textContent = Toolkit.T('as.grid.loadedInfo', { w: pendingBitmap.width, h: pendingBitmap.height }, `已加载: ${pendingBitmap.width} × ${pendingBitmap.height} px`);
        $('gridPanel').style.display = 'block';
        const cv = newCanvas(pendingBitmap.width, pendingBitmap.height);
        cv.getContext('2d').drawImage(pendingBitmap, 0, 0);
        $('animPreview').innerHTML = '';
        $('animPreview').appendChild(cv);
      } catch (e) {
        log.err(e.message);
      }
      return;
    }
    log.dim(`PNG: ${pngFile.name}`);
    log.dim(`JSON: ${jsonFile.name}`);
    $('gridPanel').style.display = 'none';

    try {
      const bitmap = await createImageBitmap(pngFile);
      sheetBitmap = bitmap;
      const jsonText = await jsonFile.text();
      const data = JSON.parse(jsonText);
      const parsed = parseFrames(data);
      frameTags = parsed.frameTags || [];
      log.dim(Toolkit.T('as.log.parsedFormat', { format: parsed.format }, `解析格式: ${parsed.format}`));
      buildFrames(bitmap, parsed.frames);
      if (frameTags.length) log.ok(Toolkit.T('as.log.tagsFound', { n: frameTags.length, names: frameTags.map(t => t.name).join(', ') }, `检测到 ${frameTags.length} 个动画标签: ${frameTags.map(t => t.name).join(', ')}`));
      log.ok(Toolkit.T('as.log.loadedFrames', { n: frames.length }, `加载完成 ${frames.length} 帧`));
      renderFrameGrid();
      startPlayback();
      $('animToolbar').style.display = 'flex';
      $('exportZipBtn').disabled = false;
      $('exportGifBtn').disabled = false;
      $('exportGodotBtn').disabled = false;
      const sample = frames[0];
      {
        const tFrames = Toolkit.T('as.stats.frames', null, '帧');
        const tAtlas = Toolkit.T('as.stats.atlas', null, '图集');
        const tMaxCell = Toolkit.T('as.stats.maxCell', null, '最大单帧');
        $('stats').innerHTML = `<strong>${frames.length}</strong> ${tFrames} · ${tAtlas} <strong>${bitmap.width}×${bitmap.height}</strong> · ${tMaxCell} <strong>${Math.max(...frames.map(f=>f.sw))}×${Math.max(...frames.map(f=>f.sh))}</strong>`;
      }
    } catch (e) {
      log.err(e.message);
      console.error(e);
    }
  }

  function parseFrames(data) {
    // Aseprite (and any TexturePacker exporter) put animation tags in
    // meta.frameTags: [{name, from, to, direction}] — from/to index into the
    // frame order below. We thread these through to the Godot exporter.
    const tags = (data.meta && Array.isArray(data.meta.frameTags)) ? data.meta.frameTags : [];
    // TexturePacker / Aseprite Hash: { frames: { "name.png": {frame:{x,y,w,h}, duration, spriteSourceSize, sourceSize} }, meta }
    if (data.frames && !Array.isArray(data.frames) && typeof data.frames === 'object') {
      const arr = Object.entries(data.frames).map(([name, v]) => ({
        name: name.replace(/\.png$/i, ''),
        sx: v.frame.x, sy: v.frame.y, sw: v.frame.w, sh: v.frame.h,
        offsetX: v.spriteSourceSize?.x || 0,
        offsetY: v.spriteSourceSize?.y || 0,
        sourceW: v.sourceSize?.w || v.frame.w,
        sourceH: v.sourceSize?.h || v.frame.h,
        duration: v.duration || 0
      }));
      return { format: 'TexturePacker/Aseprite Hash', frames: arr, frameTags: tags };
    }
    // TexturePacker / Aseprite Array: { frames: [ {filename, frame, duration, ...} ], meta }
    if (Array.isArray(data.frames) && data.frames[0] && data.frames[0].frame) {
      const arr = data.frames.map(v => ({
        name: (v.filename || v.name || '').replace(/\.png$/i, ''),
        sx: v.frame.x, sy: v.frame.y, sw: v.frame.w, sh: v.frame.h,
        offsetX: v.spriteSourceSize?.x || 0,
        offsetY: v.spriteSourceSize?.y || 0,
        sourceW: v.sourceSize?.w || v.frame.w,
        sourceH: v.sourceSize?.h || v.frame.h,
        duration: v.duration || 0
      }));
      return { format: 'TexturePacker/Aseprite Array', frames: arr, frameTags: tags };
    }
    // simple: { frames: [ {name, x, y, w, h, sourceW, sourceH, offsetX, offsetY} ] }
    if (Array.isArray(data.frames) && data.frames[0] && data.frames[0].w !== undefined) {
      const arr = data.frames.map(v => ({
        name: v.name || '',
        sx: v.x, sy: v.y, sw: v.w, sh: v.h,
        offsetX: v.offsetX || 0, offsetY: v.offsetY || 0,
        sourceW: v.sourceW || v.w, sourceH: v.sourceH || v.h,
        duration: v.duration || 0
      }));
      return { format: 'Simple Array', frames: arr, frameTags: tags };
    }
    throw new Error(Toolkit.T('as.err.unknownJson', null, 'JSON 格式无法识别'));
  }

  function buildFrames(bitmap, frameDefs) {
    frames = frameDefs.map((f, i) => {
      const cv = newCanvas(f.sw, f.sh);
      cv.getContext('2d').drawImage(bitmap, f.sx, f.sy, f.sw, f.sh, 0, 0, f.sw, f.sh);
      return {
        ...f,
        name: f.name || `frame_${String(i).padStart(4, '0')}`,
        canvas: cv
      };
    });
  }

  function renderFrameGrid() {
    const grid = $('frameGrid');
    grid.innerHTML = '';
    frames.forEach((f, i) => {
      const tile = document.createElement('div');
      tile.className = 'frame-tile';
      tile.appendChild(f.canvas.cloneNode());
      f.canvas.getContext('2d'); // ensure context (clone doesn't copy bitmap)
      const cv = tile.querySelector('canvas');
      cv.width = f.canvas.width; cv.height = f.canvas.height;
      cv.getContext('2d').drawImage(f.canvas, 0, 0);
      const idx = document.createElement('div');
      idx.className = 'idx';
      idx.textContent = i;
      tile.appendChild(idx);
      tile.addEventListener('click', () => selectFrame(i));
      grid.appendChild(tile);
    });
  }

  function selectFrame(i) {
    selectedIdx = i;
    [...$('frameGrid').children].forEach((el, j) => el.classList.toggle('selected', i === j));
    $('exportSelectedBtn').disabled = i < 0;
    if (!playing) { currentFrame = i; drawCurrentFrame(); }
  }

  // ===== playback =====
  function startPlayback() {
    cancelAnimationFrame(rafId);
    currentFrame = 0;
    playing = true;
    $('playBtn').textContent = Toolkit.T('as.btn.pause', null, '⏸ 暂停');
    $('frameSlider').max = String(frames.length - 1);
    lastTime = performance.now();
    setupAnimCanvas();
    drawCurrentFrame();
    tick();
  }

  function setupAnimCanvas() {
    const maxW = Math.max(...frames.map(f => f.sourceW));
    const maxH = Math.max(...frames.map(f => f.sourceH));
    const zoom = $('zoom').checked ? 2 : 1;
    const area = $('animPreview');
    area.innerHTML = '';
    const cv = newCanvas(maxW, maxH);
    cv.style.width = (maxW * zoom) + 'px';
    cv.style.height = (maxH * zoom) + 'px';
    area.appendChild(cv);
    area._canvas = cv;
    area._ctx = cv.getContext('2d');
  }

  function drawCurrentFrame() {
    const area = $('animPreview');
    if (!area._canvas) return;
    const f = frames[currentFrame];
    const ctx = area._ctx;
    ctx.clearRect(0, 0, area._canvas.width, area._canvas.height);
    // honor offsets so the frame appears in its original source position
    ctx.drawImage(f.canvas, f.offsetX, f.offsetY);
    $('frameSlider').value = String(currentFrame);
    $('frameLabel').textContent = `${currentFrame + 1} / ${frames.length}`;
  }

  function tick() {
    rafId = requestAnimationFrame(tick);
    if (!playing) return;
    const now = performance.now();
    const fps = parseInt($('fps').value, 10) || 12;
    const interval = 1000 / fps;
    if (now - lastTime >= interval) {
      lastTime = now;
      currentFrame++;
      if (currentFrame >= frames.length) {
        if ($('loop').checked) currentFrame = 0;
        else { currentFrame = frames.length - 1; playing = false; $('playBtn').textContent = Toolkit.T('as.btn.play', null, '▶ 播放'); }
      }
      drawCurrentFrame();
    }
  }

  $('playBtn').addEventListener('click', () => {
    if (!frames.length) return;
    playing = !playing;
    $('playBtn').textContent = playing ? Toolkit.T('as.btn.pause', null, '⏸ 暂停') : Toolkit.T('as.btn.play', null, '▶ 播放');
    if (playing) lastTime = performance.now();
  });
  $('frameSlider').addEventListener('input', (e) => {
    playing = false;
    $('playBtn').textContent = Toolkit.T('as.btn.play', null, '▶ 播放');
    currentFrame = parseInt(e.target.value, 10);
    drawCurrentFrame();
  });
  $('zoom').addEventListener('change', () => { if (frames.length) { setupAnimCanvas(); drawCurrentFrame(); } });

  // ===== Godot SpriteFrames export =====
  // Reuses the ORIGINAL sheet (no repack) + Aseprite frameTags as animations.
  function animNameOf(n) { const m = n.match(/^(.*?)[\s._-]*\d+$/); return (m && m[1]) ? m[1] : n; }
  const natCompare = (a, b) => a.localeCompare(b, undefined, { numeric: true, sensitivity: 'base' });

  // Expand a frame-index range per Aseprite tag direction into a playback order.
  function expandTagRange(lo, hi, dir) {
    const fwd = []; for (let i = lo; i <= hi; i++) fwd.push(i);
    switch (String(dir || 'forward').toLowerCase()) {
      case 'reverse': return fwd.slice().reverse();
      case 'pingpong': { const r = fwd.slice(); for (let i = hi - 1; i > lo; i--) r.push(i); return r; }
      case 'pingpong_reverse': { const r = fwd.slice().reverse(); for (let i = lo + 1; i < hi; i++) r.push(i); return r; }
      default: return fwd;
    }
  }

  function buildGodotSpriteFrames(sheetName, baseFps) {
    const sheetId = 'sheet_tex';
    let ext = `[ext_resource type="Texture2D" path="res://${sheetName}" id="${sheetId}"]\n`;
    let sub = '';
    frames.forEach((f, i) => {
      sub += `[sub_resource type="AtlasTexture" id="AtlasTexture_${i}"]\n`;
      sub += `atlas = ExtResource("${sheetId}")\n`;
      sub += `region = Rect2(${f.sx}, ${f.sy}, ${f.sw}, ${f.sh})\n`;
      sub += `margin = Rect2(${f.offsetX}, ${f.offsetY}, ${f.sourceW - f.sw}, ${f.sourceH - f.sh})\n\n`;
    });

    // animations: from frameTags when present, else group by filename prefix
    let anims;
    if (frameTags.length) {
      anims = frameTags.map(t => {
        const a = Math.max(0, Math.min(frames.length - 1, t.from | 0));
        const b = Math.max(0, Math.min(frames.length - 1, t.to | 0));
        const lo = Math.min(a, b), hi = Math.max(a, b);
        return { name: (t.name || 'tag').replace(/"/g, ''), indices: expandTagRange(lo, hi, t.direction) };
      });
    } else {
      const groups = {};
      frames.forEach((f, i) => { const k = animNameOf(f.name); (groups[k] = groups[k] || []).push(i); });
      for (const k in groups) groups[k].sort((x, y) => natCompare(frames[x].name, frames[y].name));
      anims = Object.entries(groups).map(([name, indices]) => ({ name, indices }));
    }

    const animEntries = anims.map(a => {
      // honor Aseprite per-frame ms durations when available; else use base FPS
      const durs = a.indices.map(i => frames[i].duration || 0);
      const positive = durs.filter(d => d > 0);
      let speed, durOf;
      if (positive.length) {
        const baseMs = Math.min(...positive);
        speed = 1000 / baseMs;
        durOf = i => (frames[i].duration || baseMs) / baseMs;
      } else {
        speed = baseFps;
        durOf = () => 1.0;
      }
      const fr = a.indices.map(i => `{\n"duration": ${durOf(i).toFixed(3)},\n"texture": SubResource("AtlasTexture_${i}")\n}`).join(', ');
      return `{\n"frames": [${fr}],\n"loop": true,\n"name": &"${a.name}",\n"speed": ${speed.toFixed(3)}\n}`;
    });

    const loadSteps = 1 + frames.length + 1;
    let out = `[gd_resource type="SpriteFrames" load_steps=${loadSteps} format=3]\n\n`;
    out += ext + '\n' + sub;
    out += `[resource]\nanimations = [${animEntries.join(', ')}]\n`;
    return out;
  }

  $('exportGodotBtn').addEventListener('click', async () => {
    if (!frames.length || !sheetBitmap) return;
    const prefix = ($('filePrefix').value || 'sprite').replace(/[^\w-]/g, '_');
    const baseFps = parseInt($('fps').value, 10) || 12;
    try {
      // re-encode the full sheet to PNG so the .tres region coords always match
      const cv = newCanvas(sheetBitmap.width, sheetBitmap.height);
      cv.getContext('2d').drawImage(sheetBitmap, 0, 0);
      const blob = await canvasToBlob(cv, 'image/png');
      const sheetName = `${prefix}.png`;
      const tres = buildGodotSpriteFrames(sheetName, baseFps);
      const files = [
        { name: sheetName, data: new Uint8Array(await blob.arrayBuffer()) },
        { name: `${prefix}_frames.tres`, data: new TextEncoder().encode(tres) }
      ];
      const zip = makeZip(files);
      download(zip, `${prefix}-godot.zip`);
      handoff?.setBlob(zip, `${prefix}-godot.zip`, 'application/zip');
      const animCount = frameTags.length || new Set(frames.map(f => animNameOf(f.name))).size;
      log.ok(Toolkit.T('as.log.godotExported', { name: `${prefix}-godot.zip`, anims: animCount, frames: frames.length }, `已导出 ${prefix}-godot.zip · SpriteFrames 含 ${animCount} 个动画 / ${frames.length} 帧`));
    } catch (e) { log.err(e.message); console.error(e); }
  });

  // ===== export =====
  $('exportZipBtn').addEventListener('click', async () => {
    if (!frames.length) return;
    const prefix = ($('filePrefix').value || 'frame').replace(/[^\w-]/g, '_');
    log.dim(Toolkit.T('as.log.packingZip', null, '打包 ZIP...'));
    const files = [];
    for (let i = 0; i < frames.length; i++) {
      const f = frames[i];
      // restore to original source size (with transparent padding) so frames are reusable
      const cv = newCanvas(f.sourceW, f.sourceH);
      cv.getContext('2d').drawImage(f.canvas, f.offsetX, f.offsetY);
      const blob = await canvasToBlob(cv, 'image/png');
      const data = new Uint8Array(await blob.arrayBuffer());
      const fname = (f.name || `${prefix}_${String(i).padStart(4, '0')}`) + '.png';
      files.push({ name: fname, data });
    }
    const zip = makeZip(files);
    download(zip, `${prefix}_frames.zip`);
    handoff?.setBlob(zip, `${prefix}_frames.zip`, 'application/zip');
    log.ok(Toolkit.T('as.log.zipExported', { n: files.length, size: Toolkit.fmtBytes(zip.size) }, `已导出 ${files.length} 帧到 ZIP (${Toolkit.fmtBytes(zip.size)})`));
  });

  $('exportGifBtn').addEventListener('click', () => {
    const panel = $('gifPanel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  });

  $('animBuildBtn').addEventListener('click', async () => {
    if (!frames.length) return;
    const fmt = $('animFormat').value;
    const fps = parseInt($('animFps').value, 10) || 12;
    const loop = parseInt($('animLoop').value, 10) || 0;
    $('animBuildBtn').disabled = true;
    log.dim(Toolkit.T('as.log.buildingAnim', { fmt: fmt.toUpperCase() }, `生成 ${fmt.toUpperCase()}...`));
    try {
      // build frames at source size with offsets honored (so animation looks correct)
      const animFrames = frames.map(f => {
        const cv = newCanvas(f.sourceW, f.sourceH);
        cv.getContext('2d').drawImage(f.canvas, f.offsetX, f.offsetY);
        return { bitmap: cv, w: f.sourceW, h: f.sourceH };
      });
      const opts = { fps, loop, onStatus: m => log.dim('  ' + m) };
      const blob = fmt === 'gif'
        ? await AnimEncoders.buildGif(animFrames, { ...opts, paletteMode: 'median' })
        : await AnimEncoders.buildApng(animFrames, opts);
      const prefix = ($('filePrefix').value || 'animation').replace(/[^\w-]/g, '_');
      const ext = fmt === 'gif' ? 'gif' : 'png';
      download(blob, `${prefix}.${ext}`);
      handoff?.setBlob(blob, `${prefix}.${ext}`, fmt === 'gif' ? 'image/gif' : 'image/png');
      log.ok(Toolkit.T('as.log.animExported', { name: `${prefix}.${ext}`, size: Toolkit.fmtBytes(blob.size) }, `已导出 ${prefix}.${ext} (${Toolkit.fmtBytes(blob.size)})`));
    } catch (e) {
      log.err(e.message);
      console.error(e);
    } finally {
      $('animBuildBtn').disabled = false;
    }
  });

  $('exportSelectedBtn').addEventListener('click', async () => {
    if (selectedIdx < 0) return;
    const f = frames[selectedIdx];
    const cv = newCanvas(f.sourceW, f.sourceH);
    cv.getContext('2d').drawImage(f.canvas, f.offsetX, f.offsetY);
    const blob = await canvasToBlob(cv, 'image/png');
    download(blob, (f.name || 'frame') + '.png');
    log.ok(Toolkit.T('as.log.frameExported', { name: f.name }, `已导出 ${f.name}.png`));
  });

  $('clearBtn').addEventListener('click', () => {
    frames = []; selectedIdx = -1; playing = false;
    cancelAnimationFrame(rafId);
    $('frameGrid').innerHTML = '';
    $('animPreview').innerHTML = `<div class="preview-empty">${Toolkit.T('as.preview.empty', null, '拖入 PNG + JSON 后开始播放动画')}</div>`;
    $('animToolbar').style.display = 'none';
    $('stats').textContent = Toolkit.T('common.idle', null, 'Dobby 待命');
    $('exportZipBtn').disabled = true;
    $('exportGifBtn').disabled = true;
    $('exportGodotBtn').disabled = true;
    $('exportSelectedBtn').disabled = true;
    $('gifPanel').style.display = 'none';
    $('gridPanel').style.display = 'none';
    pendingBitmap = null;
    sheetBitmap = null;
    frameTags = [];
    log.clear();
    $('fileInput').value = '';
  });

})();
</script>
</body>
</html>
