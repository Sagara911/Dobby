<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<!-- KILLSWITCH v1 -->
<script>
/* one-shot legacy cleanup — drops old SW, caches, and localStorage left behind
   by removed settings UI; reloads once so the fresh code takes over. */
(function () {
  var KEY = 'toolkit-cleaned-v1';
  if (localStorage.getItem(KEY)) return;
  localStorage.setItem(KEY, '1');
  (async function () {
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) { try { await r.unregister(); } catch (_) {} }
      }
      if ('caches' in window) {
        var ks = await caches.keys();
        for (var k of ks) { try { await caches.delete(k); } catch (_) {} }
      }
      try { localStorage.removeItem('toolkit-cursor'); } catch (_) {}
      try { localStorage.removeItem('toolkit-theme'); } catch (_) {}
      var stale = document.getElementById('__toolkit_cursor_style__');
      if (stale) stale.remove();
      document.documentElement.removeAttribute('data-theme');
      location.reload();
    } catch (e) { console.warn('[cleanup]', e); }
  })();
})();
</script>
<title>代码压缩 · Dobby</title>
<link rel="stylesheet" href="../assets/shared.css" />
<style>
  .tab-row {
    display: flex;
    gap: 4px;
    background: rgba(0, 0, 0, 0.3);
    padding: 4px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .tab-row button {
    flex: 1;
    background: transparent;
    color: var(--text-soft);
    padding: 6px 0;
    font-size: 12px;
    border-radius: calc(var(--radius-sm) - 3px);
    box-shadow: none;
  }
  .tab-row button.active {
    background: var(--jade);
    color: #0a1a14;
  }
  .tab-row button:hover { transform: none; }
  .editor-grid {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    min-height: 360px;
  }
  .editor-col {
    display: flex; flex-direction: column; gap: 6px;
  }
  .editor-col .label {
    color: var(--muted); font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.05em;
    display: flex; justify-content: space-between;
  }
  .editor-col .label .size { font-family: ui-monospace, Consolas, monospace; }
  .editor-col textarea {
    flex: 1;
    width: 100%;
    background: rgba(0, 0, 0, 0.5);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-family: ui-monospace, Consolas, monospace;
    font-size: 11px;
    line-height: 1.5;
    resize: none;
  }
  .editor-col textarea:focus {
    border-color: var(--jade);
    outline: none;
    box-shadow: 0 0 0 3px rgba(var(--jade-rgb), 0.15);
  }
  .compat-note {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--warning);
    padding: 8px 12px;
    font-size: 11px;
    color: var(--muted-2);
    border-radius: var(--radius-sm);
    margin-bottom: 12px;
  }
  .info { font-size: 11px; color: var(--muted); margin-top: 4px; line-height: 1.5; }
</style>
</head>
<body>

<div class="tool-layout">
  <div class="sidebar">
    <h1>🗜️ 代码压缩</h1>

    <div class="tab-row" id="langTabs">
      <button data-lang="css" class="active" type="button">CSS</button>
      <button data-lang="js" type="button">JS</button>
      <button data-lang="html" type="button">HTML</button>
    </div>

    <div id="cssOpts">
      <h2 data-i18n="cm.cssOpts">CSS 选项</h2>
      <label class="checkbox"><input type="checkbox" id="cssRemoveComments" checked /><span>删除注释</span></label>
      <label class="checkbox"><input type="checkbox" id="cssCollapseSpace" checked /><span>压缩空白</span></label>
      <label class="checkbox"><input type="checkbox" id="cssShortenHex" checked /><span>短颜色 (#ffffff → #fff)</span></label>
    </div>
    <div id="jsOpts" style="display:none">
      <div class="compat-note">JS 压缩用 terser,首次联网 ~250KB</div>
      <h2 data-i18n="cm.jsOpts">JS 选项</h2>
      <label class="checkbox"><input type="checkbox" id="jsMangle" checked /><span>变量名混淆 (mangle)</span></label>
      <label class="checkbox"><input type="checkbox" id="jsCompress" checked /><span>逻辑压缩 (dead code 等)</span></label>
    </div>
    <div id="htmlOpts" style="display:none">
      <h2 data-i18n="cm.htmlOpts">HTML 选项</h2>
      <label class="checkbox"><input type="checkbox" id="htmlRemoveComments" checked /><span>删除注释</span></label>
      <label class="checkbox"><input type="checkbox" id="htmlCollapseSpace" checked /><span>折叠空白</span></label>
      <label class="checkbox"><input type="checkbox" id="htmlMinifyInline" checked /><span>顺便压缩内联 &lt;style&gt; / &lt;script&gt;</span></label>
    </div>

    <h2 data-i18n="cm.fileOps">文件操作</h2>
    <input type="file" id="fileInput" accept=".css,.js,.html,.htm,text/*" style="display:none" />
    <button id="loadFileBtn" class="secondary">加载文件</button>
    <button id="minifyBtn">压缩</button>
    <button id="copyBtn" class="secondary" disabled>复制结果</button>
    <button id="downloadBtn" class="secondary" disabled>下载</button>
    <button id="clearBtn" class="secondary">清空</button>

    <div class="log" id="log"></div>
  </div>

  <div class="main">
    <div class="stats" id="stats">未输入</div>
    <div class="editor-grid">
      <div class="editor-col">
        <div class="label"><span>输入</span><span class="size" id="inputSize">0 B</span></div>
        <textarea id="inputEditor" placeholder="粘贴 CSS / JS / HTML 代码"></textarea>
      </div>
      <div class="editor-col">
        <div class="label"><span>输出</span><span class="size" id="outputSize">0 B</span></div>
        <textarea id="outputEditor" readonly placeholder="压缩后的代码会显示在这里"></textarea>
      </div>
    </div>
  </div>
</div>

<script src="../assets/shared.js"></script>
<script>
Toolkit.injectTopbar('code-minify');

(() => {
  const { $, makeLogger, download, downloadText, fmtBytes } = Toolkit;
  const log = makeLogger($('log'));

  let lang = 'css';
  const handoff = Toolkit.setupHandoff('code-minify', { outputType: 'text/css' });

  // ---------- worker: do all minify off-thread so large files don't freeze the page ----------
  const worker = new Worker('../assets/code-minify.worker.js', { type: 'module' });
  const pending = new Map();
  let nextId = 0;
  worker.addEventListener('message', (e) => {
    const { id, type, code, error, msg } = e.data;
    if (type === 'progress') { log.dim('  ' + msg); return; }
    if (type === 'warn') { log.warn('  ' + msg); return; }
    const cb = pending.get(id);
    if (!cb) return;
    pending.delete(id);
    if (type === 'done') cb.resolve(code);
    else if (type === 'error') cb.reject(new Error(error));
  });
  function minifyInWorker(lang, src, options) {
    return new Promise((resolve, reject) => {
      const id = ++nextId;
      pending.set(id, { resolve, reject });
      worker.postMessage({ id, lang, src, options });
    });
  }

  document.querySelectorAll('#langTabs button').forEach(b => {
    b.addEventListener('click', () => {
      lang = b.dataset.lang;
      document.querySelectorAll('#langTabs button').forEach(x => x.classList.toggle('active', x === b));
      $('cssOpts').style.display = lang === 'css' ? '' : 'none';
      $('jsOpts').style.display = lang === 'js' ? '' : 'none';
      $('htmlOpts').style.display = lang === 'html' ? '' : 'none';
    });
  });

  $('inputEditor').addEventListener('input', () => updateInputSize());
  function updateInputSize() {
    const s = $('inputEditor').value;
    $('inputSize').textContent = fmtBytes(new Blob([s]).size);
  }
  updateInputSize();

  $('loadFileBtn').addEventListener('click', () => $('fileInput').click());
  $('fileInput').addEventListener('change', async (e) => {
    const f = e.target.files[0];
    if (!f) return;
    const text = await f.text();
    $('inputEditor').value = text;
    // auto-detect lang from extension
    const ext = (f.name.match(/\.[^./]+$/) || [''])[0].toLowerCase();
    if (/\.css$/i.test(ext)) document.querySelector('#langTabs [data-lang="css"]').click();
    else if (/\.(js|mjs)$/i.test(ext)) document.querySelector('#langTabs [data-lang="js"]').click();
    else if (/\.html?$/i.test(ext)) document.querySelector('#langTabs [data-lang="html"]').click();
    updateInputSize();
    log.ok(`已加载 ${f.name} (${fmtBytes(f.size)})`);
  });

  $('minifyBtn').addEventListener('click', async () => {
    const src = $('inputEditor').value;
    if (!src.trim()) { log.err('Dobby 还没拿到代码 — 你贴一段?'); return; }
    log.dim(`压缩 ${lang.toUpperCase()}...`);
    $('minifyBtn').disabled = true;
    try {
      let options;
      if (lang === 'css') {
        options = {
          removeComments: $('cssRemoveComments').checked,
          collapseSpace:  $('cssCollapseSpace').checked,
          shortenHex:     $('cssShortenHex').checked
        };
      } else if (lang === 'js') {
        options = {
          mangle:   $('jsMangle').checked,
          compress: $('jsCompress').checked
        };
      } else {
        options = {
          removeComments: $('htmlRemoveComments').checked,
          collapseSpace:  $('htmlCollapseSpace').checked,
          minifyInline:   $('htmlMinifyInline').checked
        };
      }
      const out = await minifyInWorker(lang, src, options);
      $('outputEditor').value = out;
      const inSize = new Blob([src]).size;
      const outSize = new Blob([out]).size;
      $('outputSize').textContent = fmtBytes(outSize);
      const pct = ((inSize - outSize) / inSize * 100);
      $('stats').innerHTML = `<strong>${fmtBytes(inSize)} → ${fmtBytes(outSize)}</strong> · 压缩率 <strong>${pct.toFixed(1)}%</strong>`;
      const outMime = lang === 'css' ? 'text/css'
                    : lang === 'html' ? 'text/html'
                    : 'application/javascript';
      const outExt = lang === 'js' ? '.min.js' : lang === 'html' ? '.min.html' : '.min.css';
      handoff?.setBlob(new Blob([out], { type: outMime }), `output${outExt}`, outMime);
      $('copyBtn').disabled = false;
      $('downloadBtn').disabled = false;
      log.ok(`压缩完成: -${pct.toFixed(1)}%`);
    } catch (e) {
      log.err(e.message);
      console.error(e);
    } finally {
      $('minifyBtn').disabled = false;
    }
  });

  // All actual minify logic lives in assets/code-minify.worker.js so large
  // files don't freeze the main thread. See minifyInWorker() above.

  $('copyBtn').addEventListener('click', async () => {
    const v = $('outputEditor').value;
    if (!v) return;
    try {
      await navigator.clipboard.writeText(v);
      log.ok('已复制到剪贴板');
    } catch (e) {
      $('outputEditor').select();
      document.execCommand('copy');
      log.ok('已复制(兼容模式)');
    }
  });

  $('downloadBtn').addEventListener('click', () => {
    const v = $('outputEditor').value;
    if (!v) return;
    const ext = lang === 'js' ? '.min.js' : lang === 'html' ? '.min.html' : '.min.css';
    const mime = lang === 'js' ? 'application/javascript' : lang === 'html' ? 'text/html' : 'text/css';
    downloadText(v, `output${ext}`, mime);
  });

  $('clearBtn').addEventListener('click', () => {
    $('inputEditor').value = '';
    $('outputEditor').value = '';
    $('inputSize').textContent = '0 B';
    $('outputSize').textContent = '0 B';
    $('stats').textContent = '未输入';
    $('copyBtn').disabled = true;
    $('downloadBtn').disabled = true;
    log.clear();
  });
})();
</script>
</body>
</html>
