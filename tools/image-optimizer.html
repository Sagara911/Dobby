<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<!-- KILLSWITCH v1 -->
<script>
/* one-shot legacy cleanup — drops old SW, caches, and localStorage left behind
   by removed settings UI; reloads once so the fresh code takes over. */
(function () {
  var KEY = 'toolkit-cleaned-v1';
  if (localStorage.getItem(KEY)) return;
  localStorage.setItem(KEY, '1');
  (async function () {
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) { try { await r.unregister(); } catch (_) {} }
      }
      if ('caches' in window) {
        var ks = await caches.keys();
        for (var k of ks) { try { await caches.delete(k); } catch (_) {} }
      }
      try { localStorage.removeItem('toolkit-cursor'); } catch (_) {}
      try { localStorage.removeItem('toolkit-theme'); } catch (_) {}
      var stale = document.getElementById('__toolkit_cursor_style__');
      if (stale) stale.remove();
      document.documentElement.removeAttribute('data-theme');
      location.reload();
    } catch (e) { console.warn('[cleanup]', e); }
  })();
})();
</script>
<title>Image Optimizer · Dobby</title>
<link rel="stylesheet" href="../assets/shared.css" />
<style>
  .results {
    flex: 1;
    overflow-y: auto;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--panel);
  }
  .results table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .results th, .results td {
    padding: 8px 12px;
    text-align: left;
    border-bottom: 1px solid var(--border);
  }
  .results th {
    color: var(--muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
    position: sticky;
    top: 0;
    background: var(--panel-2);
  }
  .results tr:hover { background: var(--panel-2); }
  .results .thumb {
    width: 48px;
    height: 48px;
    background: var(--checker), #1a1a1a;
    background-size: 8px 8px;
    background-position: 0 0, 0 4px, 4px -4px, -4px 0;
    border-radius: 3px;
    overflow: hidden;
  }
  .results .thumb img, .results .thumb canvas {
    width: 100%; height: 100%;
    object-fit: contain;
    image-rendering: pixelated;
  }
  .results .savings.good { color: var(--success); }
  .results .savings.neutral { color: var(--muted); }
  .results .savings.bad { color: var(--warning); }
  .results .row-actions { display: flex; gap: 4px; }
  .results .row-actions button { padding: 4px 10px; font-size: 11px; }
  .results .mono { font-family: ui-monospace, Consolas, monospace; }
  .summary {
    padding: 10px 14px;
    background: var(--panel-2);
    border-top: 1px solid var(--border);
    font-size: 12px;
    color: var(--muted-2);
    display: flex;
    gap: 20px;
  }
  .summary strong { color: var(--text); }
  .range-row { display: flex; align-items: center; gap: 8px; }
  .range-row input[type=range] { flex: 1; }
  .range-row .value { font-family: ui-monospace, Consolas, monospace; font-size: 11px; color: var(--text); min-width: 30px; text-align: right; }

  /* ── before/after compare modal ──
     Side-by-side rendering rather than a slide-compare overlay. The slide
     compare was triggering a strange radial dark vignette on the user's
     Chrome / RTX 3060 even after backdrop-filter removal and source
     downscaling, almost certainly a clip-path + absolute-positioned-canvas
     interaction on their stack. Two plain side-by-side canvases dodge
     every one of the slider's rendering surfaces. */
  .cmp-modal {
    position: fixed; inset: 0; z-index: 99999;  /* above sticky topbar (z 9000) */
    background: rgba(0, 0, 0, 0.92);
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
  }
  .cmp-card {
    background: linear-gradient(180deg, #14141a 0%, #0c0c10 100%);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius);
    padding: 18px 20px 16px;
    width: 100%; max-width: 920px;
    max-height: 92vh;
    overflow: auto;
    box-shadow: 0 24px 60px rgba(0,0,0,0.7);
  }
  .cmp-head {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 14px;
  }
  .cmp-title {
    font-family: "Space Grotesk", sans-serif;
    font-size: 14px; font-weight: 600;
    color: var(--text); flex: 1;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cmp-close {
    background: transparent; border: none;
    color: var(--muted); font-size: 24px;
    cursor: pointer; padding: 0 4px;
    box-shadow: none;
  }
  .cmp-close:hover { color: var(--text); transform: none; }
  .cmp-meta {
    margin-top: 12px; padding: 8px 12px;
    background: rgba(255,255,255,0.04);
    border-radius: var(--radius-sm);
    font-family: ui-monospace, Consolas, monospace;
    font-size: 11.5px;
    color: var(--muted-2);
    text-align: center;
  }
  .cmp-meta strong { color: var(--jade); }
  /* side-by-side compare */
  .cmp-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .cmp-col {
    display: flex; flex-direction: column; gap: 6px;
    min-width: 0;  /* let grid track shrink properly */
  }
  .cmp-col .cmp-label {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 10.5px; letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--muted);
    padding: 2px 0;
  }
  .cmp-col .cmp-canvas-wrap {
    background: var(--checker), #0a0a0c;
    background-size: 20px 20px;
    background-position: 0 0, 0 10px, 10px -10px, -10px 0;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    overflow: hidden;
    aspect-ratio: 1 / 1;
    display: flex; align-items: center; justify-content: center;
  }
  .cmp-col canvas, .cmp-col img {
    max-width: 100%; max-height: 100%;
    object-fit: contain;
    display: block;
  }
</style>
</head>
<body>

<div class="tool-layout">
  <div class="sidebar">
    <h1>📦 Image Optimizer</h1>

    <div class="drop-zone" id="dropZone">
      <p data-i18n="io.drop.title">📂 拖入图片</p>
      <p class="hint">
        <span data-i18n="io.drop.hint1">多选 PNG / JPG / WebP</span><br/>
        <span data-i18n="io.drop.hint2">在浏览器内压缩、缩放、转码</span>
      </p>
      <input type="file" id="fileInput" multiple accept="image/*" style="display:none" />
    </div>

    <div class="progress" id="progress"><div class="progress-bar"></div></div>

    <h2 data-i18n="io.format.h">输出格式</h2>
    <div class="field">
      <select id="format">
        <option value="keep" data-i18n="io.format.keep">保持原格式</option>
        <option value="image/png" data-i18n="io.format.png">PNG (无损)</option>
        <option value="image/jpeg" data-i18n="io.format.jpeg">JPEG (有损, 体积小)</option>
        <option value="image/webp" data-i18n="io.format.webp">WebP (有损, 体积更小)</option>
        <option value="image/avif" data-i18n="io.format.avif">AVIF (有损, 新一代, 体积最小, 需现代浏览器)</option>
      </select>
    </div>
    <div class="field">
      <label><span data-i18n="io.quality.label">质量 (JPEG / WebP)</span> <span id="qualityVal" class="mono">85</span></label>
      <input type="range" id="quality" min="1" max="100" value="85" />
    </div>
    <div class="field">
      <label data-i18n="io.engine.label">压缩引擎</label>
      <select id="engine">
        <option value="native" selected data-i18n="io.engine.native">浏览器原生 (快, 零下载)</option>
        <option value="mozjpeg" data-i18n="io.engine.mozjpeg">mozjpeg (JPEG -10%~-25%, 首次 ~700 KB)</option>
        <option value="oxipng" data-i18n="io.engine.oxipng">oxipng (PNG 无损 -5%~-30%, 首次 ~250 KB)</option>
        <option value="webp-hq" data-i18n="io.engine.webphq">webp 高质 (method=6, 首次 ~600 KB)</option>
        <option value="avif" data-i18n="io.engine.avif">AVIF (新一代, 比 JPEG -50%~-70%, 首次 ~1.5 MB, 慢)</option>
      </select>
      <div class="info" style="margin-top:4px" data-i18n="io.engine.note">引擎仅在输出格式匹配时生效 (mozjpeg→JPEG, oxipng→PNG, webp 高质/AVIF→对应格式)</div>
    </div>

    <h2 data-i18n="io.resize.h">缩放</h2>
    <div class="field">
      <select id="resizeMode">
        <option value="none" data-i18n="io.resize.none">不缩放</option>
        <option value="maxDim" data-i18n="io.resize.maxDim">限制最大边</option>
        <option value="scale" data-i18n="io.resize.scale">按比例缩放</option>
      </select>
    </div>
    <div class="field" id="maxDimField" style="display:none">
      <label data-i18n="io.resize.maxDimLabel">最大宽 / 高 (px)</label>
      <input type="number" id="maxDim" value="1024" min="1" />
    </div>
    <div class="field" id="scaleField" style="display:none">
      <label><span data-i18n="io.resize.scaleLabel">缩放比例</span> <span id="scaleVal" class="mono">50%</span></label>
      <input type="range" id="scale" min="10" max="200" value="50" />
    </div>

    <h2 data-i18n="io.color.h">颜色</h2>
    <div class="field">
      <label data-i18n="io.color.bitDepth">位深 (每通道)</label>
      <select id="bitDepth">
        <option value="8" data-i18n="io.color.8">8 bit (原始, 1670 万色)</option>
        <option value="6" data-i18n="io.color.6">6 bit (~26 万色)</option>
        <option value="5" data-i18n="io.color.5">5 bit (~3.3 万色)</option>
        <option value="4" data-i18n="io.color.4">4 bit (4096 色)</option>
        <option value="3" data-i18n="io.color.3">3 bit (512 色)</option>
      </select>
    </div>

    <button id="processBtn" disabled data-i18n="io.btn.process">开始处理</button>
    <button id="exportZipBtn" class="secondary" disabled data-i18n="io.btn.zip">下载全部 (ZIP)</button>
    <button id="clearBtn" class="secondary" data-i18n="io.btn.clear">清空</button>

    <div class="log" id="log"></div>
  </div>

  <div class="main">
    <div class="stats" id="stats" data-i18n="io.stats.ready">Dobby 待命</div>
    <div class="results" id="results">
      <table>
        <thead>
          <tr>
            <th></th>
            <th data-i18n="io.tbl.filename">文件名</th>
            <th data-i18n="io.tbl.srcSize">原尺寸</th>
            <th data-i18n="io.tbl.outSize">输出尺寸</th>
            <th data-i18n="io.tbl.srcBytes">原体积</th>
            <th data-i18n="io.tbl.outBytes">输出体积</th>
            <th data-i18n="io.tbl.compress">压缩</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="resultsBody">
          <tr><td colspan="8" style="text-align:center; color:var(--muted); padding:40px" data-i18n="io.tbl.empty">你丢图进来,Dobby 处理结果对比写在这里</td></tr>
        </tbody>
      </table>
    </div>
    <div class="summary" id="summary" style="display:none">
      <span><span data-i18n="io.sum.count">共</span> <strong id="sumCount">0</strong> <span data-i18n="io.sum.images">张</span></span>
      <span><span data-i18n="io.sum.srcBytes">原体积</span> <strong id="sumOriginal">0</strong></span>
      <span><span data-i18n="io.sum.outBytes">输出体积</span> <strong id="sumOptimized">0</strong></span>
      <span><span data-i18n="io.sum.savings">节省</span> <strong id="sumSavings">0</strong></span>
    </div>
  </div>
</div>

<!-- ── before/after compare modal ── -->
<div id="cmpModal" class="cmp-modal" style="display:none" role="dialog" aria-modal="true">
  <div class="cmp-card" role="document">
    <div class="cmp-head">
      <span class="cmp-title" id="cmpTitle"></span>
      <button type="button" class="cmp-close" id="cmpClose" aria-label="关闭">×</button>
    </div>
    <div class="cmp-body" id="cmpBody"></div>
    <div class="cmp-meta" id="cmpMeta"></div>
  </div>
</div>

<script src="../assets/shared.js"></script>
<script src="../assets/codecs.js"></script>
<script>
Toolkit.injectTopbar('image-optimizer');

(() => {
  const { $, makeLogger, makeProgress, attachDropZone, naturalSort, download, newCanvas, canvasToBlob, makeZip, fmtBytes } = Toolkit;
  const log = makeLogger($('log'));
  const progress = makeProgress($('progress'));

  let items = []; // {file, bitmap, optimizedBlob, optimizedW, optimizedH}

  attachDropZone($('dropZone'), $('fileInput'), handleFiles);
  const handoff = Toolkit.setupHandoff('image-optimizer', { outputType: 'image/png' });

  // ===== UI bindings =====
  $('quality').addEventListener('input', e => $('qualityVal').textContent = e.target.value);
  $('scale').addEventListener('input', e => $('scaleVal').textContent = e.target.value + '%');
  $('resizeMode').addEventListener('change', e => {
    $('maxDimField').style.display = e.target.value === 'maxDim' ? '' : 'none';
    $('scaleField').style.display = e.target.value === 'scale' ? '' : 'none';
  });

  async function handleFiles(files) {
    if (!files.length) return;
    log.clear();
    files = naturalSort(files.filter(f => f.type.startsWith('image/')));
    log.dim(`加载 ${files.length} 张图片...`);
    items = [];
    for (let i = 0; i < files.length; i++) {
      const f = files[i];
      try {
        const bitmap = await createImageBitmap(f);
        items.push({ file: f, bitmap, optimizedBlob: null, optimizedW: bitmap.width, optimizedH: bitmap.height });
      } catch (e) {
        log.err(`${f.name}: ${e.message}`);
      }
      progress.set((i + 1) / files.length);
    }
    progress.hide();
    log.ok(`加载完成 ${items.length} 张`);
    renderTable();
    $('processBtn').disabled = items.length === 0;
    $('exportZipBtn').disabled = true;
    $('stats').innerHTML = `已加载 <strong>${items.length}</strong> 张待处理`;
  }

  function renderTable() {
    const tbody = $('resultsBody');
    tbody.innerHTML = '';
    items.forEach((it, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><div class="thumb"></div></td>
        <td class="mono">${escapeHtml(it.file.name)}</td>
        <td class="mono">${it.bitmap.width}×${it.bitmap.height}</td>
        <td class="mono" id="outDim_${i}">—</td>
        <td class="mono">${fmtBytes(it.file.size)}</td>
        <td class="mono" id="outSize_${i}">—</td>
        <td class="mono" id="savings_${i}">—</td>
        <td class="row-actions" id="actions_${i}"></td>
      `;
      tbody.appendChild(tr);
      const thumb = tr.querySelector('.thumb');
      const cv = newCanvas(it.bitmap.width, it.bitmap.height);
      cv.getContext('2d').drawImage(it.bitmap, 0, 0);
      thumb.appendChild(cv);
    });
    $('summary').style.display = items.length ? 'flex' : 'none';
    updateSummary();
  }

  function updateSummary() {
    const orig = items.reduce((s, x) => s + x.file.size, 0);
    const opt = items.reduce((s, x) => s + (x.optimizedBlob?.size || 0), 0);
    const hasOpt = items.some(x => x.optimizedBlob);
    $('sumCount').textContent = items.length;
    $('sumOriginal').textContent = fmtBytes(orig);
    $('sumOptimized').textContent = hasOpt ? fmtBytes(opt) : '—';
    if (hasOpt && orig > 0) {
      const pct = ((orig - opt) / orig * 100);
      $('sumSavings').textContent = `${pct.toFixed(1)}% (${fmtBytes(orig - opt)})`;
    } else {
      $('sumSavings').textContent = '—';
    }
  }

  $('processBtn').addEventListener('click', async () => {
    if (!items.length) return;
    const fmt = $('format').value;
    const quality = parseInt($('quality').value, 10) / 100;
    const resizeMode = $('resizeMode').value;
    const maxDim = parseInt($('maxDim').value, 10) || 1024;
    const scaleFactor = parseInt($('scale').value, 10) / 100;
    const bitDepth = parseInt($('bitDepth').value, 10);
    const engine = $('engine').value;

    log.dim('🧦 Dobby 干活中...');
    $('processBtn').disabled = true;
    for (let i = 0; i < items.length; i++) {
      const it = items[i];
      try {
        const result = await processOne(it, { fmt, quality, resizeMode, maxDim, scaleFactor, bitDepth, engine });
        it.optimizedBlob = result.blob;
        it.optimizedW = result.w;
        it.optimizedH = result.h;
        it.optimizedName = result.name;
        renderRowResult(i);
      } catch (e) {
        log.err(`${it.file.name}: ${e.message}`);
      }
      progress.set((i + 1) / items.length);
    }
    progress.hide();
    $('processBtn').disabled = false;
    $('exportZipBtn').disabled = false;
    updateSummary();
    log.ok(`处理完成 ${items.length} 张`);
  });

  async function processOne(it, opts) {
    let { fmt, quality, resizeMode, maxDim, scaleFactor, bitDepth, engine } = opts;
    let { width: w, height: h } = it.bitmap;

    if (resizeMode === 'maxDim') {
      const ratio = Math.min(1, maxDim / Math.max(w, h));
      w = Math.round(w * ratio); h = Math.round(h * ratio);
    } else if (resizeMode === 'scale') {
      w = Math.round(w * scaleFactor); h = Math.round(h * scaleFactor);
    }
    w = Math.max(1, w); h = Math.max(1, h);

    const cv = newCanvas(w, h);
    const ctx = cv.getContext('2d');
    ctx.imageSmoothingQuality = 'high';
    ctx.drawImage(it.bitmap, 0, 0, w, h);

    if (bitDepth < 8) {
      quantizeColors(ctx, w, h, bitDepth);
    }

    // determine output type — AVIF only routes through WASM since browsers
    // don't reliably encode AVIF via canvas.toBlob yet.
    let outType = fmt === 'keep' ? (it.file.type || 'image/png') : fmt;
    if (!['image/png', 'image/jpeg', 'image/webp', 'image/avif'].includes(outType)) outType = 'image/png';
    // PNG ignores quality; JPEG/WebP/AVIF use it
    const useQuality = (outType === 'image/jpeg' || outType === 'image/webp' || outType === 'image/avif') ? quality : undefined;
    let blob;
    // High-quality engine routing — only kicks in when the engine selector
    // matches the output format; otherwise fall through to canvas.toBlob.
    const wantMozjpeg = engine === 'mozjpeg' && outType === 'image/jpeg' && window.Codecs;
    const wantOxipng  = engine === 'oxipng'  && outType === 'image/png'  && window.Codecs;
    const wantWebpHQ  = engine === 'webp-hq' && outType === 'image/webp' && window.Codecs;
    // AVIF *must* go through WASM since canvas.toBlob('image/avif') is
    // unreliable across browsers. Always route AVIF through Codecs.
    const wantAvif    = outType === 'image/avif' && window.Codecs;
    if (wantAvif) {
      const imageData = ctx.getImageData(0, 0, w, h);
      const bytes = await Codecs.encodeAvif(imageData, { quality, speed: 6 });
      blob = new Blob([bytes], { type: 'image/avif' });
    } else if (wantMozjpeg) {
      const imageData = ctx.getImageData(0, 0, w, h);
      const bytes = await Codecs.encodeJpeg(imageData, { quality });
      blob = new Blob([bytes], { type: 'image/jpeg' });
    } else if (wantOxipng) {
      // canvas → PNG (browser) → oxipng → smaller PNG. Two-step but oxipng
      // is purely re-deflating + optimizing chunk structure, no quality loss.
      const nativePng = await canvasToBlob(cv, 'image/png');
      if (!nativePng) throw new Error('canvas.toBlob 返回空');
      const inputBytes = new Uint8Array(await nativePng.arrayBuffer());
      const optimised = await Codecs.optimizePng(inputBytes, { level: 4 });
      blob = new Blob([optimised], { type: 'image/png' });
    } else if (wantWebpHQ) {
      const imageData = ctx.getImageData(0, 0, w, h);
      const bytes = await Codecs.encodeWebp(imageData, { quality });
      blob = new Blob([bytes], { type: 'image/webp' });
    } else {
      blob = await canvasToBlob(cv, outType, useQuality);
    }
    if (!blob || blob.size < 64) throw new Error(`${outType} 编码失败 (浏览器返回空 blob)`);
    // Round-trip decode check — skip for AVIF since older browsers can encode
    // (via our WASM) but not decode it. The Codecs.encodeAvif path already
    // validates magic bytes inside, so we trust it for AVIF.
    if (outType !== 'image/avif') {
      try {
        const bmp = await createImageBitmap(blob);
        const ok = bmp.width === w && bmp.height === h;
        bmp.close?.();
        if (!ok) throw new Error('解码后尺寸与目标不符');
      } catch (e) {
        throw new Error(`输出校验失败: ${e.message}`);
      }
    }

    const ext = outType === 'image/jpeg' ? '.jpg'
              : outType === 'image/webp' ? '.webp'
              : outType === 'image/avif' ? '.avif'
              : '.png';
    const baseName = it.file.name.replace(/\.[^.]+$/, '');
    return { blob, w, h, name: baseName + ext };
  }

  function quantizeColors(ctx, w, h, bits) {
    const img = ctx.getImageData(0, 0, w, h);
    const d = img.data;
    const mask = (0xFF << (8 - bits)) & 0xFF;
    const round = 1 << (8 - bits);
    const half = round >> 1;
    for (let i = 0; i < d.length; i += 4) {
      // snap to nearest representable value, with rounding so colors don't darken
      d[i]   = Math.min(255, ((d[i]   + half) & mask) | (mask >> bits));
      d[i+1] = Math.min(255, ((d[i+1] + half) & mask) | (mask >> bits));
      d[i+2] = Math.min(255, ((d[i+2] + half) & mask) | (mask >> bits));
    }
    ctx.putImageData(img, 0, 0);
  }

  function renderRowResult(i) {
    const it = items[i];
    $('outDim_' + i).textContent = `${it.optimizedW}×${it.optimizedH}`;
    $('outSize_' + i).textContent = fmtBytes(it.optimizedBlob.size);
    const orig = it.file.size, opt = it.optimizedBlob.size;
    const pct = ((orig - opt) / orig * 100);
    const cls = pct >= 20 ? 'good' : pct >= 0 ? 'neutral' : 'bad';
    $('savings_' + i).innerHTML = `<span class="savings ${cls}">${pct >= 0 ? '-' : '+'}${Math.abs(pct).toFixed(1)}%</span>`;
    const actions = $('actions_' + i);
    actions.innerHTML = '';
    // 👁️ compare — opens a before/after slide-compare modal so the user can
    // visually inspect whether the compression introduced artifacts. Pure
    // download-only used to leave this guess-and-check.
    const cmpBtn = document.createElement('button');
    cmpBtn.className = 'secondary';
    cmpBtn.dataset.i18n = 'imageOpt.compare';
    cmpBtn.textContent = (window.Toolkit && Toolkit.T) ? Toolkit.T('imageOpt.compare', '👁️ 对比') : '👁️ 对比';
    cmpBtn.addEventListener('click', () => openCompareModal(i));
    actions.appendChild(cmpBtn);
    const btn = document.createElement('button');
    btn.dataset.i18n = 'imageOpt.download';
    btn.textContent = (window.Toolkit && Toolkit.T) ? Toolkit.T('imageOpt.download', '下载') : '下载';
    btn.addEventListener('click', () => download(it.optimizedBlob, it.optimizedName));
    actions.appendChild(btn);
  }

  // ── compare modal ──
  // Decodes the original and the optimized blob to <img> elements and feeds
  // them into Toolkit.makeCompareSlider for a before/after slider. We never
  // store decoded bitmaps long-term; everything is released after the modal
  // closes (URL.revokeObjectURL + innerHTML clearing).
  let _cmpUrls = [];
  async function openCompareModal(i) {
    const it = items[i];
    if (!it.optimizedBlob) return;
    const modal = $('cmpModal');
    const body = $('cmpBody');
    const T = (window.Toolkit && Toolkit.T) ? Toolkit.T : (k, fb) => fb || k;
    $('cmpTitle').textContent = it.file.name;
    body.innerHTML = `<div style="color:var(--muted); text-align:center; padding:40px">${T('imageOpt.loading', '🧦 Dobby 加载预览中...')}</div>`;
    modal.style.display = 'flex';
    document.addEventListener('keydown', onCmpKey);
    // load both as <img> in parallel — both go through createObjectURL so we
    // can revoke them on close.
    for (const u of _cmpUrls) URL.revokeObjectURL(u);
    _cmpUrls = [];
    const origUrl = URL.createObjectURL(it.file);
    const optUrl = URL.createObjectURL(it.optimizedBlob);
    _cmpUrls = [origUrl, optUrl];
    // Use onload promises rather than img.decode() — decode() can hang on
    // certain browsers / preview shells for object-URL-backed images.
    const loadImg = (url) => new Promise((res, rej) => {
      const im = new Image();
      im.onload = () => res(im);
      im.onerror = () => rej(new Error('image decode failed'));
      im.src = url;
    });
    let origImg, optImg;
    try {
      [origImg, optImg] = await Promise.all([loadImg(origUrl), loadImg(optUrl)]);
    } catch (e) {
      body.innerHTML = `<div style="color:var(--danger); text-align:center; padding:40px">Bad Dobby! ${e.message}</div>`;
      return;
    }
    // Pre-downscale to at most 800 px on the long edge for the preview
    // canvases. Original sprite sheets can be 5000+ pixels; rendering them
    // at native size has been linked to weird GPU compositing artifacts on
    // some Chrome installs.
    const downscale = (img) => {
      const maxEdge = 800;
      const scale = Math.min(1, maxEdge / Math.max(img.naturalWidth, img.naturalHeight));
      const w = Math.max(1, Math.round(img.naturalWidth * scale));
      const h = Math.max(1, Math.round(img.naturalHeight * scale));
      const cv = newCanvas(w, h);
      const ctx = cv.getContext('2d');
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, w, h);
      return cv;
    };
    const origCv = downscale(origImg);
    const optCv = downscale(optImg);
    // Side-by-side rendering — see CSS comment for why we abandoned the
    // slide-compare overlay. Each canvas sits in its own column inside a
    // 2-track grid, both with checker-pattern backgrounds so transparency
    // shows through identically.
    const leftLabel = T('imageOpt.compareLeft', '原图');
    const rightLabel = T('imageOpt.compareRight', '压缩后');
    body.innerHTML = `
      <div class="cmp-grid">
        <div class="cmp-col">
          <div class="cmp-label">${leftLabel}</div>
          <div class="cmp-canvas-wrap" id="cmpLeftWrap"></div>
        </div>
        <div class="cmp-col">
          <div class="cmp-label">${rightLabel}</div>
          <div class="cmp-canvas-wrap" id="cmpRightWrap"></div>
        </div>
      </div>
    `;
    document.getElementById('cmpLeftWrap').appendChild(origCv);
    document.getElementById('cmpRightWrap').appendChild(optCv);
    const orig = it.file.size, opt = it.optimizedBlob.size;
    const pct = ((orig - opt) / orig * 100);
    const sign = pct >= 0 ? '-' : '+';
    $('cmpMeta').innerHTML =
      `${it.bitmap.width}×${it.bitmap.height} · ${fmtBytes(orig)}` +
      ` → ${it.optimizedW}×${it.optimizedH} · ${fmtBytes(opt)}` +
      ` · <strong>${sign}${Math.abs(pct).toFixed(1)}%</strong>`;
  }
  function closeCmpModal() {
    $('cmpModal').style.display = 'none';
    $('cmpBody').innerHTML = '';
    for (const u of _cmpUrls) URL.revokeObjectURL(u);
    _cmpUrls = [];
    document.removeEventListener('keydown', onCmpKey);
  }
  function onCmpKey(e) { if (e.key === 'Escape') closeCmpModal(); }

  $('exportZipBtn').addEventListener('click', async () => {
    const processed = items.filter(it => it.optimizedBlob);
    if (!processed.length) return;
    log.dim('打包 ZIP...');
    const files = [];
    for (const it of processed) {
      const data = new Uint8Array(await it.optimizedBlob.arrayBuffer());
      files.push({ name: it.optimizedName, data });
    }
    const zip = makeZip(files);
    download(zip, 'optimized.zip');
    handoff?.setBlob(zip, 'optimized.zip', 'application/zip');
    log.ok(`已导出 ${files.length} 张到 ZIP (${fmtBytes(zip.size)})`);
  });

  $('clearBtn').addEventListener('click', () => {
    items = [];
    $('resultsBody').innerHTML = '<tr><td colspan="8" style="text-align:center; color:var(--muted); padding:40px">你丢图进来,Dobby 处理结果对比写在这里</td></tr>';
    $('summary').style.display = 'none';
    $('stats').textContent = 'Dobby 待命';
    $('processBtn').disabled = true;
    $('exportZipBtn').disabled = true;
    log.clear();
    $('fileInput').value = '';
  });

  // compare-modal close handlers
  $('cmpClose').addEventListener('click', closeCmpModal);
  $('cmpModal').addEventListener('click', (e) => { if (e.target === $('cmpModal')) closeCmpModal(); });

  function escapeHtml(s) { return String(s).replace(/[&<>"]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[c])); }
})();
</script>
</body>
</html>
