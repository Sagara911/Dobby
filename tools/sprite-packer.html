<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap">
<!-- KILLSWITCH v1 -->
<script>
/* one-shot legacy cleanup — drops old SW, caches, and localStorage left behind
   by removed settings UI; reloads once so the fresh code takes over. */
(function () {
  var KEY = 'toolkit-cleaned-v1';
  if (localStorage.getItem(KEY)) return;
  localStorage.setItem(KEY, '1');
  (async function () {
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) { try { await r.unregister(); } catch (_) {} }
      }
      if ('caches' in window) {
        var ks = await caches.keys();
        for (var k of ks) { try { await caches.delete(k); } catch (_) {} }
      }
      try { localStorage.removeItem('toolkit-cursor'); } catch (_) {}
      try { localStorage.removeItem('toolkit-theme'); } catch (_) {}
      var stale = document.getElementById('__toolkit_cursor_style__');
      if (stale) stale.remove();
      document.documentElement.removeAttribute('data-theme');
      location.reload();
    } catch (e) { console.warn('[cleanup]', e); }
  })();
})();
</script>
<title>Sprite Packer · Dobby</title>
<link rel="stylesheet" href="../assets/shared.css" />
</head>
<body>

<div class="tool-layout">
  <div class="sidebar">
    <h1>🎬 Sprite Packer</h1>

    <div class="drop-zone" id="dropZone">
      <p data-i18n="sp.drop.title">📂 拖入文件或点击选择</p>
      <p class="hint" data-i18n-html="sp.drop.hint">
        序列帧 (多选 PNG / JPG)<br/>
        视频 (MP4 / WebM / MOV)<br/>
        GIF 动图
      </p>
      <input type="file" id="fileInput" multiple accept="image/*,video/*" style="display:none" />
    </div>

    <div class="progress" id="progress"><div class="progress-bar"></div></div>

    <div id="videoSettings" style="display:none">
      <h2 data-i18n="sp.video.title">视频抽帧</h2>
      <div class="field">
        <label data-i18n="sp.video.fps">FPS (帧/秒)</label>
        <input type="number" id="videoFps" value="12" min="1" max="60" />
      </div>
    </div>

    <h2 data-i18n="sp.layout.title">布局</h2>
    <div class="field">
      <label data-i18n="sp.cols">列数 (0 = 自动接近正方)</label>
      <input type="number" id="cols" value="0" min="0" />
    </div>
    <div class="field-row">
      <div class="field">
        <label data-i18n="sp.padding">帧间距 (px)</label>
        <input type="number" id="padding" value="2" min="0" />
      </div>
      <div class="field">
        <label data-i18n="sp.margin">外边距 (px)</label>
        <input type="number" id="margin" value="0" min="0" />
      </div>
    </div>

    <h2 data-i18n="sp.proc.title">处理</h2>
    <label class="checkbox">
      <input type="checkbox" id="trim" checked />
      <span data-i18n="sp.proc.trim">自动裁剪透明边</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" id="uniformSize" checked />
      <span data-i18n="sp.proc.uniformSize">统一帧尺寸 (取最大包围盒)</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" id="forceSquare" />
      <span data-i18n="sp.proc.forceSquare">强制方形帧 (长条卡牌→正方,空白透明)</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" id="squareSheet" />
      <span data-i18n="sp.proc.squareSheet">整张精灵图正方形 (cols × cols 网格,末尾留空格代替补边)</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" id="powerOfTwo" />
      <span data-i18n="sp.proc.powerOfTwo">2 的幂次尺寸 (WebGL 友好)</span>
    </label>
    <label class="checkbox">
      <input type="checkbox" id="dropEmpty" />
      <span data-i18n="sp.proc.dropEmpty">剔除全透明帧</span>
    </label>

    <h2 data-i18n="sp.export.title">导出</h2>
    <div class="field">
      <label data-i18n="sp.filename">文件名前缀</label>
      <input type="text" id="filename" value="spritesheet" />
    </div>
    <label class="checkbox">
      <input type="checkbox" id="exportJson" checked />
      <span data-i18n="sp.exportJson">同时导出 JSON 元数据</span>
    </label>
    <div class="field" id="jsonFormatField">
      <label data-i18n="sp.jsonFormat.label">JSON 格式</label>
      <select id="jsonFormat">
        <option value="hash" data-i18n="sp.jsonFormat.hash">TexturePacker JSON Hash (Phaser 3 / PixiJS)</option>
        <option value="array" data-i18n="sp.jsonFormat.array">TexturePacker JSON Array</option>
        <option value="simple" data-i18n="sp.jsonFormat.simple">简洁数组 (自定义引擎)</option>
      </select>
      <div class="info" style="margin-top:4px" data-i18n="sp.jsonFormat.info">取消勾选只下载 PNG —— 适合规则网格 + 自己算帧位置的渲染流程</div>
    </div>

    <button id="exportBtn" data-i18n="sp.exportBtn.both" disabled>导出 PNG + JSON</button>
    <button id="clearBtn" class="secondary" data-i18n="common.clear">清空</button>

    <div class="log" id="log"></div>
  </div>

  <div class="main">
    <div class="stats" id="stats" data-i18n="common.idle">Dobby 待命</div>
    <div class="preview-area" id="previewArea">
      <div class="preview-empty" data-i18n="sp.preview.empty">你丢帧进来,Dobby 拼好显示在这里</div>
    </div>
    <div>
      <h2 style="margin-top:0" data-i18n="sp.framesGrid.title">原始帧</h2>
      <div class="frame-grid" id="frameGrid"></div>
    </div>
  </div>
</div>

<script src="../assets/shared.js"></script>
<script>
Toolkit.injectTopbar('sprite-packer');

(() => {
  const { $, makeLogger, makeProgress, attachDropZone, naturalSort, download, downloadJson, newCanvas, canvasToBlob } = Toolkit;
  const log = makeLogger($('log'));
  const progress = makeProgress($('progress'));

  let rawFrames = [];
  let packed = null;

  attachDropZone($('dropZone'), $('fileInput'), handleFiles);
  const handoff = Toolkit.setupHandoff('sprite-packer', { outputType: 'image/png' });

  async function handleFiles(files) {
    if (!files.length) return;
    rawFrames = [];
    packed = null;
    $('frameGrid').innerHTML = '';
    $('previewArea').innerHTML = '<div class="preview-empty">🧦 Dobby 正在拼精灵图...</div>';
    log.clear();
    $('exportBtn').disabled = true;

    files = naturalSort(files);
    const first = files[0];
    const isVideo = first.type.startsWith('video/');
    const isGif = first.type === 'image/gif' || /\.gif$/i.test(first.name);

    try {
      if (files.length === 1 && isVideo) {
        $('videoSettings').style.display = 'block';
        await loadVideo(first);
      } else if (files.length === 1 && isGif) {
        $('videoSettings').style.display = 'none';
        await loadGif(first);
      } else {
        $('videoSettings').style.display = 'none';
        await loadImages(files);
      }
    } catch (e) {
      log.err(e.message);
      console.error(e);
    } finally {
      progress.hide();
    }

    if (rawFrames.length) {
      log.ok(`加载完成 ${rawFrames.length} 帧`);
      renderFrameGrid();
      await repack();
    } else {
      $('previewArea').innerHTML = '<div class="preview-empty">没有可用的帧</div>';
    }
  }

  async function loadImages(files) {
    const imgs = files.filter(f => f.type.startsWith('image/') && !/\.gif$/i.test(f.name));
    log.dim(`加载 ${imgs.length} 张图片...`);
    for (let i = 0; i < imgs.length; i++) {
      const f = imgs[i];
      try {
        const bitmap = await createImageBitmap(f);
        rawFrames.push({ name: f.name.replace(/\.[^.]+$/, ''), bitmap, w: bitmap.width, h: bitmap.height });
      } catch (e) {
        log.err(`${f.name}: ${e.message}`);
      }
      progress.set((i + 1) / imgs.length);
    }
  }

  async function loadVideo(file) {
    const fps = parseInt($('videoFps').value, 10) || 12;
    log.dim(`加载视频 ${file.name}, FPS=${fps}...`);
    const url = URL.createObjectURL(file);
    const video = document.createElement('video');
    video.src = url; video.muted = true; video.playsInline = true; video.preload = 'auto';

    await new Promise((resolve, reject) => {
      video.onloadedmetadata = () => resolve();
      video.onerror = () => reject(new Error('视频加载失败'));
    });

    const duration = video.duration;
    const interval = 1 / fps;
    const total = Math.max(1, Math.floor(duration * fps));
    log.dim(`  时长 ${duration.toFixed(2)}s · 尺寸 ${video.videoWidth}×${video.videoHeight} · 共 ${total} 帧`);

    const cv = newCanvas(video.videoWidth, video.videoHeight);
    const ctx = cv.getContext('2d');
    for (let i = 0; i < total; i++) {
      const t = Math.min(duration - 0.001, i * interval);
      await seekVideo(video, t);
      ctx.clearRect(0, 0, cv.width, cv.height);
      ctx.drawImage(video, 0, 0);
      const bitmap = await createImageBitmap(cv);
      rawFrames.push({ name: `frame_${String(i).padStart(4, '0')}`, bitmap, w: bitmap.width, h: bitmap.height });
      progress.set((i + 1) / total);
    }
    URL.revokeObjectURL(url);
  }

  function seekVideo(video, t) {
    return new Promise((resolve) => {
      const onSeek = () => { video.removeEventListener('seeked', onSeek); resolve(); };
      video.addEventListener('seeked', onSeek);
      video.currentTime = t;
    });
  }

  async function loadGif(file) {
    log.dim(`加载 GIF ${file.name}...`);
    if (!('ImageDecoder' in window)) throw new Error('当前浏览器不支持 ImageDecoder API,请用 Chrome 94+ / Edge 94+');
    const buf = await file.arrayBuffer();
    const decoder = new ImageDecoder({ data: buf, type: 'image/gif' });
    await decoder.completed;
    const total = decoder.tracks.selectedTrack.frameCount;
    log.dim(`  共 ${total} 帧`);
    for (let i = 0; i < total; i++) {
      const result = await decoder.decode({ frameIndex: i });
      const vf = result.image;
      const bitmap = await createImageBitmap(vf);
      rawFrames.push({ name: `frame_${String(i).padStart(4, '0')}`, bitmap, w: bitmap.width, h: bitmap.height });
      vf.close();
      progress.set((i + 1) / total);
    }
  }

  function renderFrameGrid() {
    const grid = $('frameGrid');
    grid.innerHTML = '';
    rawFrames.forEach((f, i) => {
      const tile = document.createElement('div');
      tile.className = 'frame-tile';
      const cv = newCanvas(f.w, f.h);
      cv.getContext('2d').drawImage(f.bitmap, 0, 0);
      tile.appendChild(cv);
      const idx = document.createElement('div');
      idx.className = 'idx';
      idx.textContent = i;
      tile.appendChild(idx);
      grid.appendChild(tile);
    });
  }

  async function repack() {
    if (!rawFrames.length) return;
    const trim = $('trim').checked;
    const uniformSize = $('uniformSize').checked;
    const forceSquare = $('forceSquare').checked;
    const padding = parseInt($('padding').value, 10) || 0;
    const margin = parseInt($('margin').value, 10) || 0;
    let cols = parseInt($('cols').value, 10) || 0;
    const powerOfTwo = $('powerOfTwo').checked;

    const dropEmpty = $('dropEmpty').checked;
    const processed = [];
    let droppedEmpty = 0;
    for (const f of rawFrames) {
      const cv = newCanvas(f.w, f.h);
      const ctx = cv.getContext('2d');
      ctx.drawImage(f.bitmap, 0, 0);
      let bounds = { x: 0, y: 0, w: f.w, h: f.h };
      const trueBounds = computeBounds(ctx, f.w, f.h);
      if (!trueBounds) {
        // fully transparent
        if (dropEmpty) { droppedEmpty++; continue; }
        bounds = { x: 0, y: 0, w: 1, h: 1 };
      } else if (trim) {
        bounds = trueBounds;
      }
      processed.push({ name: f.name, canvas: cv, sourceW: f.w, sourceH: f.h, bounds });
    }
    if (droppedEmpty > 0) log.dim(`剔除 ${droppedEmpty} 个全透明帧`);

    let frameW = 0, frameH = 0;
    if (uniformSize) {
      frameW = Math.max(...processed.map(p => p.bounds.w));
      frameH = Math.max(...processed.map(p => p.bounds.h));
      if (forceSquare) {
        const side = Math.max(frameW, frameH);
        frameW = frameH = side;
      }
    }

    const n = processed.length;
    const squareSheet = $('squareSheet').checked;
    // squareSheet now exhaustively picks cols by minimizing the final square
    // side (the actual sheet's max(W,H) after laying out N frames in a
    // cols-wide grid). The earlier `round(sqrt(n * H / W))` was only an
    // estimate from averages — it didn't account for the per-column /
    // per-row MAX sizes that the actual layout uses, so it could miss the
    // tightest packing by a column or two and leave noticeable empty
    // strips. Brute force is O(sqrt(n) * n) and cheap for any realistic n.
    function _sheetDims(c) {
      const r = Math.ceil(n / c);
      const cw = new Array(c).fill(0);
      const rh = new Array(r).fill(0);
      if (uniformSize) {
        cw.fill(frameW); rh.fill(frameH);
      } else {
        processed.forEach((p, i) => {
          const col = i % c, row = Math.floor(i / c);
          if (p.bounds.w > cw[col]) cw[col] = p.bounds.w;
          if (p.bounds.h > rh[row]) rh[row] = p.bounds.h;
        });
      }
      const sw = margin * 2 + cw.reduce((s, w) => s + w, 0) + padding * (c - 1);
      const sh = margin * 2 + rh.reduce((s, h) => s + h, 0) + padding * (r - 1);
      return { sw, sh, side: Math.max(sw, sh) };
    }
    if (squareSheet) {
      // Force a square GRID (cols × cols) rather than a tightly-packed
      // rectangle that we then pad with transparent strips. The strip
      // padding looked like off-center / floating content even after we
      // moved it from sides to top+bottom — the user explicitly said
      // they want all four sides equal (which is geometrically impossible
      // when n isn't a perfect square AND you require zero internal grid
      // gaps). Forcing rows = cols = ceil(√n) trades a few empty grid
      // SLOTS at the bottom-right for elimination of the outer padding
      // strips on all four sides. For uniform-square frames the sheet
      // ends up naturally exactly square; for non-uniform frames the
      // existing pad-to-square step further down handles the residual.
      cols = Math.max(1, Math.ceil(Math.sqrt(n)));
    } else if (cols <= 0) {
      const avgW = uniformSize ? frameW : avg(processed.map(p => p.bounds.w));
      const avgH = uniformSize ? frameH : avg(processed.map(p => p.bounds.h));
      cols = Math.max(1, Math.round(Math.sqrt(n * avgH / avgW)));
    }
    const rows = squareSheet ? cols : Math.ceil(n / cols);

    let colWidths, rowHeights;
    if (uniformSize) {
      colWidths = new Array(cols).fill(frameW);
      rowHeights = new Array(rows).fill(frameH);
    } else {
      colWidths = new Array(cols).fill(0);
      rowHeights = new Array(rows).fill(0);
      processed.forEach((p, i) => {
        const c = i % cols, r = Math.floor(i / cols);
        if (p.bounds.w > colWidths[c]) colWidths[c] = p.bounds.w;
        if (p.bounds.h > rowHeights[r]) rowHeights[r] = p.bounds.h;
      });
    }

    const sheetW = margin * 2 + colWidths.reduce((s, w) => s + w, 0) + padding * (cols - 1);
    const sheetH = margin * 2 + rowHeights.reduce((s, h) => s + h, 0) + padding * (rows - 1);
    let finalW = sheetW, finalH = sheetH;
    if (squareSheet) {
      // After the cols override above the layout is already as close to square
      // as a uniform grid can get; this final step just pads the residual
      // short side so the output canvas is exactly N × N.
      const side = Math.max(finalW, finalH);
      finalW = finalH = side;
    }
    if (powerOfTwo) {
      finalW = nextPow2(finalW);
      finalH = nextPow2(finalH);
    }

    const out = newCanvas(finalW, finalH);
    const octx = out.getContext('2d');
    // center the actual sheet content within the (possibly enlarged) final canvas
    const padX = Math.floor((finalW - sheetW) / 2);
    const padY = Math.floor((finalH - sheetH) / 2);
    const xOff = [margin + padX]; for (let i = 1; i < cols; i++) xOff.push(xOff[i-1] + colWidths[i-1] + padding);
    const yOff = [margin + padY]; for (let i = 1; i < rows; i++) yOff.push(yOff[i-1] + rowHeights[i-1] + padding);

    const meta = [];
    processed.forEach((p, i) => {
      const c = i % cols, r = Math.floor(i / cols);
      const cellW = colWidths[c], cellH = rowHeights[r];
      const dx = xOff[c] + (uniformSize ? Math.floor((cellW - p.bounds.w) / 2) : 0);
      const dy = yOff[r] + (uniformSize ? Math.floor((cellH - p.bounds.h) / 2) : 0);
      octx.drawImage(p.canvas, p.bounds.x, p.bounds.y, p.bounds.w, p.bounds.h, dx, dy, p.bounds.w, p.bounds.h);
      meta.push({
        name: p.name, x: dx, y: dy, w: p.bounds.w, h: p.bounds.h,
        sourceW: p.sourceW, sourceH: p.sourceH,
        offsetX: p.bounds.x, offsetY: p.bounds.y
      });
    });

    packed = { canvas: out, frames: meta, cols, rows };
    const area = $('previewArea');
    area.innerHTML = '';
    area.appendChild(out);
    $('stats').innerHTML = `<strong>${n}</strong> 帧 · 网格 <strong>${cols}×${rows}</strong> · 输出 <strong>${finalW}×${finalH}</strong>` +
      (uniformSize ? ` · 单帧 <strong>${frameW}×${frameH}</strong>` : '');
    $('exportBtn').disabled = false;
    // Enable the handoff dropdown the moment the sheet is packed — no need
    // to make the user click "Export PNG" first just to be able to send it
    // to the next tool. Re-runs (after changing options) re-blob it.
    try {
      const fname = (($('filename').value || 'spritesheet').replace(/[^\w-]/g, '_')) + '.png';
      const previewBlob = await canvasToBlob(out, 'image/png');
      handoff?.setBlob(previewBlob, fname);
    } catch (_) { /* non-fatal — user can still export via the button */ }
    log.ok(`打包完成 ${finalW}×${finalH}, ${cols}×${rows} 网格`);
  }

  function computeBounds(ctx, w, h) {
    const data = ctx.getImageData(0, 0, w, h).data;
    let minX = w, minY = h, maxX = -1, maxY = -1;
    for (let y = 0; y < h; y++) {
      const row = y * w * 4;
      for (let x = 0; x < w; x++) {
        if (data[row + x * 4 + 3] > 0) {
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
        }
      }
    }
    if (maxX < 0) return null;
    return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
  }
  const avg = (arr) => arr.reduce((s, v) => s + v, 0) / arr.length;
  const nextPow2 = (n) => { let p = 1; while (p < n) p <<= 1; return p; };

  // 复选框联动:取消勾时隐藏 JSON 格式选项,并把导出按钮文字从
  // "导出 PNG + JSON" 改成 "导出 PNG"
  function syncExportJsonUI() {
    const on = $('exportJson').checked;
    $('jsonFormatField').style.display = on ? '' : 'none';
    const btn = $('exportBtn');
    // Track which i18n key the button currently represents so applyTranslations
    // can re-resolve it on language switch.
    btn.dataset.i18n = on ? 'sp.exportBtn.both' : 'sp.exportBtn.pngOnly';
    btn.textContent = Toolkit.T(btn.dataset.i18n, on ? '导出 PNG + JSON' : '导出 PNG');
  }
  $('exportJson').addEventListener('change', syncExportJsonUI);
  syncExportJsonUI();

  $('exportBtn').addEventListener('click', async () => {
    if (!packed) return;
    const name = ($('filename').value || 'spritesheet').replace(/[^\w-]/g, '_');
    const blob = await canvasToBlob(packed.canvas, 'image/png');
    download(blob, `${name}.png`);
    handoff?.setBlob(blob, `${name}.png`);
    if ($('exportJson').checked) {
      const fmt = $('jsonFormat').value;
      downloadJson(buildJson(name, fmt), `${name}.json`);
      log.ok(`已导出 ${name}.png + ${name}.json`);
    } else {
      const f0 = packed.frames[0] || {};
      log.ok(`已导出 ${name}.png (${packed.cols}列 × ${packed.rows}行, 单帧 ${f0.w || '?'}×${f0.h || '?'})`);
    }
  });

  function buildJson(name, fmt) {
    const { canvas, frames, cols, rows } = packed;
    const trimmed = (f) => f.w !== f.sourceW || f.h !== f.sourceH || f.offsetX !== 0 || f.offsetY !== 0;
    if (fmt === 'hash') {
      const out = { frames: {}, meta: { app: 'sprite-packer', version: '1.0', image: `${name}.png`, format: 'RGBA8888', size: { w: canvas.width, h: canvas.height }, scale: '1' } };
      frames.forEach(f => {
        out.frames[f.name + '.png'] = {
          frame: { x: f.x, y: f.y, w: f.w, h: f.h },
          rotated: false, trimmed: trimmed(f),
          spriteSourceSize: { x: f.offsetX, y: f.offsetY, w: f.w, h: f.h },
          sourceSize: { w: f.sourceW, h: f.sourceH }
        };
      });
      return out;
    }
    if (fmt === 'array') {
      return {
        frames: frames.map(f => ({
          filename: f.name + '.png',
          frame: { x: f.x, y: f.y, w: f.w, h: f.h },
          rotated: false, trimmed: trimmed(f),
          spriteSourceSize: { x: f.offsetX, y: f.offsetY, w: f.w, h: f.h },
          sourceSize: { w: f.sourceW, h: f.sourceH }
        })),
        meta: { app: 'sprite-packer', image: `${name}.png`, size: { w: canvas.width, h: canvas.height }, scale: '1' }
      };
    }
    return {
      image: `${name}.png`, width: canvas.width, height: canvas.height,
      cols, rows, frameCount: frames.length,
      frames: frames.map(f => ({
        name: f.name, x: f.x, y: f.y, w: f.w, h: f.h,
        sourceW: f.sourceW, sourceH: f.sourceH,
        offsetX: f.offsetX, offsetY: f.offsetY
      }))
    };
  }

  $('clearBtn').addEventListener('click', () => {
    rawFrames = []; packed = null;
    $('frameGrid').innerHTML = '';
    $('previewArea').innerHTML = '<div class="preview-empty">你丢帧进来,Dobby 拼好显示在这里</div>';
    $('stats').textContent = 'Dobby 待命';
    $('exportBtn').disabled = true;
    $('videoSettings').style.display = 'none';
    log.clear();
    $('fileInput').value = '';
  });

  ['cols','padding','margin','trim','powerOfTwo','uniformSize','forceSquare','squareSheet','dropEmpty'].forEach(id => {
    $(id).addEventListener('change', () => { if (rawFrames.length) repack(); });
  });
  $('videoFps').addEventListener('change', () => log.dim('ℹ FPS 修改后请重新拖入视频文件'));
})();
</script>
</body>
</html>
