<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap">
<!-- KILLSWITCH v1 -->
<script>
/* one-shot legacy cleanup — drops old SW, caches, and localStorage left behind
   by removed settings UI; reloads once so the fresh code takes over. */
(function () {
  var KEY = 'toolkit-cleaned-v1';
  if (localStorage.getItem(KEY)) return;
  localStorage.setItem(KEY, '1');
  (async function () {
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) { try { await r.unregister(); } catch (_) {} }
      }
      if ('caches' in window) {
        var ks = await caches.keys();
        for (var k of ks) { try { await caches.delete(k); } catch (_) {} }
      }
      try { localStorage.removeItem('toolkit-cursor'); } catch (_) {}
      try { localStorage.removeItem('toolkit-theme'); } catch (_) {}
      var stale = document.getElementById('__toolkit_cursor_style__');
      if (stale) stale.remove();
      document.documentElement.removeAttribute('data-theme');
      location.reload();
    } catch (e) { console.warn('[cleanup]', e); }
  })();
})();
</script>
<title data-i18n="404.title">404 — Dobby</title>
<link rel="stylesheet" href="/assets/shared.css" />
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
  .not-found {
    position: relative; z-index: 1;
    text-align: center;
    padding: 40px;
    max-width: 480px;
  }
  .not-found .code {
    font-size: clamp(5rem, 14vw, 8rem);
    font-family: "Space Grotesk", sans-serif;
    font-weight: 700;
    margin: 0;
    background: linear-gradient(135deg, var(--jade), var(--champagne));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    line-height: 1;
    letter-spacing: -0.04em;
  }
  .not-found h1 {
    font-family: "Space Grotesk", sans-serif;
    font-size: 1.5rem;
    margin: 16px 0 8px;
    color: var(--text);
  }
  .not-found p {
    color: var(--muted-2);
    margin: 0 0 24px;
    font-size: 13px;
  }
  .not-found a.btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--jade);
    color: #0a1a14;
    padding: 10px 24px;
    border-radius: var(--radius-pill);
    font-weight: 600;
    text-decoration: none;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(var(--jade-rgb), 0.3);
  }
  .not-found a.btn:hover {
    background: #67ffbc;
  }
  .not-found .sock {
    font-size: 4rem;
    margin: 0 0 8px;
    display: inline-block;
    animation: dobby-wiggle 2.6s ease-in-out infinite;
  }
  @keyframes dobby-wiggle {
    0%, 100% { transform: rotate(-8deg); }
    50%      { transform: rotate(8deg); }
  }
  .not-found .quote {
    font-style: italic;
    color: var(--muted);
    font-size: 11.5px;
    margin-top: 18px;
    line-height: 1.6;
  }
  .not-found .quote::before { content: "「 "; opacity: 0.5; }
  .not-found .quote::after  { content: " 」"; opacity: 0.5; }
</style>
</head>
<body>
  <div class="not-found">
    <div class="sock">🧦</div>
    <p class="code">404</p>
    <h1 data-i18n="404.heading">Bad Dobby! Bad Dobby!</h1>
    <p data-i18n="404.body">Dobby couldn't find this page —— 路径写错了, 或者这个工具还没被 Dobby 接管。回首页让 Dobby 重新给你找。</p>
    <a class="btn" href="/index.html" data-i18n="404.backHome">← 回首页让 Dobby 帮你</a>
    <p class="quote" data-i18n="404.quote">Dobby is free, but Dobby still couldn't find this page for you, sir.</p>
  </div>
  <script src="/assets/shared.js"></script>
  <script>Toolkit.injectTopbar('home');</script>
</body>
</html>
