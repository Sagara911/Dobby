<!-- KILLSWITCH v2 -->
<script>
(function () {
  var KEY = 'toolkit-cleaned-v2';
  if (localStorage.getItem(KEY)) return;
  localStorage.setItem(KEY, '1');
  (async function () {
    try {
      if ('serviceWorker' in navigator) { var regs = await navigator.serviceWorker.getRegistrations(); for (var r of regs) { try { await r.unregister(); } catch (_) {} } }
      if ('caches' in window) { var ks = await caches.keys(); for (var k of ks) { try { await caches.delete(k); } catch (_) {} } }
      try { localStorage.removeItem('toolkit-cursor'); } catch (_) {}
      try { localStorage.removeItem('toolkit-theme'); } catch (_) {}
      document.documentElement.removeAttribute('data-theme');
      location.reload();
    } catch (e) { console.warn('[cleanup]', e); }
  })();
})();
</script>
<title>Dobby · 设计预览</title>
<link rel="stylesheet" href="assets/shared.css" />
<style>
  body { overflow-x: hidden; }

  /* ===== Preview banner (only on this URL) ===== */
  .preview-banner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 99999;
    padding: 6px 14px; font-size: 11px;
    background: linear-gradient(90deg, rgba(245,165,75,0.92), rgba(255,110,130,0.92));
    color: #1c1d24; text-align: center; font-weight: 600;
    backdrop-filter: blur(8px);
    letter-spacing: 0.04em;
  }
  .preview-banner a { color: #1c1d24; text-decoration: underline; font-weight: 700; }

  /* ===== Hero v4 (new design) =====
     Two-column on desktop: mascot+text left, live demo canvas right.
     Stacks on mobile. */
  .hero-v4 {
    position: relative;
    min-height: 92vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: clamp(40px, 6vh, 60px) 20px clamp(28px, 5vh, 60px);
    gap: clamp(20px, 3vh, 36px);
    text-align: center;
  }
  .hero-inner {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: clamp(24px, 5vw, 80px);
    width: min(1180px, 100%);
    align-items: center;
  }
  @media (max-width: 820px) {
    .hero-inner { grid-template-columns: 1fr; gap: 24px; }
    .hero-right { order: -1; }   /* show demo above on mobile so mascot is the focal */
  }
  .hero-left { display: flex; flex-direction: column; align-items: center; gap: clamp(14px, 2vh, 26px); }
  .hero-right { display: flex; flex-direction: column; align-items: center; gap: 8px; }

  /* ===== Mascot (interactive — cursor-follow + click states) ===== */
  .mascot {
    font-size: clamp(96px, 14vw, 168px);
    line-height: 1;
    display: inline-block;
    user-select: none;
    cursor: grab;
    filter: drop-shadow(0 8px 24px rgba(var(--jade-rgb), 0.22));
    transform: translate3d(0,0,0);
    transition: filter 0.4s ease, font-size 0.3s ease;
    /* base bob; overridden during cursor-follow */
    animation: dobby-bob 4.2s ease-in-out infinite;
    position: relative;
    z-index: 2;
  }
  .mascot.active { cursor: grabbing; }
  .mascot.wiggle { animation: dobby-wiggle 0.5s ease-out; }
  .mascot.cheer  { animation: dobby-cheer 0.8s ease-out; filter: drop-shadow(0 0 30px rgba(var(--champagne-rgb), 0.8)); }
  @keyframes dobby-bob {
    0%, 100% { transform: translateY(0) rotate(-2deg); }
    50%      { transform: translateY(-10px) rotate(2deg); }
  }
  @keyframes dobby-wiggle {
    0%, 100% { transform: rotate(0); }
    25% { transform: rotate(-14deg) scale(1.08); }
    50% { transform: rotate(12deg) scale(1.08); }
    75% { transform: rotate(-8deg) scale(1.04); }
  }
  @keyframes dobby-cheer {
    0% { transform: translateY(0) scale(1); }
    30% { transform: translateY(-40px) scale(1.18) rotate(-8deg); }
    60% { transform: translateY(-30px) scale(1.22) rotate(8deg); }
    100% { transform: translateY(0) scale(1); }
  }
  @media (prefers-reduced-motion: reduce) {
    .mascot, .mascot.wiggle, .mascot.cheer { animation: none !important; }
  }

  /* ===== Headline ===== */
  .hero-v4 h1 {
    font-size: clamp(3.6rem, 12vw, 8rem);
    font-weight: 700;
    line-height: 1;
    color: var(--text);
    letter-spacing: -0.045em;
    margin: 0;
    font-family: "Space Grotesk", sans-serif;
  }

  /* ===== Typewriter subtitle ===== */
  .hero-sub {
    font-size: clamp(13px, 1.4vw, 17px);
    color: var(--text-soft);
    min-height: 1.6em;
    margin: 0;
    font-family: ui-monospace, Consolas, "Microsoft YaHei", monospace;
    letter-spacing: 0.02em;
  }
  .hero-sub .caret {
    display: inline-block;
    width: 0.6ch;
    height: 1.1em;
    margin-left: 1px;
    background: var(--accent);
    vertical-align: -0.18em;
    animation: caret-blink 1s steps(1) infinite;
  }
  @keyframes caret-blink { 50% { background: transparent; } }
  @media (prefers-reduced-motion: reduce) {
    .hero-sub .caret { animation: none; background: var(--accent); }
  }

  /* ===== Live demo canvas (right side) ===== */
  .demo-wrap {
    position: relative;
    padding: 18px;
    border-radius: 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.12),
      0 24px 60px -20px rgba(var(--jade-rgb), 0.25),
      0 6px 18px rgba(0,0,0,0.3);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  #demoCanvas {
    display: block;
    width: 100%;
    max-width: 360px;
    height: auto;
    aspect-ratio: 3 / 2;
    background:
      linear-gradient(45deg, rgba(255,255,255,0.025) 25%, transparent 25%) 0 0 / 16px 16px,
      linear-gradient(-45deg, rgba(255,255,255,0.025) 25%, transparent 25%) 0 8px / 16px 16px,
      rgba(0,0,0,0.18);
    border-radius: 10px;
    image-rendering: crisp-edges;
  }
  .demo-label {
    font-size: 11px;
    color: var(--muted);
    font-family: ui-monospace, Consolas, monospace;
    margin-top: 10px;
    letter-spacing: 0.02em;
  }
  .demo-label strong { color: var(--accent); font-weight: 600; }

  /* ===== Hero ambient orbs (reuse pattern, simpler here) ===== */
  .hero-orbs {
    position: absolute; inset: 0; z-index: 0;
    overflow: hidden; pointer-events: none;
    -webkit-mask-image: linear-gradient(to bottom, transparent 0, #000 96px, #000 calc(100% - 88px), transparent 100%);
            mask-image: linear-gradient(to bottom, transparent 0, #000 96px, #000 calc(100% - 88px), transparent 100%);
  }
  .hero-orbs::before, .hero-orbs::after {
    content: ""; position: absolute; border-radius: 50%; filter: blur(90px); pointer-events: none; will-change: transform;
  }
  .hero-orbs::before {
    width: clamp(360px, 50vw, 560px); aspect-ratio: 1;
    background: radial-gradient(circle, rgba(var(--jade-rgb), 0.55), rgba(var(--jade-rgb), 0) 70%);
    top: -10%; left: -8%; opacity: 0.85;
    animation: orb-drift-1 22s ease-in-out infinite;
  }
  .hero-orbs::after {
    width: clamp(400px, 55vw, 620px); aspect-ratio: 1;
    background: radial-gradient(circle, rgba(var(--champagne-rgb, 215, 195, 115), 0.42), rgba(var(--champagne-rgb, 215, 195, 115), 0) 70%);
    bottom: -12%; right: -10%; opacity: 0.75;
    animation: orb-drift-2 28s ease-in-out infinite; animation-delay: -8s;
  }
  @keyframes orb-drift-1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(40px, 60px) scale(1.08); }
    66% { transform: translate(-30px, 30px) scale(0.96); }
  }
  @keyframes orb-drift-2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    40% { transform: translate(-60px, -40px) scale(1.12); }
    75% { transform: translate(20px, -20px) scale(0.94); }
  }
  .hero-v4 > *:not(.hero-orbs) { position: relative; z-index: 1; }
  @media (prefers-reduced-motion: reduce) {
    .hero-orbs::before, .hero-orbs::after { animation: none; }
  }

  /* ===== Scroll hint ===== */
  .scroll-hint {
    color: var(--muted-2);
    font-size: 22px;
    margin-top: clamp(8px, 2vh, 24px);
    animation: bounce-down 2.2s ease-in-out infinite;
    transition: color 0.2s;
    text-decoration: none;
  }
  .scroll-hint:hover { color: var(--accent); }
  @keyframes bounce-down {
    0%, 100% { transform: translateY(0); opacity: 0.5; }
    50% { transform: translateY(8px); opacity: 1; }
  }

  /* ===== Theater section: scroll color demo ===== */
  .theater {
    padding: 60px 20px 120px;
    display: flex; flex-direction: column; gap: 0;
    width: min(1180px, 100%);
    margin: 0 auto;
  }
  .theater > h2 {
    text-align: center;
    font-size: clamp(20px, 3vw, 32px);
    font-weight: 600;
    color: var(--text);
    margin-bottom: 40px;
    letter-spacing: -0.02em;
  }
  .band {
    min-height: 70vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(40px, 9vw, 120px);
    font-weight: 700;
    letter-spacing: -0.04em;
    font-family: "Space Grotesk", sans-serif;
    position: relative;
    border-radius: 24px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: background 0.6s ease, color 0.6s ease;
  }
  .band::before {
    content: ""; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(var(--c), 0.22), transparent 70%);
    pointer-events: none;
  }
  .band[data-cat="image"] { --c: var(--cat-image-rgb); color: rgb(var(--cat-image-rgb)); }
  .band[data-cat="anim"]  { --c: var(--cat-anim-rgb);  color: rgb(var(--cat-anim-rgb)); }
  .band[data-cat="av"]    { --c: var(--cat-av-rgb);    color: rgb(var(--cat-av-rgb)); }
  .band[data-cat="code"]  { --c: var(--cat-code-rgb);  color: rgb(var(--cat-code-rgb)); }
  .band[data-cat="audit"] { --c: var(--cat-audit-rgb); color: rgb(var(--cat-audit-rgb)); }
  .band-cat { position: relative; z-index: 1; mix-blend-mode: screen; }

  /* ===== Confetti (mascot click egg) ===== */
  .confetti {
    position: fixed; pointer-events: none; z-index: 9999;
    font-size: 32px; user-select: none;
    will-change: transform, opacity;
  }
</style>
</head>

<main>

    <div class="hero-orbs" aria-hidden="true"></div>
    <div class="hero-inner">
      <div class="hero-left">
        <span class="mascot" id="mascot" aria-hidden="true">🧦</span>

    <div class="band" data-cat="anim"><span class="band-cat">🎬 Anim</span></div>
    <div class="band" data-cat="av"><span class="band-cat">🔊 AV</span></div>
    <div class="band" data-cat="code"><span class="band-cat">🗜️ Code</span></div>

<script src="assets/shared.js"></script>
<script>
Toolkit.injectTopbar('home');

(() => {
  const $ = id => document.getElementById(id);
  const reduceMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  // =====================================================================
  // E. Typewriter subtitle — cycle through Dobby's identity lines
  // =====================================================================
  const LINES = [
    '你的本地素材精灵',
    '文件不上传 · 处理全在你机器上',
    '47 个工具 · 全免费',
    'Dobby is free 🧦'
  ];
  const sub = $('typewriterSub');
  if (reduceMotion) {
    sub.textContent = LINES[0];
  } else {
    let li = 0, ci = 0, deleting = false;
    const tick = () => {
      const line = LINES[li];
      if (!deleting) {
        sub.textContent = line.slice(0, ci);
        ci++;
        if (ci > line.length) {
          deleting = true;
          setTimeout(tick, 1800);
          return;
        }
        setTimeout(tick, 55 + Math.random() * 50); // human-ish jitter
      } else {
        ci--;
        sub.textContent = line.slice(0, ci);
        if (ci <= 0) {
          deleting = false;
          ci = 0;
          li = (li + 1) % LINES.length;
          setTimeout(tick, 200);
          return;
        }
        setTimeout(tick, 28);
      }
    };
    tick();
  }

  // =====================================================================
  // C. Mascot interactive — cursor-follow with damping, click states,
  //    5-click confetti egg, Konami code rain
  // =====================================================================
  const mascot = $('mascot');
  if (!reduceMotion) {
    let tx = 0, ty = 0, mx = 0, my = 0, hovering = false;
    const RANGE = 22;     // max px offset for cursor follow
    const CURSOR_INFLUENCE = 0.06;

    window.addEventListener('mousemove', e => {
      const r = mascot.getBoundingClientRect();
      const cx = r.left + r.width / 2;
      const cy = r.top + r.height / 2;
      const dx = e.clientX - cx;
      const dy = e.clientY - cy;
      const dist = Math.hypot(dx, dy) || 1;
      const pull = Math.min(RANGE, dist * CURSOR_INFLUENCE);
      tx = (dx / dist) * pull;
      ty = (dy / dist) * pull;
    });

    // Smooth lerp toward the cursor target — overrides the bob animation
    // while the cursor moves. When the cursor is far/stable, bob naturally
    // dominates via the animation. We set transform via CSS variable so the
    // keyframe bob still mixes with our follow.
    function animate() {
      mx += (tx - mx) * 0.12;
      my += (ty - my) * 0.12;
      // small rotation that follows the horizontal pull — feels like the
      // mascot leans toward the cursor
      const rot = mx * 0.35;
      // Override transform — kill the CSS bob while user is actively interacting
      // by switching off the animation when there's meaningful follow offset.
      const interacting = Math.abs(mx) > 1.2 || Math.abs(my) > 1.2;
      if (interacting && !mascot.classList.contains('wiggle') && !mascot.classList.contains('cheer')) {
        mascot.style.animation = 'none';
        mascot.style.transform = `translate(${mx}px, ${my}px) rotate(${rot}deg)`;
      } else if (!mascot.classList.contains('wiggle') && !mascot.classList.contains('cheer')) {
        mascot.style.animation = '';
        mascot.style.transform = '';
      }
      requestAnimationFrame(animate);
    }
    animate();
  }

  // Click counter → 5 clicks unlock confetti cheer
  let clickCount = 0, lastClick = 0;
  mascot.addEventListener('click', () => {
    const now = Date.now();
    if (now - lastClick > 1500) clickCount = 0;
    clickCount++;
    lastClick = now;
    mascot.classList.remove('wiggle');
    void mascot.offsetWidth; // restart animation
    mascot.classList.add('wiggle');
    setTimeout(() => mascot.classList.remove('wiggle'), 520);
    if (clickCount >= 5) {
      clickCount = 0;
      mascot.classList.add('cheer');
      setTimeout(() => mascot.classList.remove('cheer'), 820);
      sockConfetti(40);
    }
  });

  // Konami code: ↑↑↓↓←→←→BA → confetti
  const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
  let kbuf = [];
  window.addEventListener('keydown', e => {
    kbuf.push(e.key.length === 1 ? e.key.toLowerCase() : e.key);
    if (kbuf.length > KONAMI.length) kbuf.shift();
    if (KONAMI.every((k, i) => k === kbuf[i])) {
      sockConfetti(80);
      kbuf = [];
    }
  });

  function sockConfetti(n) {
    const EMOJI = ['🧦','🧦','🧦','✨','💫','🌟'];
    for (let i = 0; i < n; i++) {
      const el = document.createElement('span');
      el.className = 'confetti';
      el.textContent = EMOJI[(Math.random() * EMOJI.length) | 0];
      el.style.left = (50 + (Math.random() - 0.5) * 40) + '%';
      el.style.top = '50%';
      el.style.fontSize = (16 + Math.random() * 24) + 'px';
      document.body.appendChild(el);
      const dx = (Math.random() - 0.5) * 800;
      const dy = -(200 + Math.random() * 400);
      const rot = (Math.random() - 0.5) * 720;
      const dur = 1400 + Math.random() * 900;
      el.animate([
        { transform: 'translate(0,0) rotate(0)', opacity: 1 },
        { transform: `translate(${dx}px, ${dy}px) rotate(${rot}deg)`, opacity: 1, offset: 0.6 },
        { transform: `translate(${dx * 1.2}px, ${dy + 600}px) rotate(${rot * 1.2}deg)`, opacity: 0 }
      ], { duration: dur, easing: 'cubic-bezier(.2,.7,.4,1)' }).onfinish = () => el.remove();
    }
  }

  // =====================================================================
  // D. Scroll color theater — when a category band is the most visible,
  //    tween --jade-rgb / --accent / --champagne-rgb toward that category.
  // =====================================================================
  const CAT_COLORS = {
    image: '84, 156, 255',
    anim:  '168, 110, 232',
    av:    '255, 110, 130',
    code:  '245, 165, 75',
    audit: '80, 220, 200'
  };
  const root = document.documentElement.style;
  let curRgb = [49, 245, 156];        // start near base jade
  let tgtRgb = [49, 245, 156];

  function parseRgb(s) { return s.split(',').map(n => parseInt(n.trim(), 10)); }

  // Tween loop — runs alongside the existing shared.js cycle. Once user
  // scrolls past the hero and a band is most-visible, scroll-driven wins.
  let scrollDriven = false;
  function tween() {
    if (scrollDriven) {
      for (let i = 0; i < 3; i++) curRgb[i] += (tgtRgb[i] - curRgb[i]) * 0.06;
      const r = Math.round(curRgb[0]), g = Math.round(curRgb[1]), b = Math.round(curRgb[2]);
      const rgb = `${r}, ${g}, ${b}`;
      root.setProperty('--jade-rgb', rgb);
      root.setProperty('--jade', `rgb(${rgb})`);
      root.setProperty('--accent', `rgb(${rgb})`);
      root.setProperty('--jade-soft', `rgba(${rgb}, 0.12)`);
      root.setProperty('--jade-glow', `rgba(${rgb}, 0.35)`);
    }
    requestAnimationFrame(tween);
  }
  tween();

  const observer = new IntersectionObserver(entries => {
    // Pick the band with the largest intersection ratio
    let best = null;
    entries.forEach(e => {
      if (e.isIntersecting && (!best || e.intersectionRatio > best.intersectionRatio)) best = e;
    });
    if (best && best.intersectionRatio > 0.35) {
      const cat = best.target.dataset.cat;
      if (CAT_COLORS[cat]) {
        tgtRgb = parseRgb(CAT_COLORS[cat]);
        scrollDriven = true;
      }
    }
  }, { threshold: [0.1, 0.35, 0.6, 0.9] });
  document.querySelectorAll('.band').forEach(b => observer.observe(b));

  // When user scrolls back to the very top (hero), release scroll-driven mode
  // so the shared.js cycle takes back over.
  window.addEventListener('scroll', () => {
    if (window.scrollY < 80) scrollDriven = false;
  }, { passive: true });

  // =====================================================================
  // B. Live atlas-packer demo canvas — sprites drift in from edges, slot
  //    into a packed sheet, briefly hold, scatter & repeat. Pure visual
  //    mimicry (no real packer call).
  // =====================================================================
  const cv = $('demoCanvas');
  if (cv && !reduceMotion) {
    const ctx = cv.getContext('2d');
    const W = cv.width, H = cv.height;

    // Layouts: arrays of {w,h,x,y, color} representing the FINAL packed
    // positions inside the sheet. Cycle through a few different layouts
    // so it doesn't feel static.
    const PALETTE = [
      'rgba(84, 156, 255, 0.92)',
      'rgba(168, 110, 232, 0.92)',
      'rgba(255, 110, 130, 0.92)',
      'rgba(245, 165, 75, 0.92)',
      'rgba(80, 220, 200, 0.92)',
      'rgba(49, 245, 156, 0.92)'
    ];
    // Inset of the "atlas sheet" inside the canvas
    const PAD = 18;
    const SX = PAD, SY = PAD;
    const SW = W - PAD * 2, SH = H - PAD * 2;

    function randomLayout() {
      // generate 4-6 rects that tile into the SW×SH area roughly via a
      // greedy shelf packer (good enough for visual demo).
      const targetCount = 4 + (Math.random() * 3) | 0;
      const rects = [];
      let shelfY = 0, shelfH = 0, shelfX = 0;
      for (let i = 0; i < targetCount; i++) {
        const w = 50 + Math.round(Math.random() * 80);
        const h = 30 + Math.round(Math.random() * 60);
        if (shelfX + w > SW) {
          shelfY += shelfH + 4;
          shelfH = 0;
          shelfX = 0;
        }
        if (shelfY + h > SH) break;
        rects.push({
          w, h, fx: SX + shelfX, fy: SY + shelfY, // final position
          // start position: off-canvas (edge entry direction varies)
          sx: Math.random() < 0.5 ? -w - 30 : W + 30,
          sy: Math.random() * H,
          x: 0, y: 0,
          color: PALETTE[i % PALETTE.length],
          progress: 0
        });
        shelfX += w + 4;
        if (h > shelfH) shelfH = h;
      }
      // Initialize current position to start position
      rects.forEach(r => { r.x = r.sx; r.y = r.sy; });
      return rects;
    }

    let rects = randomLayout();
    let phase = 'packing';    // packing → settled → exiting → next
    let phaseT = 0;
    const PACKING_FRAMES = 90;
    const SETTLED_FRAMES = 60;
    const EXITING_FRAMES = 35;

    function draw() {
      // Soft frame around the "sheet"
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = 'rgba(255,255,255,0.05)';
      ctx.strokeStyle = 'rgba(255,255,255,0.12)';
      ctx.lineWidth = 1;
      ctx.fillRect(SX, SY, SW, SH);
      ctx.strokeRect(SX + 0.5, SY + 0.5, SW - 1, SH - 1);

      phaseT++;
      if (phase === 'packing') {
        // ease each rect from start → final
        const t = Math.min(1, phaseT / PACKING_FRAMES);
        const eased = 1 - Math.pow(1 - t, 3);  // easeOutCubic
        rects.forEach((r, i) => {
          const delay = i * 0.08;
          const local = Math.max(0, Math.min(1, (t - delay) / (1 - delay)));
          const e = 1 - Math.pow(1 - local, 3);
          r.x = r.sx + (r.fx - r.sx) * e;
          r.y = r.sy + (r.fy - r.sy) * e;
          r.progress = e;
        });
        if (t >= 1) { phase = 'settled'; phaseT = 0; }
      } else if (phase === 'settled') {
        // hold; subtle pulse
        if (phaseT >= SETTLED_FRAMES) { phase = 'exiting'; phaseT = 0; }
      } else if (phase === 'exiting') {
        const t = Math.min(1, phaseT / EXITING_FRAMES);
        const e = t * t;   // easeInQuad
        rects.forEach((r, i) => {
          const exitX = Math.random() < 0.5 ? -r.w - 30 : W + 30;
          // store an exit target lazily
          if (r.exitX === undefined) {
            r.exitX = (i % 2 === 0 ? -r.w - 30 : W + 30);
            r.exitY = r.fy + (Math.random() - 0.5) * 60;
          }
          r.x = r.fx + (r.exitX - r.fx) * e;
          r.y = r.fy + (r.exitY - r.fy) * e;
          r.progress = 1 - e;
        });
        if (t >= 1) { rects = randomLayout(); phase = 'packing'; phaseT = 0; }
      }

      // draw rects
      rects.forEach(r => {
        const a = phase === 'exiting' ? r.progress : 1;
        ctx.globalAlpha = a;
        // soft drop shadow on settled
        if (phase !== 'exiting') {
          ctx.shadowColor = 'rgba(0,0,0,0.35)';
          ctx.shadowBlur = 8;
          ctx.shadowOffsetY = 2;
        } else {
          ctx.shadowBlur = 0;
        }
        roundRect(ctx, r.x, r.y, r.w, r.h, 4);
        ctx.fillStyle = r.color;
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.shadowOffsetY = 0;
        // subtle border
        ctx.strokeStyle = 'rgba(255,255,255,0.25)';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
      ctx.globalAlpha = 1;

      // Scanline sweep while packing (the "Dobby is computing" feel)
      if (phase === 'packing') {
        const t = phaseT / PACKING_FRAMES;
        const lineY = SY + SH * t;
        const grad = ctx.createLinearGradient(0, lineY - 8, 0, lineY + 8);
        grad.addColorStop(0, 'rgba(49,245,156,0)');
        grad.addColorStop(0.5, 'rgba(49,245,156,0.6)');
        grad.addColorStop(1, 'rgba(49,245,156,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(SX, lineY - 8, SW, 16);
      }

      requestAnimationFrame(draw);
    }

    function roundRect(c, x, y, w, h, r) {
      c.beginPath();
      c.moveTo(x + r, y);
      c.arcTo(x + w, y, x + w, y + h, r);
      c.arcTo(x + w, y + h, x, y + h, r);
      c.arcTo(x, y + h, x, y, r);
      c.arcTo(x, y, x + w, y, r);
      c.closePath();
    }

    draw();
  } else if (cv) {
    // Reduced-motion fallback — draw one static packed layout
    const ctx = cv.getContext('2d');
    ctx.fillStyle = 'rgba(255,255,255,0.05)';
    ctx.fillRect(18, 18, cv.width - 36, cv.height - 36);
    const PAL = ['#5c9cff','#a86ee8','#ff6e82','#f5a54b','#50dcc8'];
    const layout = [[0,0,80,40],[84,0,60,40],[0,44,140,30],[0,78,80,40],[84,78,60,40]];
    layout.forEach((l, i) => {
      ctx.fillStyle = PAL[i];
      ctx.fillRect(20 + l[0], 20 + l[1], l[2], l[3]);
    });
  }
})();
</script>
