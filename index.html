<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<!-- KILLSWITCH v1 -->
<script>
/* one-shot legacy cleanup — drops old SW, caches, and localStorage left behind
   by removed settings UI; reloads once so the fresh code takes over. */
(function () {
  var KEY = 'toolkit-cleaned-v1';
  if (localStorage.getItem(KEY)) return;
  localStorage.setItem(KEY, '1');
  (async function () {
    try {
      if ('serviceWorker' in navigator) {
        var regs = await navigator.serviceWorker.getRegistrations();
        for (var r of regs) { try { await r.unregister(); } catch (_) {} }
      }
      if ('caches' in window) {
        var ks = await caches.keys();
        for (var k of ks) { try { await caches.delete(k); } catch (_) {} }
      }
      try { localStorage.removeItem('toolkit-cursor'); } catch (_) {}
      try { localStorage.removeItem('toolkit-theme'); } catch (_) {}
      var stale = document.getElementById('__toolkit_cursor_style__');
      if (stale) stale.remove();
      document.documentElement.removeAttribute('data-theme');
      location.reload();
    } catch (e) { console.warn('[cleanup]', e); }
  })();
})();
</script>
<title data-i18n="home.title">Dobby — 你的本地素材精灵</title>
<link rel="stylesheet" href="assets/shared.css" />
<style>
  body { overflow-x: hidden; }

  /* ===== HERO (v2 — marketing-scale) =====
     Design intent: this is a marketing landing page; visitors arrive cold.
     Hero gets ~70vh on desktop, ~75vh on mobile, but only 5 clean elements:
       1. eyebrow pill ("Dobby is free")
       2. huge headline ("叫我 Dobby")
       3. one-line tagline
       4. big primary search input
       5. 5 colorful category chips
       (+ a scroll-hint arrow at the bottom edge)
     What we DIDN'T put back: stats row (4 numbers), eyebrow contact link,
     verbose subtitle. Those are noise; the chip count + footer cover them. */
  .hero {
    position: relative;
    z-index: 1;
    padding: clamp(40px, 8vh, 80px) 20px clamp(28px, 5vh, 60px);
    text-align: center;
    margin: 0 auto;
    min-height: 70vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(16px, 2.5vh, 28px);
  }
  .hero > * {
    margin-left: auto;
    margin-right: auto;
    text-align: center;
    display: block;
  }
  .hero-tag {
    display: inline-block;
    padding: 6px 16px;
    border-radius: var(--radius-pill);
    background: rgba(var(--jade-rgb), 0.10);
    border: 1px solid rgba(var(--jade-rgb), 0.35);
    color: var(--jade);
    font-size: 12.5px;
    font-family: ui-monospace, Consolas, monospace;
    letter-spacing: 0.08em;
    margin: 0;
    backdrop-filter: blur(4px);
  }
  .hero h1 {
    max-width: 900px;
    font-size: clamp(2.6rem, 8vw, 5rem);
    font-weight: 700;
    /* line-height: 1 clips descenders ("y", "p", "g") on tight headlines;
       1.12 keeps the tight look but lets the y's tail breathe. */
    line-height: 1.12;
    color: #fff;
    letter-spacing: -0.035em;
    margin: 0;
    font-family: "Space Grotesk", sans-serif;
  }
  .hero h1 .accent {
    background: linear-gradient(135deg, var(--jade), var(--champagne));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    /* inline-block + background-clip:text can chop the descender's
       gradient fill on some renderers — give it a hair of vertical room
       so the y's tail is fully painted */
    display: inline-block;
    padding-bottom: 0.08em;
    line-height: 1;
  }
  .hero .hero-sub {
    font-size: clamp(14px, 1.6vw, 17px);
    color: var(--muted);
    margin: 0;
    line-height: 1.55;
    max-width: 640px;
    font-family: ui-monospace, Consolas, monospace;
    letter-spacing: 0.02em;
  }

  /* search — big, prominent. This is the primary CTA. */
  .search-wrap {
    position: relative;
    max-width: 600px;
    width: 100%;
    margin: 0 auto;
  }
  .search-wrap input {
    width: 100%;
    background: rgba(0, 0, 0, 0.55);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-pill);
    padding: 17px 22px 17px 52px;
    color: var(--text);
    /* 16px+ to avoid iOS auto-zoom on focus */
    font-size: 16px;
    font-family: "Space Grotesk", sans-serif;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .search-wrap input:focus,
  .search-wrap:focus-within input {
    background: rgba(0, 0, 0, 0.7);
  }
  .search-wrap input:focus {
    outline: none;
    border-color: var(--jade);
    box-shadow: 0 0 0 4px rgba(var(--jade-rgb), 0.14);
  }
  .search-wrap .icon {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
  }
  .search-wrap .clear {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.06);
    border: 0;
    color: var(--muted);
    width: 22px; height: 22px;
    border-radius: 50%;
    cursor: pointer;
    padding: 0;
    font-size: 11px;
    box-shadow: none;
    display: none;
  }
  .search-wrap .clear:hover { background: rgba(255,255,255,0.1); color: var(--text); transform: translateY(-50%); }
  .search-wrap.has-value .clear { display: block; }

  /* ===== TOOLS SECTION ===== */
  .tools-section {
    position: relative;
    z-index: 1;
    max-width: 1240px;
    margin: 24px auto 48px;
    padding: 0 20px;
  }

  /* category header */
  .cat-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 32px 0 14px;
    padding-top: 4px;
  }
  .cat-header .cat-icon {
    width: 32px; height: 32px;
    border-radius: 9px;
    background: linear-gradient(135deg, rgba(var(--cat-rgb, var(--jade-rgb)), 0.22), rgba(var(--cat-rgb, var(--jade-rgb)), 0.05));
    border: 1px solid rgba(var(--cat-rgb, var(--jade-rgb)), 0.32);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  /* Mirror the data-cat mapping for category section wrappers */
  .cat-anchor[data-cat="image"] { --cat-rgb: var(--cat-image-rgb); }
  .cat-anchor[data-cat="anim"]  { --cat-rgb: var(--cat-anim-rgb); }
  .cat-anchor[data-cat="av"]    { --cat-rgb: var(--cat-av-rgb); }
  .cat-anchor[data-cat="code"]  { --cat-rgb: var(--cat-code-rgb); }
  .cat-anchor[data-cat="audit"] { --cat-rgb: var(--cat-audit-rgb); }
  .cat-anchor[data-cat] .cat-name { color: rgb(var(--cat-rgb)); }
  .cat-anchor[data-cat] .cat-count {
    background: rgba(var(--cat-rgb), 0.10);
    border-color: rgba(var(--cat-rgb), 0.30);
    color: rgb(var(--cat-rgb));
  }
  .cat-header .cat-info {
    display: flex;
    align-items: baseline;
    gap: 10px;
    flex: 1;
  }
  .cat-header .cat-name {
    font-family: "Space Grotesk", sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .cat-header .cat-en {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: ui-monospace, Consolas, monospace;
  }
  .cat-header .cat-count {
    font-size: 11px;
    color: var(--muted);
    font-family: ui-monospace, Consolas, monospace;
    margin-left: auto;
    background: rgba(255,255,255,0.04);
    padding: 4px 10px;
    border-radius: var(--radius-pill);
    border: 1px solid var(--border);
  }

  .tools-grid {
    display: grid;
    /* Denser: 240px min gives an extra column at 1280-1440 widths */
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  /* recent section: emphasized container */
  .recent-section {
    position: relative;
    background: linear-gradient(135deg, rgba(var(--jade-rgb), 0.07), rgba(var(--jade-rgb), 0.02));
    border: 1px solid rgba(var(--jade-rgb), 0.18);
    border-radius: 14px;
    padding: 18px 20px 22px;
    margin: 24px 0 12px;
  }
  .recent-section .cat-header { margin-top: 0; margin-bottom: 14px; padding-top: 0; }
  .recent-section .cat-name { color: var(--jade); }

  /* glassmorphism cards — tighter: 100 min-height + smaller padding,
     descriptions clamped to 2 lines so dense category pages don't sprawl */
  .tool-card {
    --mx: 50%;
    --my: 50%;
    position: relative;
    overflow: hidden;
    background: rgba(20, 20, 26, 0.55);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 14px 16px 12px;
    text-decoration: none;
    color: var(--text);
    transition: transform 0.22s ease, border-color 0.22s ease, box-shadow 0.22s ease;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 100px;
  }
  .tool-card::before,
  .tool-card::after {
    content: "";
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    pointer-events: none;
  }
  .tool-card::before {
    z-index: 0;
    background: radial-gradient(280px circle at var(--mx) var(--my), rgba(var(--jade-rgb), 0.2), rgba(var(--jade-rgb), 0) 65%);
    opacity: 0;
    transition: opacity 0.22s ease;
  }
  .tool-card::after {
    z-index: 1;
    padding: 1px;
    background: radial-gradient(220px circle at var(--mx) var(--my),
      rgba(var(--jade-rgb), 0.9) 0%, rgba(var(--jade-rgb), 0.5) 25%,
      rgba(var(--jade-rgb), 0.12) 55%, rgba(var(--jade-rgb), 0) 78%);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    mask-composite: exclude;
    opacity: 0;
    transition: opacity 0.22s ease;
    filter: drop-shadow(0 0 8px rgba(var(--jade-rgb), 0.4));
  }
  .tool-card:hover {
    transform: translateY(-3px);
    border-color: rgba(var(--jade-rgb), 0.25);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(var(--jade-rgb), 0.1);
  }
  .tool-card:hover::before,
  .tool-card:hover::after { opacity: 1; }
  .tool-card > * { position: relative; z-index: 2; }

  .tool-card .icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: linear-gradient(135deg, rgba(var(--cat-rgb, var(--jade-rgb)), 0.18), rgba(var(--cat-rgb, var(--jade-rgb)), 0.04));
    border: 1px solid rgba(var(--cat-rgb, var(--jade-rgb)), 0.28);
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
    margin-bottom: 2px;
  }
  /* Per-category accent override — the home page card generator (and
     cat-header below) sets data-cat="image|anim|av|code|audit"; that
     rewrites --cat-rgb so the icon, hover glow, border all retint
     without needing per-category CSS rules. */
  .tool-card[data-cat="image"] { --cat-rgb: var(--cat-image-rgb); }
  .tool-card[data-cat="anim"]  { --cat-rgb: var(--cat-anim-rgb); }
  .tool-card[data-cat="av"]    { --cat-rgb: var(--cat-av-rgb); }
  .tool-card[data-cat="code"]  { --cat-rgb: var(--cat-code-rgb); }
  .tool-card[data-cat="audit"] { --cat-rgb: var(--cat-audit-rgb); }
  /* Override the hover glow / outline to use --cat-rgb as well */
  .tool-card[data-cat]::before {
    background: radial-gradient(280px circle at var(--mx) var(--my),
      rgba(var(--cat-rgb), 0.22), rgba(var(--cat-rgb), 0) 65%);
  }
  .tool-card[data-cat]::after {
    background: radial-gradient(220px circle at var(--mx) var(--my),
      rgba(var(--cat-rgb), 0.9) 0%, rgba(var(--cat-rgb), 0.5) 25%,
      rgba(var(--cat-rgb), 0.12) 55%, rgba(var(--cat-rgb), 0) 78%);
    filter: drop-shadow(0 0 8px rgba(var(--cat-rgb), 0.45));
  }
  .tool-card[data-cat]:hover {
    border-color: rgba(var(--cat-rgb), 0.32);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(var(--cat-rgb), 0.14);
  }
  .tool-card h3 {
    margin: 0;
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    font-family: "Space Grotesk", sans-serif;
    letter-spacing: -0.005em;
    display: flex;
    align-items: baseline;
    gap: 6px;
    flex-wrap: wrap;
  }
  .tool-card h3 .card-sub {
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 0.06em;
    color: var(--muted);
    text-transform: uppercase;
  }
  .tool-card p {
    margin: 0;
    color: var(--muted-2);
    font-size: 11.5px;
    line-height: 1.5;
    flex: 1;
    /* Clamp description to 2 lines so card height stays predictable
       even when tools have very long desc strings */
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .empty-search {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 13px;
  }
  .empty-search .search-suggest-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }
  .empty-search .search-suggest {
    appearance: none;
    background: rgba(var(--jade-rgb), 0.08);
    border: 1px solid rgba(var(--jade-rgb), 0.35);
    color: var(--accent);
    border-radius: var(--radius-pill);
    padding: 6px 14px;
    font-size: 12px;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.12s, transform 0.12s, border-color 0.12s;
  }
  .empty-search .search-suggest:hover {
    background: rgba(var(--jade-rgb), 0.18);
    border-color: var(--accent);
    transform: translateY(-1px);
  }

  /* footer */
  .site-footer {
    position: relative;
    z-index: 1;
    margin-top: 24px;
    padding: 24px;
    border-top: 1px solid var(--border);
    background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
  }
  .footer-inner {
    max-width: 1180px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    color: var(--muted);
    font-size: 11px;
    font-family: ui-monospace, Consolas, monospace;
  }
  .footer-contact {
    color: var(--jade);
    text-decoration: none;
    border: 1px solid rgba(var(--jade-rgb), 0.3);
    background: rgba(var(--jade-rgb), 0.08);
    padding: 5px 12px;
    border-radius: var(--radius-pill);
    transition: background 0.15s, border-color 0.15s;
    /* touch-friendly */
    min-height: 32px;
    display: inline-flex;
    align-items: center;
  }
  .footer-contact:hover {
    background: rgba(var(--jade-rgb), 0.18);
    border-color: rgba(var(--jade-rgb), 0.55);
  }
  .footer-inner .tag { display: inline-flex; align-items: center; gap: 6px; }
  .footer-inner .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--jade);
    box-shadow: 0 0 8px rgba(var(--jade-rgb), 0.6);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.5; transform: scale(1); }
    50%      { opacity: 1;   transform: scale(1.2); }
  }

  /* smooth anchor scroll offset for sticky topbar */
  .cat-anchor {
    scroll-margin-top: 90px;
  }

  /* ============ news modal ============ */
  .news-modal {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    animation: news-fade 0.25s ease-out;
  }
  @keyframes news-fade {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  .news-card {
    background: linear-gradient(180deg, #14141a 0%, #0c0c10 100%);
    border: 1px solid rgba(var(--jade-rgb), 0.35);
    border-radius: var(--radius);
    padding: 24px 24px 20px;
    width: 100%;
    max-width: 540px;
    max-height: 86vh;
    overflow-y: auto;
    box-shadow:
      0 20px 60px rgba(0, 0, 0, 0.7),
      0 0 80px rgba(var(--jade-rgb), 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    animation: news-pop 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes news-pop {
    from { opacity: 0; transform: translateY(8px) scale(0.97); }
    to { opacity: 1; transform: none; }
  }
  .news-head {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 18px;
  }
  .news-badge {
    background: var(--jade);
    color: #0a1a14;
    font-family: "Space Grotesk", monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.12em;
    padding: 3px 8px;
    border-radius: 4px;
    box-shadow: 0 0 12px rgba(var(--jade-rgb), 0.45);
  }
  .news-head h2 {
    margin: 0;
    font-family: "Space Grotesk", sans-serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    flex: 1;
  }
  .news-close {
    background: transparent;
    border: none;
    color: var(--muted);
    font-size: 24px;
    line-height: 1;
    padding: 0 4px;
    cursor: pointer;
    transition: color 0.15s;
    box-shadow: none;
  }
  .news-close:hover {
    color: var(--text);
    transform: none;
  }
  .news-list {
    list-style: none;
    padding: 0;
    margin: 0 0 18px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .news-list li {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 12px 14px;
    background: rgba(var(--jade-rgb), 0.04);
    border: 1px solid rgba(var(--jade-rgb), 0.12);
    border-radius: var(--radius-sm);
    font-size: 13px;
    line-height: 1.55;
    color: var(--text-soft);
  }
  .news-list li:hover {
    background: rgba(var(--jade-rgb), 0.07);
    border-color: rgba(var(--jade-rgb), 0.22);
  }
  .news-list .news-icon {
    font-size: 18px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }
  .news-list strong {
    color: var(--text);
    font-weight: 600;
  }
  .news-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .news-primary {
    background: var(--jade);
    color: #0a1a14;
    border: none;
    padding: 9px 22px;
    border-radius: var(--radius-sm);
    font-weight: 600;
    font-size: 13px;
    font-family: "Space Grotesk", sans-serif;
    cursor: pointer;
    transition: filter 0.15s, transform 0.15s;
  }
  .news-primary:hover {
    filter: brightness(1.1);
    transform: translateY(-1px);
  }
  .news-primary:active {
    transform: translateY(0);
  }

  /* Hero category chips — colorful quick-jump bar that visually advertises
     the five tool families. With the eyebrow + stats row gone, these chips
     ARE the visual anchor of the hero. Touch-target 40px+ on mobile. */
  .hero-cat-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    max-width: 720px;
    margin: 0 auto;
  }

  /* scroll hint — own block between hero and tools-section so it never
     overlaps with chips (which wrap into 2 rows on narrow viewports) */
  .hero-scroll-hint {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    margin: 0 auto;
    color: var(--muted);
    text-decoration: none;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    font-size: 16px;
    animation: hero-bounce 2.2s ease-in-out infinite;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .hero-scroll-hint:hover {
    border-color: rgba(var(--jade-rgb), 0.5);
    color: var(--jade);
    background: rgba(var(--jade-rgb), 0.08);
  }
  @keyframes hero-bounce {
    0%, 100% { transform: translateY(0); opacity: 0.55; }
    50%      { transform: translateY(5px); opacity: 1; }
  }
  @media (prefers-reduced-motion: reduce) {
    .hero-scroll-hint { animation: none; }
  }
  .hero-cat-chips a {
    --c: var(--jade-rgb);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 14px;
    border-radius: var(--radius-pill);
    text-decoration: none;
    background: rgba(var(--c), 0.10);
    border: 1px solid rgba(var(--c), 0.32);
    color: rgb(var(--c));
    font-size: 13px;
    font-family: "Space Grotesk", sans-serif;
    font-weight: 500;
    transition: background 0.15s, border-color 0.15s, transform 0.15s;
    min-height: 36px;
  }
  .hero-cat-chips a:hover {
    background: rgba(var(--c), 0.22);
    border-color: rgba(var(--c), 0.6);
    transform: translateY(-2px);
  }
  .hero-cat-chips a .chip-icon { font-size: 14px; }
  .hero-cat-chips a .chip-count {
    font-family: ui-monospace, Consolas, monospace;
    font-size: 10.5px;
    opacity: 0.7;
    margin-left: 2px;
  }
  .hero-cat-chips a[data-cat="image"] { --c: var(--cat-image-rgb); }

  .hero-cat-chips a[data-cat="audit"] { --c: var(--cat-audit-rgb); }

  /* ============================================================
     MOBILE — mobile-first adjustments at common breakpoints.
     ≤720px: tablets and large phones (most mobile traffic)
     ≤480px: phones, where 1 column + touch ergonomics matter most
     ============================================================ */
  @media (max-width: 720px) {
    .hero {
      min-height: 72vh;

  @media (max-width: 480px) {

    /* tools force single column with comfortable padding */

    /* chips: bigger touch target, allow tighter wrap */

    .hero-cat-chips a {
      padding: 10px 12px;

</style>

<!-- ============ 新功能弹窗 (首次访问 / 升级后显示) ============ -->

    </div>

<script src="assets/shared.js"></script>
<script>
  // Shortcut for translation lookups (Toolkit.T is set up by shared.js)
  const T = (k, vars, fb) => (window.Toolkit && Toolkit.T) ? Toolkit.T(k, vars, fb) : (fb || k);
  // For tool display: pick name based on language; descriptions go through T()
  // with the original Chinese as the fallback so the site looks right even
  // before i18n-strings.js loads.
  const toolName = (c) => (Toolkit.getLang && Toolkit.getLang() === 'en' && c.en) ? c.en : c.name;
  const toolDesc = (c) => T('tool.' + c.id + '.desc', c.desc);

  const CATEGORIES = [
    { id: 'image', icon: '🖼️', key: 'cat.image', keyEn: 'cat.image.en', name: '图像处理',         en: 'Image Tools' },
    { id: 'anim',  icon: '🎬', key: 'cat.anim',  keyEn: 'cat.anim.en',  name: '动画 / 精灵图',     en: 'Animation' },
    { id: 'av',    icon: '🔊', key: 'cat.av',    keyEn: 'cat.av.en',    name: '音视频',           en: 'Audio / Video' },
    { id: 'code',  icon: '🗜️', key: 'cat.code',  keyEn: 'cat.code.en',  name: '代码 / 打包',       en: 'Code & Bundle' },
    { id: 'audit', icon: '📊', key: 'cat.audit', keyEn: 'cat.audit.en', name: '分析 / 诊断',       en: 'Analyze & Audit' }
  ];

  // Build card list from shared TOOLS data
  const CARDS = Toolkit.TOOLS.filter(t => t.id !== 'home');

  // ============================================================
  //   Natural-language search terms per tool.
  //
  // The official name + en + desc fields are mostly precise jargon
  // ("palette 编码", "MODNet / RMBG"). Real users type how they feel
  // ("图太大", "想做 gif", "字体瘦身", "去 logo"). Each tool gets a
  // searchTerms blob of those plain-language phrasings — used by
  // the tokenized scorer below so substring-blind queries still
  // find the right tool.
  // ============================================================
  const SEARCH_TERMS = {
    'image-optimizer':  '压图 压缩图 图太大 图片大 太大了 减体积 减小 转格式 png jpg jpeg webp avif batch optimize 批量 缩放 resize bytes 文件大 优化 image compress shrink',
    'png-crusher':      '深度压缩 极限压缩 深压 png crush palette 调色板 减色 dither 抖动 索引色 indexed apng 动图压缩 png太大',
    'image-editor':     '图片编辑 编辑 裁剪 裁图 旋转 加文字 文字水印 像素化 滤镜 hsl crop rotate text overlay edit',
    'color-tools':      '取色 吸色 吸管 eyedropper 色值 hex 主色 dominant 调色 抠图 color key 减色 quantize 颜色替换 换色 chroma',
    'ai-cutout':        'AI抠图 扣图 去背景 抠人 抠头像 抠主体 透明背景 modnet rmbg cutout 背景透明 remove background mask 自动抠图',
    'watermark-remove': '水印 去水印 擦水印 抹水印 watermark 去logo 抹logo lama inpaint 修复 erase logo',
    'composer':         '拼图 拼接 合成 多图 多张拼 叠加 collage compose montage 加水印 多图水印',
    'image-diff':       '对比 比较 差异 看差异 diff ab compare psnr ssim heatmap 热图 压缩对比 前后对比',
    'svg-tools':        'svg svgo 矢量 vector 优化svg 转png rasterize 矢量图',
    'sprite-packer':    '精灵图 sprite atlas spritesheet 序列帧 合成 帧合成 frames 拼帧 帧打包',
    'atlas-splitter':   '精灵图拆 atlas split sprite 拆帧 拆图 拆 sprite 分帧 sheet分帧',
    'gif-tools':        'gif apng 动图 动画 帧动画 制作gif 编辑gif 转gif 优化gif make gif 序列帧转gif animated 调速 反向',
    'lottie-tools':     'lottie 动画json AE动画 矢量动画 lottie太大 优化lottie 转apng 转gif',
    'video-toolkit':    '视频 video 转gif 抽帧 截帧 截图 裁视频 剪视频 视频剪辑 trim mp4 webm 视频转gif',
    'audio-compress':   '音频 音乐 audio mp3 wav opus 降采样 sample 单声道 mono 裁音频 trim fade 静音',
    'html-inliner':     'html 单文件 inline playable 打包html 内联 资源内联 合并html',
    'code-minify':      '压缩js 压缩css 压缩html minify terser uglify 代码压缩 js压缩 css压缩',
    'base64':           'base64 dataurl base64编码 base64解码 encode decode 图转base64 base64转图',
    'zip-packer':       'zip 打包 压缩文件 deflate archive 文件夹打包 多文件打包',
    'qr-gen':           'qr 二维码 qrcode 扫码 wifi码 名片码 vcard 短信码',
    'font-subset':      '字体 字体太大 字体瘦身 font subset 子集化 中文字体 woff ttf otf 字体压缩 playable字体',
    'batch-rename':     '重命名 改名 批量重命名 批量改名 rename 序号 序号补零 文件名 命名',
    'bundle-analyzer':  '分析 包体分析 体积分析 大文件 目录扫描 项目大小 analyze 项目分析',
    'channel-check':    '渠道 facebook google tiktok mintegral applovin 校验 规范 audit 渠道规范 平台规范',
    'slim-coach':       '瘦身 slim 体积优化 减小体积 建议 包体瘦身 advice coach 优化建议',
    'playable-slim':    'playable瘦身 playable优化 拆html 拆playable 包体瘦身 体积大 playable太大'
  };

  // Stop tokens that everyone types but mean nothing to us.
  const STOPWORDS = new Set([
    '我','你','的','了','是','在','有','要','吗','一','个','下','张','点','吧','呢','啊','嘛','把','给','和','与','或','也','但',
    '怎么','可以','能','想','请','帮','把','已经','这个','那个','一下','一些','请问','是不是',
    'a','an','the','to','of','in','on','at','for','with','my','your','our','please','can','i','it','this','that','some','any',
    'how','what','why','where','when','do','does','is','are','am','was','were','be','been'
  ]);

  // Tokenize a query into independent search atoms.
  //   English: words length ≥ 2 → token
  //   Chinese: each char + every consecutive bigram from runs of chars
  // The bigrams are what makes "图太大" match a searchTerm like "图太大".
  function tokenizeQuery(s) {
    if (!s) return [];
    const lower = s.toLowerCase();
    const out = new Set();
    (lower.match(/[a-z0-9]{2,}/g) || []).forEach(t => out.add(t));
    const cnRuns = lower.match(/[一-鿿]+/g) || [];
    for (const run of cnRuns) {
      for (let i = 0; i < run.length; i++) {
        out.add(run[i]);                          // single char
        if (i + 1 < run.length) out.add(run.slice(i, i + 2));     // bigram
        if (i + 2 < run.length) out.add(run.slice(i, i + 3));     // trigram
      }
    }
    // strip stopwords so "我图太大" doesn't waste a slot on "我"
    return [...out].filter(t => !STOPWORDS.has(t));
  }

  // Score a tool against a list of query tokens. Two dimensions matter:
  //   * Token length — a 4-char phrase match beats a single-char hit
  //   * Field weight — matches in the tool's NAME are stronger evidence
  //     than matches in the desc, which are stronger than matches in
  //     the looser searchTerms blob. Without this, "字体瘦身" ties
  //     font-subset against image-optimizer (which has "体" buried in
  //     "减体积") instead of obviously winning.
  function scoreTool(c, tokens) {
    if (!tokens.length) return 0;
    const name  = (c.name + ' ' + c.en).toLowerCase();
    const desc  = (c.desc + ' ' + T('tool.' + c.id + '.desc', '')).toLowerCase();
    const terms = (SEARCH_TERMS[c.id] || '').toLowerCase();
    let score = 0;
    for (const t of tokens) {
      if (name.includes(t))       score += t.length * 3;
      else if (desc.includes(t))  score += t.length * 2;
      else if (terms.includes(t)) score += t.length;
    }
    return score;
  }

  // Subtitle is templated with {n} so the count stays in sync with the
  // TOOLS array — no more hard-coded "44" that goes stale. Re-run on
  // langchange so the swap to EN also fills in the count.
  function renderHeroSub() {
    const el = document.getElementById('heroSub');
    if (!el) return;
    el.textContent = T('home.hero.subtitle', { n: CARDS.length }, `— ${CARDS.length} 件本地工具 · 文件不上传 · Dobby is free`);
  }
  renderHeroSub();
  document.addEventListener('langchange', renderHeroSub);

  // Hero category chips — colored quick-jump buttons that double as a visual
  // anchor for the hero section.
  (function renderHeroChips() {
    const host = document.getElementById('heroCatChips');
    if (!host) return;
    host.innerHTML = CATEGORIES.map(cat => {
      const count = CARDS.filter(c => c.cat === cat.id).length;
      return `<a href="#cat-${cat.id}" data-cat="${cat.id}">
        <span class="chip-icon">${cat.icon}</span><span data-i18n="${cat.key}">${cat.name}</span><span class="chip-count">${count}</span>
      </a>`;
    }).join('');
  })();

  const section = document.getElementById('toolsSection');
  const searchInput = document.getElementById('search');
  const searchWrap = document.getElementById('searchWrap');

  function makeCard(c) {
    const a = document.createElement('a');
    a.className = 'tool-card';
    a.href = c.href;
    a.dataset.cat = c.cat;
    a.dataset.name = (c.name + ' ' + c.en + ' ' + c.desc).toLowerCase();
    // In en mode the primary name is already English, so the .card-sub label
    // (always c.en) would duplicate it — drop the sub label in that case.
    const isEn = Toolkit.getLang && Toolkit.getLang() === 'en';
    const subHtml = isEn ? '' : `<span class="card-sub">${c.en}</span>`;
    a.innerHTML = `
      <div class="icon">${c.icon}</div>
      <h3>${toolName(c)} ${subHtml}</h3>
      <p>${toolDesc(c)}</p>
    `;
    a.addEventListener('mousemove', (e) => {
      const r = a.getBoundingClientRect();
      a.style.setProperty('--mx', (e.clientX - r.left) + 'px');
      a.style.setProperty('--my', (e.clientY - r.top) + 'px');
    });
    return a;
  }

  function render(query = '') {
    section.innerHTML = '';
    const q = query.trim().toLowerCase();

    // Recent
    const recent = (Toolkit.Prefs.get('recent') || []).map(id => CARDS.find(c => c.id === id)).filter(Boolean);
    if (!q && recent.length > 0) {
      const recentSec = document.createElement('div');
      recentSec.className = 'recent-section';
      recentSec.innerHTML = `
        <div class="cat-header">
          <div class="cat-icon">⭐</div>
          <div class="cat-info">
            <span class="cat-name" data-i18n="home.recent.name">Dobby 最近帮你做过</span>
            <span class="cat-en">Recent</span>
          </div>
          <span class="cat-count">${recent.length}</span>
        </div>
        <div class="tools-grid"></div>
      `;
      const grid = recentSec.querySelector('.tools-grid');
      recent.forEach(c => grid.appendChild(makeCard(c)));
      section.appendChild(recentSec);
    }

    // Tokenize once for the whole render pass; empty array if no query.
    const tokens = q ? tokenizeQuery(q) : [];

    // Search mode: flatten everything into one ranked list so the most
    // relevant tool surfaces at the top regardless of category. The
    // categorized layout is great for browsing but actively hides the
    // right answer when the user has a specific intent — e.g. searching
    // "字体瘦身" used to bury font-subset under image-cat tools that had
    // weak partial matches just because Image renders first.
    if (q) {
      const ranked = CARDS
        .map(c => ({ c, score: scoreTool(c, tokens) }))
        .filter(x => x.score > 0)
        .sort((a, b) => b.score - a.score);
      if (ranked.length) {
        const div = document.createElement('div');
        div.className = 'cat-anchor';
        div.dataset.cat = 'search-results';
        div.innerHTML = `
          <div class="cat-header">
            <div class="cat-icon">🔍</div>
            <div class="cat-info">
              <span class="cat-name">${T('home.search.results', { q: query }, `${ranked.length} 个匹配 "${query}"`)}</span>
            </div>
            <span class="cat-count">${ranked.length}</span>
          </div>
          <div class="tools-grid"></div>
        `;
        const grid = div.querySelector('.tools-grid');
        ranked.forEach(x => grid.appendChild(makeCard(x.c)));
        section.appendChild(div);
        return;   // skip the categorized layout when actively searching
      }
      // No matches: render the nudge with suggested phrasings below.
      renderEmptyState(query);
      return;
    }

    // Browse mode (no query): full categorized layout, every tool shown.
    let anyMatch = false;
    for (const cat of CATEGORIES) {
      let items = CARDS.filter(c => c.cat === cat.id);
      if (!items.length) continue;
      anyMatch = true;
      const div = document.createElement('div');
      div.id = `cat-${cat.id}`;
      div.className = 'cat-anchor';
      div.dataset.cat = cat.id;
      // Same dedup: in en mode the primary cat name is already English, so
      // the secondary EN label would duplicate it.
      const isEnCat = Toolkit.getLang && Toolkit.getLang() === 'en';
      const catSubHtml = isEnCat ? '' : `<span class="cat-en" data-i18n="${cat.keyEn}">${cat.en}</span>`;
      div.innerHTML = `
        <div class="cat-header">
          <div class="cat-icon">${cat.icon}</div>
          <div class="cat-info">
            <span class="cat-name" data-i18n="${cat.key}">${cat.name}</span>
            ${catSubHtml}
          </div>
          <span class="cat-count">${items.length} / ${CARDS.filter(c => c.cat === cat.id).length}</span>
        </div>
        <div class="tools-grid"></div>
      `;
      const grid = div.querySelector('.tools-grid');
      items.forEach(c => grid.appendChild(makeCard(c)));
      section.appendChild(div);
    }
  }

  // Empty-state with click-to-fill phrasing chips. Called from the search
  // branch in render() when no tool scored above 0.
  function renderEmptyState(query) {
    const examples = ['压图', '抠图', '去水印', '想做 gif', '字体太大', 'png 太大', '拼图', '转视频'];
    const enExamples = ['compress image', 'remove background', 'remove watermark', 'make gif', 'shrink font', 'compare images', 'extract video frames'];
    const isEn = Toolkit.getLang && Toolkit.getLang() === 'en';
    const chips = (isEn ? enExamples : examples).map(ex =>
      `<button type="button" class="search-suggest" data-q="${ex}">${ex}</button>`
    ).join('');
    const headlineKey = isEn ? 'home.search.empty.en' : 'home.search.empty';
    const headlineFb = isEn
      ? `🧦 Dobby doesn't recognize "${query}" yet. Try one of these phrasings:`
      : `🧦 Dobby 没听懂 "${query}" — 试试下面这些说法:`;
    section.innerHTML = `
      <div class="empty-search">
        <div style="margin-bottom:14px">${T(headlineKey, { q: query }, headlineFb)}</div>
        <div class="search-suggest-row">${chips}</div>
      </div>
    `;
    section.querySelectorAll('.search-suggest').forEach(btn => {
      btn.addEventListener('click', () => {
        searchInput.value = btn.dataset.q;
        searchWrap.classList.add('has-value');
        render(btn.dataset.q);
        searchInput.focus();
      });
    });
  }

  // Re-render the tools section on language change (tool desc / cat names change).
  document.addEventListener('langchange', () => render(searchInput.value));

  searchInput.addEventListener('input', (e) => {
    const v = e.target.value;
    searchWrap.classList.toggle('has-value', !!v.trim());
    render(v);
  });
  document.getElementById('searchClear').addEventListener('click', () => {
    searchInput.value = ''; searchWrap.classList.remove('has-value'); render(''); searchInput.focus();
  });
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
      e.preventDefault();
      searchInput.focus(); searchInput.select();
    }
    if (e.key === 'Escape' && document.activeElement === searchInput) {
      searchInput.value = ''; searchWrap.classList.remove('has-value'); render('');
    }
  });

  // smooth scroll for category anchors — do NOT update URL hash,
  // so refresh always brings the user back to the hero (top of page).
  document.addEventListener('click', (e) => {
    const a = e.target.closest('a[href*="#cat-"]');
    if (!a) return;
    const url = new URL(a.href, location.href);
    if (url.pathname === location.pathname && url.hash.startsWith('#cat-')) {
      const el = document.querySelector(url.hash);
      if (el) {
        e.preventDefault();
        el.scrollIntoView({ behavior: 'smooth', block: 'start' });
        // intentionally not calling history.replaceState — refresh stays at hero
      }
    }
  });

  Toolkit.injectTopbar('home');
  render();

  // ensure refresh always lands on top (clear any stale scroll restore)
  if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);

  // ============ news modal ============
  // Both the homepage modal and the tool-page toast use the same news.json
  // as the source of truth and the same localStorage key 'toolkit-news-seen'
  // for "last entry version the user acknowledged". This unification matters:
  // an earlier version of the modal stored a separate hardcoded NEWS_VERSION
  // under the same key, which made the toast think "nothing's seen yet" the
  // moment the user dismissed the modal (and vice versa) — every dismissal
  // resurrected the other surface.
  const NEWS_KEY = 'toolkit-news-seen';

  function escapeHtmlLocal(s) {
    return String(s).replace(/[&<>"']/g, c => (
      { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
    ));
  }

  let pendingDismissVersion = null;

  function dismissNews() {
    document.getElementById('newsModal').style.display = 'none';
    if (pendingDismissVersion) {
      try { localStorage.setItem(NEWS_KEY, pendingDismissVersion); } catch (_) {}
    }
    document.removeEventListener('keydown', onNewsKey);
  }
  function onNewsKey(e) { if (e.key === 'Escape') dismissNews(); }

  async function maybeShowNews() {
    let news;
    try {
      // cache-bust so SW / browser caches never hide a fresh entry
      const r = await fetch('news.json?t=' + Date.now(), { cache: 'no-store' });
      if (!r.ok) return;
      news = await r.json();
    } catch (_) { return; }
    if (!news?.entries?.length) return;
    let seen = '';
    try { seen = localStorage.getItem(NEWS_KEY) || ''; } catch (_) {}
    const fresh = [];
    for (const e of news.entries) {
      if (e.version === seen) break;  // entries are newest-first; stop at first seen
      fresh.push(e);
    }
    if (!fresh.length) return;
    const head = fresh[0];
    pendingDismissVersion = head.version;
    // news.json itself is Chinese-only (entries pre-date i18n); the modal
    // chrome (title-when-no-entry-title, "more updates" line, dismiss button)
    // does translate via T() so en users get a partially-localized experience.
    document.getElementById('newsTitle').textContent = head.title || T('news.modalTitle.fallback', 'Dobby 最近学的新本事');
    document.getElementById('newsList').innerHTML = (head.items || []).map(i =>
      `<li><span class="news-icon">🧦</span><div>${escapeHtmlLocal(i)}</div></li>`
    ).join('');
    const moreEl = document.getElementById('newsMore');
    if (fresh.length > 1) {
      moreEl.textContent = T('news.modalMore', { n: fresh.length - 1 }, `还有 ${fresh.length - 1} 条历史更新 (在工具页查看)…`);
      moreEl.style.display = '';
    } else {
      moreEl.style.display = 'none';
    }
    const modal = document.getElementById('newsModal');
    modal.style.display = 'flex';
    document.getElementById('newsClose').addEventListener('click', dismissNews);
    document.getElementById('newsOk').addEventListener('click', dismissNews);
    modal.addEventListener('click', (e) => { if (e.target === modal) dismissNews(); });
    document.addEventListener('keydown', onNewsKey);
  }
  maybeShowNews();
</script>
</body>
</html>
